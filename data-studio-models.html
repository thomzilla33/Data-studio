html,body{height:100%}
body{background:var(--bg); color:var(--t1); font-family:'Inter','SF Pro Text',system-ui,sans-serif; font-size:14px; line-height:1.5}

/* ── TOPBAR ── */
.topbar{position:fixed; top:0; left:0; right:0; height:36px; z-index:20; display:flex; align-items:center; gap:8px;
  padding:0 8px; background:var(--topbar-bg); border-bottom:1px solid var(--line); backdrop-filter:blur(20px) saturate(1.8)}
.tb-left{flex:1; display:flex; align-items:center; gap:8px}
.tb-right{flex:1; display:flex; align-items:center; gap:8px; justify-content:flex-end}
.tb-brand{display:flex; align-items:center; gap:10px; color:var(--t1)}
.tb-brand-logo{width:30px; height:30px; border-radius:8px; display:flex; align-items:center; justify-content:center; color:#fff; flex-shrink:0; background:var(--grad-ds)}
.tb-brand-name{font-size:15px; font-weight:700; letter-spacing:-.01em}
.tb-search{display:flex; align-items:center; gap:6px; width:250px; height:24px; padding:0 8px; border-radius:6px;
  background:rgba(255,255,255,0.06); border:1px solid rgba(92,92,92,0.5); color:var(--t3); font-size:11px; font-weight:500; cursor:text}
.tb-search>svg{color:var(--t3); flex-shrink:0}
.tb-search>span{flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; line-height:20px}
html.theme-light .tb-search{background:#fff}
.tb-search kbd{margin-left:auto; font-size:11px; font-weight:600; padding:2px 6px; border-radius:5px; background:rgba(255,255,255,0.08); border:1px solid var(--line)}
html.theme-light .tb-search kbd{background:rgba(15,23,42,0.05)}
.tb-ico{position:relative; width:24px; height:24px; display:inline-flex; align-items:center; justify-content:center; border-radius:4px; border:none; background:transparent; color:var(--t2); cursor:pointer}
.tb-ico:hover{background:var(--hover-strong); color:var(--t1)}
.tb-actions{display:flex; align-items:center; gap:4px}
.tb-ai{width:24px; height:24px; display:inline-flex; align-items:center; justify-content:center; border:none; border-radius:8px; cursor:pointer; color:#fff; background:radial-gradient(circle at 61% 68%, rgba(33,115,255,1) 29%, rgba(9,226,171,1) 61%); box-shadow:4px 8px 12px 8px rgba(9,226,171,0.16)}
.tb-ai:hover{filter:brightness(1.07)}
.tb-ai svg{width:16px; height:16px}
.tb-badge{position:absolute; top:2px; right:2px; width:8px; height:8px; border-radius:50%; background:#d32f2f; border:1.5px solid var(--topbar-bg)}
.tb-divider{width:1px; height:20px; background:var(--line); flex-shrink:0}
.tb-studio{display:flex; align-items:center; gap:8px; height:24px; padding:0 4px; border:1px solid var(--tb-pill-bd); border-radius:8px; background:transparent; cursor:pointer; font-family:inherit}
.tb-studio:hover{background:var(--hover-strong)}
.tb-studio-av{width:16px; height:16px; border-radius:50%; border:1px solid #80afff; background:#fff; display:inline-flex; align-items:center; justify-content:center; color:var(--primary); flex-shrink:0}
.tb-studio-name{font-size:10px; font-weight:600; color:var(--t1); white-space:nowrap}
.tb-studio-chev{color:var(--t3); flex-shrink:0; width:14px; height:14px}
.tb-company{display:flex; align-items:center; gap:8px; height:24px; padding:0 4px; border:1px solid var(--tb-pill-bd); border-radius:8px; background:transparent; cursor:pointer; font-family:inherit}
.tb-company:hover{background:var(--hover-strong)}
.tb-company-av{width:16px; height:16px; border-radius:50%; border:1px solid #80afff; background:#fff; color:#0e9f6e; font-size:8px; font-weight:800; display:inline-flex; align-items:center; justify-content:center; flex-shrink:0}
.tb-company-name{font-size:10px; font-weight:600; color:var(--t1); white-space:nowrap}
.tb-user-av{width:16px; height:16px; border-radius:50%; background:#2173ff; border:1px solid #80afff; color:#fff; font-size:7.5px; font-weight:700; display:inline-flex; align-items:center; justify-content:center; flex-shrink:0}
.tb-ws{display:flex; align-items:center; gap:8px; height:34px; padding:0 11px 0 8px; border-radius:9px; border:1px solid var(--line); background:transparent; cursor:pointer; color:var(--t1)}
.tb-ws-logo{width:20px; height:20px; border-radius:6px; background:var(--grad-ds); color:#fff; font-size:10px; font-weight:800; display:flex; align-items:center; justify-content:center}
.tb-ws-name{font-size:13px; font-weight:600}
.tb-avatar{width:30px; height:30px; border-radius:50%; background:linear-gradient(135deg,#7c3aed,#155DFC); color:#fff; font-size:11px; font-weight:700; display:flex; align-items:center; justify-content:center; cursor:pointer}

/* ── SHELL LAYOUT ── */
.app{display:flex; padding-top:36px; min-height:100vh}
/* Sidebar — DS component (design-system/sidebar.tsx): icon-chip active/hover, 24px rows, no border */
.sidebar{position:fixed; top:44px; left:8px; bottom:8px; width:250px; background:var(--sb-bg);
  border-radius:16px; box-shadow:8px 8px 16px 0 rgba(0,0,0,0.08); display:flex; flex-direction:column; gap:16px; padding:8px; z-index:10}
.sb-head{display:flex; align-items:center; justify-content:flex-end; height:24px}
.sb-collapse{width:24px; height:24px; display:flex; align-items:center; justify-content:center; border:none; background:transparent; color:var(--sb-icon-default); border-radius:8px; cursor:pointer; padding:4px; transition:background .15s, color .15s, box-shadow .15s}
.sb-collapse:hover{background:var(--sb-icon-hover-bg); color:var(--sb-icon-active); box-shadow:0 0 20px 0 rgba(33,115,255,0.5)}
.sb-collapse svg{width:16px; height:16px}
.sb-item{display:flex; align-items:center; justify-content:space-between; width:100%; height:24px; padding:0 4px 0 0; border-radius:8px; border:none; background:transparent;
  font-family:inherit; cursor:pointer; text-align:left; transition:background .15s}
.sb-item:hover:not(.active):not([disabled]){background:var(--sb-row-hover)}
.sb-item-l{display:flex; align-items:center; gap:8px; min-width:0}
.sb-chip{width:24px; height:24px; flex-shrink:0; display:flex; align-items:center; justify-content:center; border-radius:8px; padding:4px; background:transparent; transition:background .15s, box-shadow .15s}
.sb-ic{width:16px; height:16px; flex-shrink:0; color:var(--sb-icon-default); transition:color .15s}
.sb-item:hover:not(.active):not([disabled]) .sb-chip{background:var(--sb-icon-hover-bg); box-shadow:0 0 20px 0 rgba(33,115,255,0.5)}
.sb-item:hover:not(.active):not([disabled]) .sb-ic{color:var(--sb-icon-active)}
.sb-item.active .sb-chip{background:radial-gradient(circle at 61% 68%, rgba(33,115,255,1) 29%, rgba(9,226,171,1) 61%); box-shadow:8px 8px 20px 0 rgba(82,163,255,0.38)}
.sb-item.active .sb-ic{color:#fff}
.sb-label{font-size:12px; font-weight:600; line-height:1; color:var(--sb-text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:170px; transition:opacity .15s, max-width .16s}
.sb-item[disabled]{opacity:.45; cursor:not-allowed}
.sb-sep{height:1px; background:var(--sb-separator); margin:6px 4px}
.sb-foot{margin-top:auto; font-size:10.5px; color:rgba(255,255,255,0.35); padding:6px 4px 2px}

.main{flex:1; min-width:0; margin-left:266px; padding:24px clamp(24px,3vw,56px) 48px; max-width:2400px}

/* ── MODELS SUB-NAV ── */
.mtabs{display:flex; gap:2px; margin-bottom:18px; border-bottom:1px solid var(--line)}
.mtab{position:relative; padding:10px 16px; background:transparent; border:none; border-bottom:2px solid transparent; color:var(--field-supporting);
  font-family:inherit; font-size:14px; font-weight:500; cursor:pointer; margin-bottom:-1px; border-radius:8px 8px 0 0; transition:color .15s, background .15s}
.mtab:hover{color:var(--foreground); background:var(--tabs-hover-bg)}
.mtab.active{color:var(--primary); border-bottom-color:var(--primary)}
.mtab-soon{font-size:9px; font-weight:700; color:var(--t3); border:1px solid var(--line); border-radius:5px; padding:1px 4px; margin-left:6px; text-transform:uppercase; letter-spacing:.03em}

/* ── PAGE HEADER ── */
.ph{display:flex; align-items:flex-start; justify-content:space-between; gap:16px; margin-bottom:16px}
.ph-title{font-size:22px; font-weight:800; letter-spacing:-.01em}
.ph-desc{font-size:13px; color:var(--t2); margin-top:3px; max-width:640px}
.ph-count{font-size:13px; color:var(--t3); font-weight:500}
.ph-count b{color:var(--accent)}
.btn{display:inline-flex; align-items:center; gap:8px; height:40px; padding:0 16px; border-radius:8px; border:1px solid var(--btn-secondary-border);
  background:var(--btn-secondary-bg); color:var(--btn-secondary-fg); font-family:inherit; font-size:14px; font-weight:600; cursor:pointer; transition:all .2s}
.btn:hover{background:var(--btn-secondary-hover-bg); border-color:var(--btn-secondary-hover-bd)}
.btn-primary{background:var(--btn-primary-bg); border-color:transparent; color:#fff}
.btn-primary:hover{background:var(--btn-primary-hover-bg)}
.btn:disabled, .btn[disabled]{opacity:.45; cursor:not-allowed; pointer-events:none; box-shadow:none}

/* ── DS FILTERS COMPONENT (.dsf-*) — from settings.html ── */
.dsf-bar{display:flex; align-items:center; gap:16px; flex-wrap:wrap; margin-bottom:16px}
.dsf-left{display:flex; align-items:center; gap:8px; flex-wrap:wrap; flex:1 1 auto; min-width:0}
.dsf-search{display:flex; align-items:center; gap:8px; height:40px; padding:0 12px; min-width:240px; max-width:360px; flex:1 1 240px;
  background:var(--field-bg); border:1px solid var(--field-border); border-radius:8px; transition:border-color .15s, background .15s}
.dsf-search:focus-within{border-color:var(--field-border-focus)}
.dsf-search-ic{color:var(--t3); flex-shrink:0}
.dsf-search input{flex:1; min-width:0; background:transparent; border:none; outline:none; color:var(--t1); font-family:inherit; font-size:13px}
.dsf-search input::placeholder{color:var(--t3)}
.dsf-drop{position:relative; flex-shrink:0}
.dsf-drop-trigger{display:inline-flex; align-items:center; gap:6px; height:40px; padding:0 8px 0 12px; background:var(--field-bg);
  border:1px solid var(--field-border); border-radius:8px; color:var(--field-text); font-family:inherit; font-size:13px; font-weight:500; cursor:pointer; transition:border-color .12s}
.dsf-drop-trigger:hover{border-color:var(--field-border-hover)}
.dsf-drop.is-open .dsf-drop-trigger{border-color:var(--field-border-focus)}
.dsf-drop.has-value .dsf-drop-trigger{padding-left:5px; gap:5px}
.dsf-drop-label{color:var(--t2)}
.dsf-chev{color:var(--t3); flex-shrink:0; transition:transform .15s}
.dsf-drop.is-open .dsf-chev{transform:rotate(180deg)}
.dsf-chip{display:inline-flex; align-items:center; gap:3px; height:20px; padding:0 3px 0 8px; border-radius:8px;
  background:var(--tag-informative-bg); border:1px solid var(--tag-informative-bd); color:var(--tag-informative-fg); font-size:12px; font-weight:500}
.dsf-chip-x{display:inline-flex; align-items:center; justify-content:center; width:16px; height:16px; border:none; background:transparent;
  border-radius:4px; color:inherit; font-size:13px; line-height:1; cursor:pointer}
.dsf-chip-x:hover{background:rgba(43,127,255,0.30); color:#fff}
.dsf-menu{display:none; position:absolute; top:calc(100% + 6px); left:0; z-index:80; min-width:200px; padding:6px;
  background:var(--bg2); border:1px solid var(--line-strong); border-radius:10px; box-shadow:0 16px 40px rgba(0,0,0,0.45)}
html.theme-light .dsf-menu{background:#fff; box-shadow:0 16px 40px rgba(15,23,42,0.16)}
.dsf-drop.is-open .dsf-menu{display:block}
.dsf-menu-item{display:flex; align-items:center; gap:8px; width:100%; padding:7px 8px; border:none; background:transparent; border-radius:7px;
  color:var(--t1); font-family:inherit; font-size:13px; font-weight:500; cursor:pointer; text-align:left}
.dsf-menu-item:hover{background:var(--hover-strong)}
.dsf-menu-item.is-sel{color:var(--accent)}
.dsf-menu-check{width:16px; height:16px; display:inline-flex; align-items:center; justify-content:center; color:var(--accent); flex-shrink:0}
.dsf-menu-lbl{flex:1; white-space:nowrap}
.dsf-menu-count{font-size:11px; font-weight:700; color:var(--t3); background:rgba(255,255,255,0.06); padding:1px 6px; border-radius:6px}
html.theme-light .dsf-menu-count{background:rgba(15,23,42,0.06)}
.dsf-clear{display:inline-flex; align-items:center; height:36px; padding:0 6px; background:none; border:none; color:var(--t2);
  font-family:inherit; font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap}
.dsf-clear:hover{color:var(--accent)}

/* ── ENTITY LIST ── */
.elist{display:flex; flex-direction:column; border:1px solid var(--line); border-radius:12px; overflow:hidden; background:var(--bg2)}
html.theme-light .elist{background:#fff}
.elist-h{display:grid; grid-template-columns:minmax(0,2.4fr) 110px minmax(0,1.6fr) 90px 96px 116px 32px; gap:14px; align-items:center;
  padding:10px 16px; border-bottom:1px solid var(--line); font-size:11.5px; font-weight:600; color:var(--t3); text-transform:uppercase; letter-spacing:.03em}
.erow{display:grid; grid-template-columns:minmax(0,2.4fr) 110px minmax(0,1.6fr) 90px 96px 116px 32px; gap:14px; align-items:center;
  padding:14px 16px; border-bottom:1px solid var(--line); cursor:pointer; transition:background .1s}
.erow:last-child{border-bottom:none}
.erow:hover{background:var(--hover)}
.erow-name{font-size:14px; font-weight:700; color:var(--t1); display:flex; align-items:center; gap:8px}
.erow-ic{width:26px; height:26px; border-radius:7px; flex-shrink:0; display:flex; align-items:center; justify-content:center;
  background:rgba(16,185,129,0.12); color:#34d39c; border:1px solid rgba(16,185,129,0.28)}
.erow-internal{font-size:11.5px; color:var(--t3); font-family:'SF Mono',Menlo,monospace; margin-top:2px}
.erow-desc{font-size:12.5px; color:var(--t2); overflow:hidden; text-overflow:ellipsis; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical}
.erow-tags{display:flex; flex-wrap:wrap; gap:4px}
.tag{font-size:12px; font-weight:500; padding:4px 8px; border-radius:8px; height:20px; display:inline-flex; align-items:center; background:var(--tag-secondary-bg); color:var(--tag-secondary-fg); border:1px solid var(--tag-secondary-bd); white-space:nowrap}
.tag.pii{background:var(--tag-alert-bg); color:var(--tag-alert-fg); border-color:var(--tag-alert-bd)}
.tag.fin{background:var(--tag-success-bg); color:var(--tag-success-fg); border-color:var(--tag-success-bd)}
.type-badge{font-size:12px; font-weight:500; padding:4px 8px; border-radius:8px; height:20px; display:inline-flex; align-items:center; border:1px solid; white-space:nowrap}
.type-main{background:var(--tag-informative-bg); color:var(--tag-informative-fg); border-color:var(--tag-informative-bd)}
.type-child{background:var(--tag-purple-bg); color:var(--tag-purple-fg); border-color:var(--tag-purple-bd)}
.metric{font-size:13px; color:var(--t1); font-weight:600}
.metric small{color:var(--t3); font-weight:500; font-size:11px}
.status{display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:500; padding:4px 8px; border-radius:8px; height:20px; border:1px solid; white-space:nowrap}
.status-dot{width:6px; height:6px; border-radius:50%}
.status.pub{background:var(--tag-success-bg); color:var(--tag-success-fg); border-color:var(--tag-success-bd)}
.status.pub .status-dot{background:var(--tag-success-fg)}
.status.draft{background:var(--tag-alert-bg); color:var(--tag-alert-fg); border-color:var(--tag-alert-bd)}
.status.draft .status-dot{background:var(--tag-alert-fg)}
.erow-chev{color:var(--t3); display:flex; justify-content:flex-end}
.pgn{display:flex; align-items:center; gap:6px; justify-content:flex-end; margin-top:14px; font-size:12px; color:var(--t3)}
.pgn b{color:var(--t2)}
.empty{padding:56px 24px; text-align:center; color:var(--t3); font-size:13px}
.empty-t{font-size:15px; font-weight:600; color:var(--t1); margin-bottom:6px}

/* ── PREVIEW SLIDE-OUT ── */
.slideout-scrim{position:fixed; inset:0; background:rgba(0,0,0,0.4); backdrop-filter:blur(6px); z-index:60; opacity:0; pointer-events:none; transition:opacity .3s}
.slideout-scrim.open{opacity:1; pointer-events:auto}
.slideout{position:fixed; top:0; right:0; bottom:0; width:min(600px,94vw); background:var(--surface-floating-default); backdrop-filter:blur(30px); border-radius:24px 0 0 24px;
  z-index:61; transform:translateX(100%); transition:transform .3s ease-out; display:flex; flex-direction:column; box-shadow:-24px -24px 60px 0 rgba(0,0,0,0.08)}
.slideout.open{transform:translateX(0)}
.so-head{display:flex; align-items:flex-start; gap:12px; padding:20px 22px 16px; border-bottom:1px solid var(--line)}
.so-title{font-size:17px; font-weight:800}
.so-internal{font-size:12px; color:var(--t3); font-family:'SF Mono',Menlo,monospace; margin-top:2px}
.so-close{margin-left:auto; width:30px; height:30px; border-radius:8px; border:1px solid var(--line); background:transparent; color:var(--t2); cursor:pointer; flex-shrink:0}
.so-close:hover{color:var(--t1); border-color:var(--line-strong)}
.so-body{flex:1; overflow:auto; padding:18px 22px}
.so-desc{font-size:13px; color:var(--t2); line-height:1.6; margin-bottom:18px}
.so-sec{margin-bottom:20px}
.so-sec-h{font-size:11px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--t3); margin-bottom:10px; display:flex; align-items:center; justify-content:space-between}
.so-sec-h a{color:var(--accent); text-decoration:none; font-size:11px; font-weight:600; letter-spacing:0; text-transform:none}
.so-tbl{display:flex; align-items:center; gap:8px; padding:8px 10px; border:1px solid var(--line); border-radius:8px; margin-bottom:6px; font-size:12.5px}
.so-tbl-name{font-weight:600}
.so-tbl-badge{margin-left:auto; font-size:10px; font-weight:700; padding:1px 6px; border-radius:5px; background:rgba(43,127,255,0.12); color:#7db1ff}
.so-priv{display:flex; flex-wrap:wrap; gap:6px}
.so-priv span{font-size:11px; font-weight:600; padding:3px 9px; border-radius:6px; background:var(--hover); border:1px solid var(--line); color:var(--t2)}
.so-foot{padding:16px 22px; border-top:1px solid var(--line); display:flex; gap:10px}
.so-foot .btn{flex:1; justify-content:center}
.placeholder{padding:60px 24px; text-align:center; border:1px dashed var(--line-strong); border-radius:12px; color:var(--t3); font-size:13px; background:rgba(255,255,255,0.015)}
.placeholder-t{font-size:15px; font-weight:600; color:var(--t1); margin-bottom:6px}

/* ── ENTITY DETAIL ── */
.breadcrumb{font-size:12.5px; margin-bottom:14px}
.breadcrumb ol{list-style:none; margin:0; padding:0; display:flex; align-items:center; gap:7px; flex-wrap:wrap}
.breadcrumb li{display:flex; align-items:center; min-width:0}
.breadcrumb a{color:var(--t3); text-decoration:none; cursor:pointer; border-radius:4px; transition:color .12s}
.breadcrumb a:hover{color:var(--accent); text-decoration:underline; text-underline-offset:2px}
.breadcrumb a:focus-visible{outline:2px solid var(--field-border-focus,var(--primary)); outline-offset:2px; color:var(--accent)}
.crumb-sep{color:var(--field-placeholder); user-select:none}
.crumb-current{color:var(--t2); font-weight:600; max-width:min(46vw,320px); overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.detail-head{display:flex; align-items:flex-start; gap:16px; margin-bottom:18px}
.dh-l{flex:1; min-width:0}
.dh-title-row{display:flex; align-items:center; gap:10px; flex-wrap:wrap}
.dh-title{font-size:22px; font-weight:800; letter-spacing:-.01em}
.dh-internal{font-size:12.5px; color:var(--t3); font-family:'SF Mono',Menlo,monospace; margin-top:4px}
.dh-desc{font-size:13px; color:var(--t2); margin-top:8px; max-width:680px; line-height:1.55}
.dh-actions{display:flex; align-items:center; gap:8px; flex-shrink:0}
.publish-hint{display:inline-flex; align-items:center; gap:7px; font-size:12px; color:#facc15; background:rgba(253,199,0,0.08); border:1px solid rgba(253,199,0,0.28); border-radius:8px; padding:6px 11px}

.dsec{margin-bottom:22px}
.dsec-h{display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:12px}
.dsec-t{font-size:14px; font-weight:700}
.dsec-sub{font-size:12px; color:var(--t3); font-weight:400; margin-left:8px}
.dcard{border:1px solid var(--line); border-radius:10px; background:var(--bg2); overflow:hidden}
html.theme-light .dcard{background:#fff}
.drow{display:flex; align-items:center; gap:12px; padding:12px 14px; border-bottom:1px solid var(--line); font-size:13px}
.drow:last-child{border-bottom:none}
.drow-ic{width:26px; height:26px; border-radius:7px; flex-shrink:0; display:flex; align-items:center; justify-content:center; background:var(--hover); color:var(--t2); border:1px solid var(--line)}
.drow-name{font-weight:600}
.drow-mono{font-family:'SF Mono',Menlo,monospace; font-size:12px; color:var(--t3)}
.drow-meta{margin-left:auto; display:flex; align-items:center; gap:10px; color:var(--t3); font-size:12px}
.drow-link{color:var(--t3); cursor:pointer}
.drow-link:hover{color:var(--accent)}
.mini-badge{font-size:10px; font-weight:700; padding:2px 7px; border-radius:5px; white-space:nowrap}
.mb-primary{background:rgba(43,127,255,0.12); color:#7db1ff; border:1px solid rgba(43,127,255,0.28)}
.mb-secondary{background:var(--hover); color:var(--t3); border:1px solid var(--line)}
.add-row{display:flex; align-items:center; justify-content:center; gap:8px; width:100%; padding:11px; border:1px dashed var(--line-strong); border-radius:10px; background:transparent; color:var(--t2); font-family:inherit; font-size:12.5px; font-weight:600; cursor:pointer; margin-top:8px}
.add-row:hover{border-color:var(--accent); color:var(--accent)}

/* cardinality + relationships */
.card-badge{font-size:10.5px; font-weight:700; padding:2px 8px; border-radius:6px; background:rgba(167,139,250,0.12); color:#c4b5fd; border:1px solid rgba(167,139,250,0.28); white-space:nowrap}
.strong-badge{font-size:10px; font-weight:700; padding:2px 7px; border-radius:5px; background:rgba(5,223,114,0.10); color:#4ade80; border:1px solid rgba(5,223,114,0.26)}
.weak-badge{font-size:10px; font-weight:700; padding:2px 7px; border-radius:5px; background:var(--hover); color:var(--t3); border:1px solid var(--line)}

/* privileges */
.priv-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:8px}
.priv-cell{display:flex; align-items:center; gap:9px; padding:11px 12px; border:1px solid var(--line); border-radius:9px; background:var(--bg2); font-size:13px; font-weight:600}
html.theme-light .priv-cell{background:#fff}
.priv-cell svg{color:#7db1ff}
.cpriv{border:1px solid var(--line); border-radius:10px; padding:12px 14px; background:var(--bg2); margin-bottom:8px}
html.theme-light .cpriv{background:#fff}
.cpriv-name{font-size:13px; font-weight:700; margin-bottom:8px; display:flex; align-items:center; gap:8px}
.cpriv-perms{display:flex; flex-wrap:wrap; gap:6px}
.perm-chip{font-size:11px; font-weight:600; padding:3px 9px; border-radius:6px; background:var(--hover); border:1px solid var(--line); color:var(--t2)}
.perm-chip.data{background:rgba(253,199,0,0.08); color:#facc15; border-color:rgba(253,199,0,0.26)}
.perm-chip.api{background:rgba(43,127,255,0.10); color:#7db1ff; border-color:rgba(43,127,255,0.28)}

/* endpoints / api contracts */
.ep-row{display:flex; align-items:center; gap:12px; padding:11px 14px; border-bottom:1px solid var(--line); font-size:13px}
.ep-row:last-child{border-bottom:none}
.method{font-size:10.5px; font-weight:800; letter-spacing:.03em; padding:3px 8px; border-radius:6px; min-width:56px; text-align:center; flex-shrink:0}
.m-get{background:rgba(5,223,114,0.10); color:#4ade80; border:1px solid rgba(5,223,114,0.26)}
.m-post{background:rgba(43,127,255,0.10); color:#7db1ff; border:1px solid rgba(43,127,255,0.28)}
.m-patch{background:rgba(253,199,0,0.10); color:#facc15; border:1px solid rgba(253,199,0,0.28)}
.m-delete{background:rgba(239,68,68,0.10); color:#f87171; border:1px solid rgba(239,68,68,0.28)}
.ep-path{font-family:'SF Mono',Menlo,monospace; font-size:12px; color:var(--t2)}
.ep-custom{margin-left:auto; font-size:10px; font-weight:700; padding:2px 7px; border-radius:5px; background:rgba(43,127,255,0.12); color:#7db1ff; text-transform:uppercase; letter-spacing:.03em}
.ep-default{margin-left:auto; font-size:11px; color:var(--t3)}

/* ── TABLES + COLUMNS ── */
.dtable{border:1px solid var(--table-border); border-radius:8px; overflow:hidden; background:var(--table-bg)}
.dtable-h{display:grid; align-items:center; gap:12px; padding:10px 12px; background:var(--table-header-bg); border-bottom:1px solid var(--table-border);
  font-size:12px; font-weight:500; color:var(--table-header-text)}
.dtable-r{display:grid; align-items:center; gap:12px; padding:12px; border-bottom:1px solid var(--table-border); font-size:13px; color:var(--table-cell-text); cursor:pointer; transition:background .1s}
.dtable-r:last-child{border-bottom:none}
.dtable-r:hover{background:var(--table-row-hover-bg)}
.dtable-r.is-system{cursor:default; opacity:.85}
.dtable-r.is-system:hover{background:transparent}
.cols-grid{grid-template-columns:minmax(0,1.6fr) minmax(0,1.4fr) 110px minmax(0,120px) 120px 60px}
.col-name{display:flex; align-items:center; gap:8px; font-weight:600; color:var(--foreground)}
.col-mono{font-family:'SF Mono',Menlo,monospace; font-size:11.5px; color:var(--field-placeholder); margin-top:2px}
.col-disp{color:var(--field-text)}
.sys-lock{width:22px; height:22px; border-radius:6px; flex-shrink:0; display:flex; align-items:center; justify-content:center; background:var(--muted); color:var(--field-placeholder)}
.col-ic{width:22px; height:22px; border-radius:6px; flex-shrink:0; display:flex; align-items:center; justify-content:center; background:var(--muted); color:var(--field-icon)}
.col-type{display:inline-flex; align-items:center; font-size:11px; font-weight:600; padding:3px 8px; border-radius:6px; border:1px solid; white-space:nowrap; font-family:'SF Mono',Menlo,monospace}
.t-text{background:var(--tag-secondary-bg); color:var(--tag-secondary-fg); border-color:var(--tag-secondary-bd)}
.t-num{background:var(--tag-informative-bg); color:var(--tag-informative-fg); border-color:var(--tag-informative-bd)}
.t-date{background:var(--tag-lightblue-bg); color:var(--tag-lightblue-fg); border-color:var(--tag-lightblue-bd)}
.t-bool{background:var(--tag-limegreen-bg); color:var(--tag-limegreen-fg); border-color:var(--tag-limegreen-bd)}
.t-enum{background:var(--tag-purple-bg); color:var(--tag-purple-fg); border-color:var(--tag-purple-bd)}
.t-ref{background:var(--tag-alert-bg); color:var(--tag-alert-fg); border-color:var(--tag-alert-bd)}
.t-uuid,.t-json{background:var(--muted); color:var(--field-placeholder); border-color:var(--field-border)}
.flags{display:flex; gap:4px; flex-wrap:wrap}
.flag{font-size:9.5px; font-weight:800; letter-spacing:.04em; padding:2px 5px; border-radius:5px; background:var(--muted); color:var(--field-text); border:1px solid var(--field-border)}
.flag.on{background:var(--tag-informative-bg); color:var(--tag-informative-fg); border-color:var(--tag-informative-bd)}
.sens{font-size:10px; font-weight:700; padding:2px 7px; border-radius:6px; white-space:nowrap}
.sens.pii{background:var(--tag-alert-bg); color:var(--tag-alert-fg); border:1px solid var(--tag-alert-bd)}
.sens.fin{background:var(--tag-success-bg); color:var(--tag-success-fg); border:1px solid var(--tag-success-bd)}
.sens.conf{background:var(--tag-error-bg); color:var(--tag-error-fg); border:1px solid var(--tag-error-bd)}
.sens.none{color:var(--field-placeholder)}
.cols-toolbar{display:flex; align-items:center; gap:12px; margin-bottom:14px}
.cols-toggle{display:inline-flex; align-items:center; gap:7px; font-size:12.5px; color:var(--field-text); cursor:pointer; background:none; border:none; font-family:inherit; margin-left:auto}
.cols-toggle input{accent-color:var(--primary)}

/* Column detail slide-out field rows */
.so-fields{display:flex; flex-direction:column}
.so-field{display:flex; align-items:flex-start; justify-content:space-between; gap:14px; padding:11px 0; border-bottom:1px solid var(--field-border); font-size:13px}
.so-field:last-child{border-bottom:none}
.so-field-l{color:var(--field-text); flex-shrink:0}
.so-field-v{color:var(--foreground); font-weight:500; text-align:right}
.so-field-v.mono{font-family:'SF Mono',Menlo,monospace; font-size:12px}
.so-locked{display:inline-flex; align-items:center; gap:4px; color:var(--field-placeholder); font-size:11px}
.enum-row{display:flex; align-items:baseline; gap:10px; padding:8px 10px; border:1px solid var(--field-border); border-radius:8px; margin-bottom:6px; font-size:12.5px}
.enum-val{font-family:'SF Mono',Menlo,monospace; font-size:11.5px; color:var(--tag-purple-fg); background:var(--tag-purple-bg); border:1px solid var(--tag-purple-bd); padding:1px 7px; border-radius:5px; flex-shrink:0}
.enum-lbl{font-weight:600; color:var(--foreground); flex-shrink:0}
.enum-desc{color:var(--field-text)}

/* Create / edit column form (in modal) */
.mform{display:flex; flex-direction:column; gap:14px}
.mfield{display:flex; flex-direction:column; gap:6px}
.mfield-l{font-size:12px; font-weight:600; color:var(--field-label)}
.minput,.mselect,.mtextarea{height:40px; padding:0 12px; border-radius:8px; background:var(--field-bg); border:1px solid var(--field-border); color:var(--field-text); font-family:inherit; font-size:14px; outline:none; transition:border-color .12s}
.mtextarea{height:auto; padding:10px 12px; resize:vertical; min-height:64px}
.minput:focus,.mselect:focus,.mtextarea:focus{border-color:var(--field-border-focus)}
.minput::placeholder,.mtextarea::placeholder{color:var(--field-placeholder)}
.mrow{display:flex; gap:12px}
.mrow .mfield{flex:1}
.mfield input[type=checkbox]{accent-color:var(--primary)}

/* ── DATA GRID + RELATIONSHIPS (increment 4) ── */
.dcell{overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--field-text)}
.dcell.mono{font-family:'SF Mono',Menlo,monospace; font-size:12px; color:var(--field-placeholder)}
.rec-nav{display:flex; gap:6px; margin-left:auto}
.rec-nav button{width:28px; height:28px; border-radius:6px; border:1px solid var(--field-border); background:transparent; color:var(--field-text); cursor:pointer; display:inline-flex; align-items:center; justify-content:center}
.rec-nav button:hover{border-color:var(--field-border-hover); color:var(--foreground)}
.rec-nav button:disabled{opacity:.35; cursor:not-allowed}
.ondel{font-size:11px; color:var(--field-placeholder)}
.data-toolbar{display:flex; align-items:center; gap:10px; margin-bottom:14px}

/* ── MODAL + TOAST ── */
.modal-scrim{position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:70; display:none; align-items:center; justify-content:center; padding:20px}
.modal-scrim.open{display:flex}
.modal{width:min(480px,94vw); background:var(--surface-floating-default); backdrop-filter:blur(10px); border:1px solid var(--line); border-radius:16px; box-shadow:0 24px 64px rgba(0,0,0,0.5); overflow:hidden}
html.theme-light .modal{background:#fff}
.modal-head{padding:18px 20px 12px; display:flex; align-items:center; gap:12px}
.modal-ic{width:36px; height:36px; border-radius:10px; flex-shrink:0; display:flex; align-items:center; justify-content:center; background:rgba(253,199,0,0.12); color:#facc15; border:1px solid rgba(253,199,0,0.28)}
.modal-title{font-size:16px; font-weight:800}
.modal-body{padding:0 20px 16px; font-size:13px; color:var(--t2); line-height:1.6}
.impact{margin-top:12px; border:1px solid var(--line); border-radius:9px; overflow:hidden}
.impact-row{display:flex; align-items:center; gap:9px; padding:9px 12px; border-bottom:1px solid var(--line); font-size:12.5px}
.impact-row:last-child{border-bottom:none}
.impact-row svg{flex-shrink:0}
.modal-foot{padding:14px 20px; border-top:1px solid var(--line); display:flex; gap:10px; justify-content:flex-end}
.toast{position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(20px); z-index:90; background:var(--bg2); border:1px solid var(--line-strong);
  border-radius:10px; padding:11px 16px; font-size:13px; font-weight:600; box-shadow:0 12px 36px rgba(0,0,0,0.4); opacity:0; pointer-events:none; transition:opacity .2s, transform .2s; display:flex; align-items:center; gap:9px}
html.theme-light .toast{background:#fff}
.toast.show{opacity:1; transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:rgba(5,223,114,0.4)}
.toast.ok svg{color:#4ade80}

/* ── Reference-data value status pill ── */
.rstat{display:inline-flex; align-items:center; gap:6px; height:22px; padding:0 9px; border-radius:999px; font-size:11.5px; font-weight:600; border:1px solid transparent}
.rstat .rstat-dot{width:6px; height:6px; border-radius:50%; background:currentColor}
.rstat.on{color:var(--tag-success-fg,#34d399); background:var(--tag-success-bg,rgba(52,211,153,0.12)); border-color:var(--tag-success-bd,rgba(52,211,153,0.3))}
.rstat.off{color:var(--t3); background:var(--muted,rgba(255,255,255,0.05)); border-color:var(--line)}
.rtoggle{appearance:none; -webkit-appearance:none; cursor:pointer; width:34px; height:20px; border-radius:999px; background:var(--muted,rgba(255,255,255,0.08)); border:1px solid var(--line); position:relative; flex-shrink:0; transition:background .15s}
.rtoggle:checked{background:var(--primary)}
.rtoggle::after{content:''; position:absolute; top:1px; left:1px; width:16px; height:16px; border-radius:50%; background:#fff; transition:transform .15s}
.rtoggle:checked::after{transform:translateX(14px)}

/* ── CSV / Excel import dropzone ── */
.imp-drop{border:1.5px dashed var(--line-strong); border-radius:12px; padding:26px 20px; text-align:center; background:rgba(255,255,255,0.015); color:var(--t2); font-size:13px}
.imp-drop svg{color:var(--t3); margin-bottom:8px}
.imp-drop b{color:var(--t1)}
.imp-drop .imp-link{color:var(--primary); cursor:pointer; text-decoration:underline; text-underline-offset:2px}
.imp-map{margin-top:14px; border:1px solid var(--line); border-radius:9px; overflow:hidden; font-size:12.5px}
.imp-map-r{display:grid; grid-template-columns:1fr 20px 1fr; align-items:center; gap:8px; padding:8px 12px; border-bottom:1px solid var(--line)}
.imp-map-r:last-child{border-bottom:none}
.imp-map-r .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:11.5px; color:var(--t2)}

/* ── Version / scope callouts + floating toggle ── */
.vcallout{display:flex; align-items:center; gap:10px; border:1px dashed var(--line-strong); border-radius:10px; padding:11px 14px; margin-top:12px; font-size:12.5px; color:var(--t2); background:rgba(255,255,255,0.015)}
.vcallout-tag{flex-shrink:0; font-size:10.5px; font-weight:700; letter-spacing:.03em; text-transform:uppercase; color:var(--tag-purple-fg,#c084fc); background:var(--tag-purple-bg,rgba(168,85,247,0.14)); border:1px solid var(--tag-purple-bd,rgba(168,85,247,0.3)); padding:2px 7px; border-radius:6px}
.vtoggle{position:fixed; bottom:16px; right:16px; z-index:80; display:flex; align-items:center; gap:8px; background:var(--surface-raised,var(--bg2)); border:1px solid var(--line); border-radius:10px; padding:6px 8px 6px 12px; box-shadow:0 8px 24px rgba(0,0,0,0.28); font-size:12px}
.vtoggle-lbl{font-weight:600; color:var(--t2)}
.vtoggle-seg{display:flex; gap:3px}
.vtoggle-seg button{padding:4px 10px; border-radius:6px; border:1px solid transparent; background:transparent; color:var(--t2); font-size:11.5px; font-weight:600; cursor:pointer; white-space:nowrap}
.vtoggle-seg button.on{background:var(--primary); color:#fff; border-color:var(--primary)}

/* ── Persistent page header (Models module) ── */
.page-h1{font-size:30px; font-weight:800; letter-spacing:-.02em; color:var(--t1); margin:2px 0 16px}
.mtabs.mtabs-lg{gap:6px; margin-bottom:22px}
.mtabs.mtabs-lg .mtab{padding:9px 4px; margin-right:20px; font-size:14px; font-weight:600}

/* ── Toolbar row: filters left, view-toggle + primary right ── */
.tbar{display:flex; align-items:center; gap:10px; margin-bottom:20px; flex-wrap:wrap}
.tbar .dsf-search{max-width:300px}
.tbar-spring{flex:1}
.vw-seg{display:inline-flex; gap:2px; padding:3px; border-radius:9px; border:1px solid var(--field-border); background:var(--field-bg)}
.vw-seg button{width:30px; height:28px; display:flex; align-items:center; justify-content:center; border:none; background:transparent; color:var(--t3); border-radius:6px; cursor:pointer}
.vw-seg button:hover{color:var(--t1)}
.vw-seg button.on{background:var(--surface-raised,var(--bg2)); color:var(--primary); box-shadow:0 1px 2px rgba(0,0,0,0.18)}
html.theme-light .vw-seg button.on{background:#fff}

/* ── Avatars ── */
.av{display:inline-flex; align-items:center; justify-content:center; border-radius:50%; color:#fff; font-weight:700; flex-shrink:0; border:1.5px solid var(--bg2)}
.av-sm{width:22px; height:22px; font-size:9px}
.av-md{width:26px; height:26px; font-size:10px}
.av-stack{display:inline-flex}
.av-stack > *{margin-left:-7px}
.av-stack > *:first-child{margin-left:0}
.av-more{display:inline-flex; align-items:center; justify-content:center; width:22px; height:22px; border-radius:50%; background:var(--muted); color:var(--t2); font-size:9px; font-weight:700; border:1.5px solid var(--bg2)}

/* ── Model card grid ── */
.mcard-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:16px}
.mcard{display:flex; flex-direction:column; gap:12px; padding:18px; border:1px solid var(--card-border,var(--line)); border-radius:14px; background:var(--card-bg,var(--bg2)); cursor:pointer; transition:border-color .12s, box-shadow .12s, transform .12s}
/* Light mode: soft resting shadow so white cards float on the blue-gray canvas */
html.theme-light .mcard, html.theme-light .lrow, html.theme-light .md-ecard, html.theme-light .md-trow, html.theme-light .md-ccard, html.theme-light .md-tile, html.theme-light .md-sec, html.theme-light .mtbl-wrap{box-shadow:0 1px 2px rgba(15,23,42,0.04), 0 2px 6px rgba(15,23,42,0.05)}
html.theme-light .mcard:hover, html.theme-light .lrow:hover, html.theme-light .md-ecard:hover, html.theme-light .md-trow:hover, html.theme-light .md-ccard:hover{box-shadow:0 4px 14px rgba(15,23,42,0.10)}
.mcard:hover{border-color:var(--field-border-hover,var(--line-strong)); box-shadow:0 8px 24px rgba(0,0,0,0.16); transform:translateY(-1px)}
.mcard-head{display:flex; align-items:flex-start; gap:8px}
.mcard-title{font-size:16px; font-weight:700; color:var(--t1); letter-spacing:-.01em}
.mcard-head .av-stack{margin-left:auto}
.mcard-desc{font-size:13px; line-height:1.5; color:var(--t2); overflow:hidden; text-overflow:ellipsis; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; min-height:39px}
.mcard-meta{display:flex; align-items:center; gap:12px; font-size:12.5px; color:var(--t2)}
.mcard-meta .metaico{display:inline-flex; align-items:center; gap:5px}
.mcard-meta .metaico svg{color:var(--t3)}
.mcard-foot{display:flex; align-items:center; justify-content:space-between; gap:8px; padding-top:12px; border-top:1px solid var(--line); font-size:12.5px; color:var(--t2)}
.mcard-owner{display:flex; align-items:center; gap:7px}
.mcard-date{color:var(--t3); font-size:12px}

/* origin / category badges + version chip */
.obadge{display:inline-flex; align-items:center; gap:5px; height:22px; padding:0 9px; border-radius:7px; font-size:11.5px; font-weight:600; border:1px solid transparent; white-space:nowrap}
.obadge.custom{color:var(--t2); background:var(--muted); border-color:var(--line)}
.obadge.implemented{color:var(--tag-informative-fg,#7db1ff); background:var(--tag-informative-bg,rgba(43,127,255,0.14)); border-color:var(--tag-informative-bd,rgba(43,127,255,0.3))}
.obadge.cloned{color:var(--tag-purple-fg,#c084fc); background:var(--tag-purple-bg,rgba(168,85,247,0.14)); border-color:var(--tag-purple-bd,rgba(168,85,247,0.3))}
.ver-chip{display:inline-flex; align-items:center; gap:4px; height:20px; padding:0 7px; border-radius:6px; font-size:11px; font-weight:700; color:var(--tag-informative-fg,#7db1ff); background:var(--tag-informative-bg,rgba(43,127,255,0.1)); border:1px solid var(--tag-informative-bd,rgba(43,127,255,0.22))}
.st-pill{display:inline-flex; align-items:center; gap:6px; font-size:12.5px; font-weight:600}
.st-pill .st-dot{width:7px; height:7px; border-radius:50%}
.st-pill.published{color:var(--tag-success-fg,#34d399)} .st-pill.published .st-dot{background:var(--tag-success-fg,#34d399)}
.st-pill.draft{color:var(--t3)} .st-pill.draft .st-dot{background:var(--t3)}
.st-pill.pending{color:var(--tag-alert-fg,#fbbf24)} .st-pill.pending .st-dot{background:var(--tag-alert-fg,#fbbf24)}
.st-pill.deprecated{color:var(--tag-alert-fg,#fbbf24)} .st-pill.deprecated .st-dot{background:var(--tag-alert-fg,#fbbf24)}
.st-pill.archived{color:var(--t3); opacity:.8} .st-pill.archived .st-dot{background:var(--t3)}

/* ── Rich list rows (Entities / Tables / Reference) ── */
.lrows{display:flex; flex-direction:column; gap:12px}
.lrow{border:1px solid var(--card-border,var(--line)); border-radius:12px; background:var(--card-bg,var(--bg2)); padding:15px 18px; cursor:pointer; transition:border-color .12s, box-shadow .12s}
.lrow:hover{border-color:var(--field-border-hover,var(--line-strong)); box-shadow:0 4px 16px rgba(0,0,0,0.12)}
.lrow-top{display:flex; align-items:center; gap:10px}
.lrow-ic{width:34px; height:34px; border-radius:9px; display:flex; align-items:center; justify-content:center; flex-shrink:0; background:var(--tag-informative-bg,rgba(43,127,255,0.14)); color:var(--tag-informative-fg,#7db1ff)}
.lrow-ic.ic-tbl{background:var(--tag-purple-bg,rgba(168,85,247,0.14)); color:var(--tag-purple-fg,#c084fc)}
.lrow-ic.ic-ref{background:var(--tag-success-bg,rgba(52,211,153,0.14)); color:var(--tag-success-fg,#34d399)}
.lrow-title{font-size:15px; font-weight:700; color:var(--t1); flex-shrink:0}
.lrow-right{margin-left:auto; display:flex; align-items:center; gap:12px; flex-shrink:0}
.lrow-time{font-size:12px; color:var(--t3); white-space:nowrap}
.lrow-menu{width:26px; height:26px; display:flex; align-items:center; justify-content:center; border:none; background:transparent; color:var(--t3); border-radius:7px; cursor:pointer}
.lrow-menu:hover{background:var(--hover); color:var(--t1)}
.lrow-desc{font-size:13px; color:var(--t2); margin:9px 0 0 44px}
.lrow-foot{display:flex; align-items:center; gap:10px; margin:11px 0 0 44px; font-size:12.5px; color:var(--t2); flex-wrap:wrap}
.lrow-owner{display:flex; align-items:center; gap:7px}
.lrow-sep{color:var(--field-placeholder)}
.lrow-metric{display:inline-flex; align-items:center; gap:6px}
.lrow-metric svg{color:var(--t3)}
.lrow-foot-r{margin-left:auto; display:flex; align-items:center; gap:10px}
.chip{display:inline-flex; align-items:center; gap:5px; height:23px; padding:0 9px; border-radius:7px; font-size:12px; font-weight:500; border:1px solid var(--line); background:var(--muted); color:var(--t2); white-space:nowrap}
.chip svg{color:var(--t3); flex-shrink:0}
.chip-model{font-weight:600; color:var(--t1)}
.flt-btn{display:inline-flex; align-items:center; gap:7px; height:40px; padding:0 14px; border-radius:10px; border:1px solid var(--field-border); background:var(--field-bg); color:var(--t2); font-size:13px; font-weight:500; cursor:pointer}
.flt-btn:hover{color:var(--t1); border-color:var(--field-border-hover,var(--line-strong))}
.flt-badge{display:inline-flex; align-items:center; justify-content:center; min-width:17px; height:17px; padding:0 4px; border-radius:9px; background:var(--primary); color:#fff; font-size:10.5px; font-weight:800; margin-left:3px}

/* ── Filters slideout (all-filters) ── */
.flt-opts{display:flex; flex-wrap:wrap; gap:8px}
.flt-opt{display:inline-flex; align-items:center; gap:7px; height:32px; padding:0 12px; border-radius:8px; border:1px solid var(--field-border); background:var(--field-bg); color:var(--t2); font-size:12.5px; font-weight:500; cursor:pointer; transition:background .1s, border-color .1s, color .1s}
.flt-opt:hover{color:var(--t1); border-color:var(--field-border-hover,var(--line-strong))}
.flt-opt.on{background:var(--tag-informative-bg,rgba(43,127,255,0.14)); color:var(--tag-informative-fg,#7db1ff); border-color:var(--tag-informative-bd,rgba(43,127,255,0.4))}
.flt-c{font-size:11px; font-weight:700; color:var(--field-placeholder)}
.flt-opt.on .flt-c{color:var(--tag-informative-fg,#7db1ff)}

/* ── Row ⋯ action menu ── */
.rowmenu{position:fixed; z-index:95; min-width:190px; background:var(--surface-floating-default,var(--bg2)); border:1px solid var(--line-strong,var(--line)); border-radius:11px; box-shadow:0 14px 36px rgba(0,0,0,0.4); padding:5px; backdrop-filter:blur(24px) saturate(1.4)}
html.theme-light .rowmenu{background:#fff}
.rowmenu-item{display:flex; align-items:center; gap:10px; width:100%; height:34px; padding:0 10px; border:none; background:transparent; color:var(--t1); font-family:inherit; font-size:13px; font-weight:500; text-align:left; border-radius:7px; cursor:pointer}
.rowmenu-item:hover{background:var(--hover)}
.rowmenu-item svg{color:var(--t3); flex-shrink:0}
.rowmenu-item.danger{color:var(--tag-error-fg,#f87171)}
.rowmenu-item.danger svg{color:var(--tag-error-fg,#f87171)}
.rowmenu-item.danger:hover{background:var(--tag-error-bg,rgba(224,82,82,0.12))}
.rowmenu-sep{height:1px; background:var(--line); margin:4px 6px}
.btn-danger{background:var(--tag-error-fg,#e05252); color:#fff; border-color:transparent}
.btn-danger:hover{filter:brightness(1.08)}

/* ── Model preview slideout (rich) ── */
.mp-head{align-items:flex-start !important}
.mp-insights{border:1px solid var(--line); border-left:3px solid var(--primary); border-radius:10px; padding:12px 15px; margin-bottom:15px; background:linear-gradient(120deg, rgba(43,127,255,0.07), rgba(52,211,153,0.06))}
.mp-insights ul{margin:0; padding-left:18px; display:flex; flex-direction:column; gap:6px}
.mp-insights li{font-size:13px; color:var(--t2); line-height:1.4}
.mp-stats{display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin:0 0 16px}
.mp-stat{border:1px solid var(--card-border,var(--line)); border-radius:12px; padding:13px 14px; background:var(--card-bg,transparent)}
.mp-stat-v{font-size:23px; font-weight:800; color:var(--t1); line-height:1}
.mp-stat-l{font-size:11.5px; color:var(--t2); margin-top:6px}
.mp-ai-h{display:flex; align-items:center; gap:7px; font-size:12.5px; font-weight:700; color:var(--primary); margin-bottom:9px; letter-spacing:.01em}
.mp-head-l{display:flex; align-items:flex-start; gap:12px; min-width:0}
.mp-head-r{display:flex; align-items:center; gap:8px; flex-shrink:0}
.mp-title-row{display:flex; align-items:center; gap:10px; flex-wrap:wrap}
.mp-badges{margin-top:8px; display:flex; gap:8px; align-items:center; flex-wrap:wrap}
/* interactive ER mini-diagram */
.diag-wrap{position:relative; height:300px; border:1px solid var(--line); border-radius:14px; overflow:hidden; margin:10px 0 18px; background:var(--muted,#eef1f6)}
html.theme-light .diag-wrap{background:#eef1f6}
.diag-svg{width:100%; height:100%; display:block; cursor:grab; background-image:radial-gradient(rgba(120,132,156,0.22) 1px, transparent 1px); background-size:18px 18px}
.diag-edge{stroke:var(--line-strong,#c3ccd8); stroke-width:1.4; transition:stroke .12s, opacity .12s}
.diag-svg.tracing .diag-edge{opacity:.28}
.diag-edge.hot{stroke:var(--primary); opacity:1; stroke-width:2.2}
.diag-node{cursor:pointer; transition:opacity .12s}
.diag-svg.tracing .diag-node{opacity:.32}
.diag-node.hot, .diag-node.warm{opacity:1}
.diag-box{fill:var(--card-bg,#fff); stroke:var(--line-strong,#c3ccd8); stroke-width:1}
html:not(.theme-light) .diag-box{fill:var(--surface-raised,#131C2E)}
.diag-node.hot .diag-box{stroke:var(--primary); stroke-width:1.7}
.diag-top{fill:var(--primary)}
.diag-label{font-size:9px; font-weight:600; fill:var(--t1); text-anchor:middle; dominant-baseline:middle; pointer-events:none}
.diag-num{font-size:7.5px; fill:var(--t3); text-anchor:middle; pointer-events:none}
.diag-btn{width:34px; height:34px; display:flex; align-items:center; justify-content:center; border:1px solid var(--line); background:var(--card-bg,#fff); color:var(--t2); border-radius:9px; cursor:pointer; box-shadow:0 2px 8px rgba(0,0,0,0.12)}
html:not(.theme-light) .diag-btn{background:var(--surface-raised,#131C2E)}
.diag-btn:hover{color:var(--t1)}
.diag-ctrls{position:absolute; top:12px; right:12px; display:flex; flex-direction:column; gap:6px}
.diag-expand{position:absolute; top:12px; left:12px}
.diag-hint{position:absolute; left:12px; right:12px; bottom:12px; display:flex; gap:8px; align-items:center}
.diag-hint-txt{flex:1; font-size:11.5px; color:var(--t2); background:var(--card-bg,#fff); border:1px solid var(--line); border-radius:8px; padding:7px 12px; box-shadow:0 2px 8px rgba(0,0,0,0.1)}
html:not(.theme-light) .diag-hint-txt{background:var(--surface-raised,#131C2E)}
.diag-hint-pill{font-size:11.5px; font-weight:600; color:var(--primary); background:var(--card-bg,#fff); border:1px solid var(--line); border-radius:8px; padding:7px 12px; cursor:pointer; white-space:nowrap; box-shadow:0 2px 8px rgba(0,0,0,0.1)}
html:not(.theme-light) .diag-hint-pill{background:var(--surface-raised,#131C2E)}

/* ── Table view (spreadsheet-style list) ── */
.mtbl-wrap{border:1px solid var(--card-border,var(--line)); border-radius:12px; background:var(--card-bg,var(--bg2)); overflow-x:auto}
.mtbl{width:100%; min-width:860px; border-collapse:collapse; font-size:13px}
.mtbl thead th{position:sticky; top:0; background:var(--table-header-bg,var(--muted)); text-align:left; font-size:11px; font-weight:700; letter-spacing:.04em; text-transform:uppercase; color:var(--table-header-text,var(--t3)); padding:12px 14px; border-bottom:1px solid var(--line); white-space:nowrap; user-select:none}
.mtbl-th{cursor:default}
.mtbl-th[onclick]{cursor:pointer}
.mtbl-th span{vertical-align:middle}
.mtbl-th[onclick]:hover{color:var(--t1)}
.mtbl-caret{margin-left:5px; vertical-align:middle; color:var(--t3)}
.mtbl-caret.on{color:var(--primary)}
.mtbl-cbcol{width:44px; text-align:center}
.mtbl-actcol{width:72px}
.mtbl tbody td{padding:13px 14px; border-bottom:1px solid var(--line); color:var(--t2); vertical-align:middle}
.mtbl-r{cursor:pointer; transition:background .1s}
.mtbl-r:last-child td{border-bottom:none}
.mtbl-r:hover{background:var(--table-row-hover-bg,var(--hover))}
.mtbl-name{font-weight:700; color:var(--t1); min-width:130px}
.mtbl-dot{display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--primary); margin-left:7px; vertical-align:middle}
.mtbl-desc{color:var(--t2); max-width:340px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.mtbl-num{font-weight:600; color:var(--t1)}
.mtbl-date{color:var(--t2); white-space:nowrap}
.mtbl-cb{width:18px; height:18px; border-radius:5px; border:1.5px solid var(--field-border,var(--line-strong)); background:var(--field-bg,transparent); display:inline-flex; align-items:center; justify-content:center; cursor:pointer; padding:0; vertical-align:middle}
.mtbl-cb.on{background:var(--primary); border-color:var(--primary)}
.mtbl-acts{display:inline-flex; gap:2px; opacity:0; transition:opacity .1s}
.mtbl-r:hover .mtbl-acts{opacity:1}
.mtbl-foot{display:flex; align-items:center; justify-content:space-between; gap:12px; margin-top:14px; font-size:12.5px; color:var(--t2); flex-wrap:wrap}
.mtbl-foot-l{display:flex; align-items:center; gap:8px}
.mtbl-per select{height:30px; border-radius:8px; border:1px solid var(--field-border); background:var(--field-bg); color:var(--t1); font-size:12.5px; padding:0 6px; cursor:pointer}
.mtbl-foot-r{display:flex; align-items:center; gap:10px}
.mtbl-range{color:var(--t3)}
.mtbl-pg{width:30px; height:30px; display:inline-flex; align-items:center; justify-content:center; border:1px solid var(--field-border); background:var(--field-bg); color:var(--t2); border-radius:8px; cursor:pointer}
.mtbl-pg:hover:not([disabled]){color:var(--t1); border-color:var(--field-border-hover,var(--line-strong))}
.mtbl-pg[disabled]{opacity:.4; cursor:not-allowed}
.mtbl-pgnum{font-weight:600; color:var(--t1)}

/* ── Collapsible sidebar ── */
.sidebar{transition:width .28s cubic-bezier(.4,0,.2,1), border-radius .28s cubic-bezier(.4,0,.2,1)}
.main{transition:margin-left .28s cubic-bezier(.4,0,.2,1)}
.tb-search{cursor:pointer}
body.sb-collapsed .sidebar{width:56px; border-radius:8px; align-items:center}
body.sb-collapsed .sidebar .sb-item{justify-content:center; padding:0}
body.sb-collapsed .sidebar .sb-item-l{gap:0}
body.sb-collapsed .sidebar .sb-label{opacity:0; max-width:0}
body.sb-collapsed .sidebar .sb-head{justify-content:center}
body.sb-collapsed .main{margin-left:72px}

/* ── Topbar / generic popover ── */
.pop{position:fixed; z-index:96; min-width:240px; max-width:320px; background:var(--surface-floating-default,var(--bg2)); border:1px solid var(--line-strong,var(--line)); border-radius:12px; box-shadow:0 16px 42px rgba(0,0,0,0.42); padding:6px; backdrop-filter:blur(24px) saturate(1.4)}
html.theme-light .pop{background:#fff}
.pop-h{display:flex; align-items:center; justify-content:space-between; font-size:11px; font-weight:700; letter-spacing:.04em; text-transform:uppercase; color:var(--t3); padding:8px 10px 6px}
.pop-h a{color:var(--primary); text-transform:none; letter-spacing:0; font-weight:600; font-size:11.5px; cursor:pointer}
.pop-item{display:flex; align-items:center; gap:10px; width:100%; padding:9px 10px; border:none; background:transparent; color:var(--t1); font-family:inherit; font-size:13px; text-align:left; border-radius:8px; cursor:pointer}
.pop-item:hover{background:var(--hover)}
.pop-item svg{color:var(--t3); flex-shrink:0}
.pop-item.danger{color:var(--tag-error-fg,#f87171)} .pop-item.danger svg{color:var(--tag-error-fg,#f87171)}
.pop-sep{height:1px; background:var(--line); margin:4px 6px}
.pop-user{display:flex; align-items:center; gap:11px; padding:10px 10px 12px}
.pop-user-n{font-size:13.5px; font-weight:700; color:var(--t1)}
.pop-user-e{font-size:12px; color:var(--t3)}
.notif{display:flex; gap:10px; padding:9px 10px; border-radius:8px; cursor:pointer}
.notif:hover{background:var(--hover)}
.notif-dot{width:7px; height:7px; border-radius:50%; margin-top:5px; flex-shrink:0; background:var(--primary)}
.notif-dot.read{background:var(--field-placeholder)}
.notif-b{font-size:12.5px; color:var(--t1); line-height:1.35}
.notif-t{font-size:11px; color:var(--t3); margin-top:2px}

/* ── Command palette (⌘K) ── */
.cmdk-scrim{position:fixed; inset:0; z-index:100; background:rgba(0,0,0,0.42); display:flex; align-items:flex-start; justify-content:center; padding-top:12vh; opacity:0; pointer-events:none; transition:opacity .12s}
.cmdk-scrim.open{opacity:1; pointer-events:auto}
.cmdk{width:min(560px,92vw); background:var(--surface-floating-default,var(--bg2)); border:1px solid var(--line-strong,var(--line)); border-radius:14px; box-shadow:0 24px 64px rgba(0,0,0,0.5); overflow:hidden; backdrop-filter:blur(24px) saturate(1.4); transform:translateY(-6px); transition:transform .12s}
.cmdk-scrim.open .cmdk{transform:none}
html.theme-light .cmdk{background:#fff}
.cmdk-in{display:flex; align-items:center; gap:10px; padding:14px 16px; border-bottom:1px solid var(--line)}
.cmdk-in svg{color:var(--t3); flex-shrink:0}
.cmdk-in input{flex:1; background:transparent; border:none; outline:none; color:var(--t1); font-size:15px; font-family:inherit}
.cmdk-list{max-height:min(48vh,360px); overflow:auto; padding:6px}
.cmdk-item{display:flex; align-items:center; gap:11px; padding:10px 12px; border-radius:9px; cursor:pointer; color:var(--t1); font-size:13.5px}
.cmdk-item.sel{background:var(--hover)}
.cmdk-item svg{color:var(--t3); flex-shrink:0}
.cmdk-item .cmdk-cat{margin-left:auto; font-size:11px; color:var(--t3)}
.cmdk-empty{padding:26px; text-align:center; color:var(--t3); font-size:13px}

/* ── Mobile (<768px): sidebar drawer + compact topbar ── */
.tb-burger{display:none; width:34px; height:34px; align-items:center; justify-content:center; border:none; background:transparent; color:var(--t2); border-radius:9px; cursor:pointer; flex-shrink:0}
.tb-burger:hover{background:var(--hover-strong); color:var(--t1)}
.sb-scrim{display:none; position:fixed; inset:0; z-index:29; background:rgba(0,0,0,0.5)}
@media (max-width:768px){
  .tb-burger{display:inline-flex}
  .topbar{gap:6px; padding:0 10px}
  .tb-left{flex:0 0 auto}
  .tb-brand-name, .tb-studio-name, .tb-company-name{display:none}
  .tb-right{flex:1; gap:6px}
  .tb-hide-sm{display:none}
  .tb-search{width:36px; padding:0; justify-content:center; margin-left:auto}
  .tb-search span, .tb-search kbd{display:none}
  .tb-studio{padding:0 4px}
  .tb-company{padding:0 4px}
  .tb-divider{display:none}

  .sidebar{position:fixed; top:36px; left:0; bottom:0; width:250px; border-radius:0 16px 16px 0; z-index:30; transform:translateX(-108%); box-shadow:8px 0 28px rgba(0,0,0,0.4); transition:transform .2s ease}
  body.sb-open .sidebar{transform:none}
  body.sb-open .sb-scrim{display:block}
  .main{margin-left:0 !important; padding:18px 16px 44px}
  /* neutralise desktop collapse on mobile */
  body.sb-collapsed .sidebar{width:250px; padding:12px 10px; transform:translateX(-108%)}
  body.sb-open.sb-collapsed .sidebar{transform:none}
  body.sb-collapsed .sidebar .sb-item{justify-content:flex-start; gap:11px; font-size:13.5px; padding:0 10px}
  body.sb-collapsed .sidebar .sb-item .sb-ic{margin:0}
  .sb-head{display:none}

  .page-h1{font-size:24px}
  .mtabs.mtabs-lg{overflow-x:auto; flex-wrap:nowrap; -webkit-overflow-scrolling:touch; scrollbar-width:none}
  .mtabs.mtabs-lg::-webkit-scrollbar{display:none}
  .mtabs.mtabs-lg .mtab{white-space:nowrap; flex-shrink:0}
  .slideout{width:100vw !important; border-radius:0}
  .detail-head{flex-wrap:wrap}
  .dh-actions{width:100%; margin-top:10px}
  .mp-stats{grid-template-columns:repeat(2,1fr)}
}

/* ── Model DETAIL view ── */
.md-crumbrow{display:flex; align-items:center; justify-content:space-between; gap:16px; margin-bottom:16px}
.md-crumbrow .breadcrumb{margin:0}
.md-pageacts{display:flex; align-items:center; gap:8px; flex-shrink:0}
.md-userav{width:28px; height:28px; border-radius:50%; background:var(--primary); color:#fff; font-size:10.5px; font-weight:700; display:inline-flex; align-items:center; justify-content:center; letter-spacing:.02em}
.md-hbtn{height:34px}
.md-icobtn{width:34px; height:34px; display:inline-flex; align-items:center; justify-content:center; border:1px solid var(--field-border); background:var(--field-bg); color:var(--t2); border-radius:9px; cursor:pointer}
.md-icobtn:hover{color:var(--t1); border-color:var(--field-border-hover,var(--line-strong))}
.md-head{align-items:flex-start}
.md-head .dh-l{flex:1; min-width:0}
.md-origin-chip{font-weight:600}
.md-meta{display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-top:12px; font-size:12.5px; color:var(--t2)}
.md-meta .lrow-owner{display:inline-flex; align-items:center; gap:6px; color:var(--t2)}
.md-dot{color:var(--t3)}
.md-settings{height:34px}
.md-tabs{margin-bottom:22px}
.mtab-c{font-size:11px; font-weight:700; color:var(--t3); background:var(--hover); padding:1px 7px; border-radius:7px; margin-left:6px}
.mtab.active .mtab-c{color:var(--primary); background:var(--tag-informative-bg,rgba(37,99,235,0.12))}

/* stat tiles */
.md-tiles{display:flex; flex-wrap:wrap; gap:12px; margin-bottom:22px}
.md-tile{flex:1; min-width:150px; border:1px solid var(--card-border,var(--line)); border-radius:12px; background:var(--card-bg,var(--bg2)); padding:16px}
.md-tile-top{display:flex; align-items:center; justify-content:space-between}
.md-tile-v{font-size:26px; font-weight:800; color:var(--t1); line-height:1}
.md-tile-ic{color:var(--t3)}
.md-tile-l{font-size:12px; color:var(--t2); margin-top:8px}
.md-tile-pub{flex:1.7; min-width:220px}
.md-tile-pubv{font-size:13.5px; font-weight:700; color:var(--t1)}
.md-tile-warn{display:inline-flex; align-items:center; gap:5px; margin-top:8px; font-size:12px; font-weight:600; color:var(--tag-alert-fg,#d08700); cursor:pointer}
.md-tile-warn:hover{text-decoration:underline}
.md-tile-ok{display:inline-block; margin-top:8px; font-size:12px; color:var(--tag-success-fg,#16a34a)}

/* collapsible sections */
.md-sec{border:1px solid var(--card-border,var(--line)); border-radius:14px; background:var(--card-bg,var(--bg2)); margin-bottom:16px; overflow:hidden}
.md-sec-h{display:flex; align-items:center; gap:10px; padding:15px 18px; cursor:pointer; user-select:none}
.md-sec-h:hover{background:var(--hover)}
.md-sec-caret{display:inline-flex; color:var(--t3); transition:transform .15s}
.md-sec.closed .md-sec-caret{transform:rotate(-90deg)}
.md-sec-t{font-size:14px; font-weight:700; color:var(--t1)}
.md-sec-r{margin-left:auto; font-size:12px; color:var(--t3)}
.md-sec-link{color:var(--primary); font-weight:600; cursor:pointer}
.md-sec-link:hover{text-decoration:underline}
.md-sec-body{padding:2px 18px 18px}
.md-sec.closed .md-sec-body{display:none}
.md-sec-body .diag-wrap{margin:6px 0 0}

/* diagram additions */
.md-diag{height:340px}
.diag-edge.diag-cross{stroke:var(--primary); stroke-dasharray:4 4; opacity:.55; stroke-width:1.3}
.diag-cross-lbl{font-size:8.5px; fill:var(--t3); text-anchor:middle; pointer-events:none}
.diag-legend{position:absolute; right:12px; bottom:12px; display:flex; gap:14px; align-items:center; font-size:11px; color:var(--t2); background:var(--card-bg,#fff); border:1px solid var(--line); border-radius:8px; padding:6px 11px; box-shadow:0 2px 8px rgba(0,0,0,0.1)}
html:not(.theme-light) .diag-legend{background:var(--surface-raised,#131C2E)}
.diag-legend span{display:inline-flex; align-items:center; gap:6px}
.lg-line{width:16px; height:0; border-top:2px solid var(--line-strong,#c3ccd8)}
.lg-line.lg-dash{border-top:2px dashed var(--primary)}
.md-diag-hint{right:auto; width:auto; max-width:60%}

/* About form */
.md-about{display:flex; flex-direction:column; gap:16px; padding-top:6px}
.md-form-row{display:grid; grid-template-columns:1fr 1fr; gap:20px}
.md-name-input{display:flex; align-items:center; border:1px solid var(--field-border); border-radius:9px; background:var(--field-bg); overflow:hidden}
.md-name-pre{padding:0 2px 0 12px; font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:13px; color:var(--t3)}
.md-name-mono{border:none !important; background:transparent !important; font-family:ui-monospace,SFMono-Regular,Menlo,monospace; padding-left:0 !important}
.md-field-foot{display:flex; align-items:center; justify-content:space-between; margin-top:6px}
.md-field-hint{font-size:12px; color:var(--t3)}
.md-count{font-size:12px; font-weight:600; color:var(--t3)}
.md-count.over{color:var(--tag-error-fg,#dc2626)}
.md-tagbox{display:flex; flex-wrap:wrap; align-items:center; gap:6px; min-height:42px; border:1px solid var(--field-border); border-radius:9px; background:var(--field-bg); padding:7px 10px}
.md-tag-chip{display:inline-flex; align-items:center; gap:5px; font-size:12px; font-weight:600; color:var(--tag-informative-fg,#2563eb); background:var(--tag-informative-bg,rgba(37,99,235,0.1)); border-radius:7px; padding:3px 4px 3px 9px}
.md-tag-x{border:none; background:transparent; color:inherit; cursor:pointer; font-size:14px; line-height:1; padding:0 3px; opacity:.7}
.md-tag-x:hover{opacity:1}
.md-tag-in{flex:1; min-width:70px; border:none; background:transparent; outline:none; color:var(--t1); font-family:inherit; font-size:13px}
.md-owner-sel,.md-add-steward{display:flex; align-items:center; gap:8px; height:42px; border:1px solid var(--field-border); border-radius:9px; background:var(--field-bg); padding:0 12px; font-size:13px; color:var(--t1); cursor:pointer; width:100%}
.md-owner-sel .md-owner-n{flex:1}
.md-owner-sel svg{color:var(--t3)}
.md-add-steward{color:var(--t2); font-family:inherit}
.md-add-steward:hover,.md-owner-sel:hover{border-color:var(--field-border-hover,var(--line-strong))}
.md-add-steward svg{color:var(--t3)}

/* activity timeline */
.md-timeline{display:flex; flex-direction:column; padding-top:4px}
.md-tl-item{position:relative; display:flex; gap:14px; padding:0 0 18px 4px}
.md-tl-item::before{content:''; position:absolute; left:8px; top:14px; bottom:-4px; width:1.5px; background:var(--line)}
.md-tl-item.last::before{display:none}
.md-tl-dot{position:relative; z-index:1; width:9px; height:9px; margin-top:4px; border-radius:50%; flex-shrink:0; background:var(--card-bg,var(--bg2)); border:2px solid var(--line-strong,#c3ccd8)}
.md-tl-item.major .md-tl-dot{background:var(--primary); border-color:var(--primary)}
.md-tl-t{font-size:13px; font-weight:600; color:var(--t1)}
.md-tl-m{font-size:12px; color:var(--t3); margin-top:2px}

/* sub-tab toolbar */
.md-tbar{margin-bottom:18px}
.md-pii-toggle{display:inline-flex; align-items:center; gap:6px; height:36px; padding:0 12px; border:1px solid var(--field-border); background:var(--field-bg); color:var(--t2); border-radius:9px; font-size:13px; font-weight:500; cursor:pointer}
.md-pii-toggle:hover{color:var(--t1)}
.md-pii-toggle.on{color:var(--tag-alert-fg,#d08700); border-color:var(--tag-alert-bd,rgba(208,135,0,0.4)); background:var(--tag-alert-bg,rgba(208,135,0,0.1))}

/* PII badge */
.pii-badge{display:inline-flex; align-items:center; gap:3px; font-size:10px; font-weight:700; letter-spacing:.02em; color:var(--tag-alert-fg,#d08700); background:var(--tag-alert-bg,rgba(208,135,0,0.12)); border-radius:6px; padding:2px 6px}

/* entity / table cards */
.md-ecard{display:flex; flex-direction:column; gap:10px; border:1px solid var(--card-border,var(--line)); border-radius:12px; background:var(--card-bg,var(--bg2)); padding:16px; cursor:pointer; transition:border-color .12s, box-shadow .12s}
.md-ecard:hover{border-color:var(--field-border-hover,var(--line-strong)); box-shadow:0 4px 14px rgba(0,0,0,0.08)}
.md-ecard-h{display:flex; align-items:center; gap:8px}
.md-ecard-ic{display:inline-flex; align-items:center; justify-content:center; width:28px; height:28px; border-radius:8px; background:var(--muted,var(--hover)); color:var(--t2); flex-shrink:0}
.md-ecard-name{font-size:15px; font-weight:700; color:var(--t1); flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.md-ecard-desc{font-size:12.5px; line-height:1.5; color:var(--t2); display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; min-height:37px}
.md-ecard-meta{display:flex; align-items:center; gap:12px; flex-wrap:wrap}
.md-ecard-meta .metaico{display:inline-flex; align-items:center; gap:5px; font-size:12px; color:var(--t2)}
.md-ecard-foot{display:flex; align-items:center; justify-content:space-between; padding-top:11px; border-top:1px solid var(--line)}
.md-ecard-foot .mcard-owner{display:inline-flex; align-items:center; gap:6px; font-size:12.5px; color:var(--t2)}
.md-ecard-foot .mcard-date{font-size:12px; color:var(--t3)}

/* code chips */
.md-code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:12px; color:var(--t3); background:var(--muted,var(--hover)); padding:1px 7px; border-radius:6px}

/* tables — expandable rows */
.md-trows{display:flex; flex-direction:column; gap:12px}
.md-trow{border:1px solid var(--card-border,var(--line)); border-radius:12px; background:var(--card-bg,var(--bg2)); padding:16px 18px; transition:border-color .12s}
.md-trow:hover{border-color:var(--field-border-hover,var(--line-strong))}
.md-trow-h{display:flex; align-items:center; gap:9px; cursor:pointer; flex-wrap:wrap}
.md-trow-ic{display:inline-flex; color:var(--t2)}
.md-trow-av{display:inline-flex}
.md-trow-name{font-size:14.5px; font-weight:700; color:var(--t1)}
.md-trow-right{margin-left:auto; display:inline-flex; align-items:center; gap:10px}
.md-trow-right .lrow-time{font-size:12px; color:var(--t3)}
.md-trow-right .lrow-menu{border:none; background:transparent; color:var(--t3); cursor:pointer; display:inline-flex; padding:2px; border-radius:6px}
.md-trow-right .lrow-menu:hover{color:var(--t1); background:var(--hover)}
.md-trow-caret{display:inline-flex; color:var(--t3); transition:transform .15s}
.md-trow.open .md-trow-caret{transform:rotate(180deg)}
.md-trow-desc{font-size:12.5px; line-height:1.5; color:var(--t2); margin-top:10px}
.md-trow-foot{display:flex; align-items:center; gap:9px; flex-wrap:wrap; margin-top:10px; font-size:12px; color:var(--t2)}
.md-trow-foot .lrow-metric{display:inline-flex; align-items:center; gap:5px}
.md-trow-foot .lrow-sep{color:var(--t3)}
.md-trow-exp{display:flex; align-items:center; gap:14px; margin-top:14px; padding-top:14px; border-top:1px solid var(--line)}
.md-exp-note{font-size:12.5px; color:var(--t3); flex:1}

/* components tab */
.md-comp{display:grid; grid-template-columns:210px 1fr; gap:24px; align-items:start}
.md-comp-nav{display:flex; flex-direction:column; gap:4px; border:1px solid var(--card-border,var(--line)); border-radius:12px; background:var(--card-bg,var(--bg2)); padding:8px}
.md-comp-navbtn{display:flex; align-items:center; gap:10px; width:100%; padding:10px 11px; border:none; background:transparent; color:var(--t2); font-family:inherit; font-size:13px; font-weight:500; text-align:left; border-radius:9px; cursor:pointer}
.md-comp-navbtn:hover{background:var(--hover); color:var(--t1)}
.md-comp-navbtn.on{background:var(--tag-informative-bg,rgba(37,99,235,0.1)); color:var(--primary); font-weight:600}
.md-comp-navic{display:inline-flex; color:currentColor}
.md-comp-navlbl{flex:1}
.md-comp-navcnt{font-size:11px; font-weight:700; color:var(--t3); background:var(--hover); padding:1px 7px; border-radius:7px}
.md-comp-navbtn.on .md-comp-navcnt{color:var(--primary); background:rgba(37,99,235,0.14)}
.md-comp-main{min-width:0}
.md-comp-head h3{font-size:16px; font-weight:700; color:var(--t1); margin:0 0 4px}
.md-comp-head p{font-size:13px; color:var(--t2); margin:0 0 16px}
.md-comp-grid{grid-template-columns:repeat(auto-fill,minmax(210px,1fr))}
.md-ccard{display:flex; flex-direction:column; gap:12px; border:1px solid var(--card-border,var(--line)); border-radius:12px; background:var(--card-bg,var(--bg2)); padding:15px; cursor:pointer; transition:border-color .12s, box-shadow .12s}
.md-ccard:hover{border-color:var(--field-border-hover,var(--line-strong)); box-shadow:0 4px 14px rgba(0,0,0,0.08)}
.md-ccard-h{display:flex; align-items:center; gap:9px}
.md-ccard-ic{display:inline-flex; align-items:center; justify-content:center; width:28px; height:28px; border-radius:8px; background:var(--tag-informative-bg,rgba(37,99,235,0.1)); color:var(--primary); flex-shrink:0}
.md-ccard-name{font-size:14px; font-weight:700; color:var(--t1); overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.md-ccard-sub{font-size:12px; color:var(--t3)}
.md-ccard-foot{display:flex; align-items:center; justify-content:space-between; gap:8px}
.md-ccard-ent{display:inline-flex; align-items:center; gap:5px; font-size:12px; color:var(--t2)}
.mtbl-inline{display:inline-flex; align-items:center; gap:6px}

@media (max-width:900px){
  .md-comp{grid-template-columns:1fr}
  .md-comp-nav{flex-direction:row; flex-wrap:wrap}
  .md-comp-navbtn{width:auto}
  .md-form-row{grid-template-columns:1fr}
}
@media (max-width:768px){
  .md-crumbrow{flex-wrap:wrap}
  .md-tiles .md-tile{min-width:120px}
  .md-tabs{overflow-x:auto}
}

/* ══ NEW MODEL FLOW ══ */
.mkt-sub{font-size:14px; color:var(--t2); margin:-6px 0 22px; max-width:640px}
.mkt-layout{display:grid; grid-template-columns:232px 1fr; gap:28px; align-items:start}
.mkt-rail{display:flex; flex-direction:column; gap:2px; position:sticky; top:56px}
.mkt-cat{display:flex; align-items:center; gap:10px; width:100%; padding:8px 10px; border:none; background:transparent; color:var(--t2); font-family:inherit; font-size:13px; font-weight:500; text-align:left; border-radius:9px; cursor:pointer}
.mkt-cat:hover{background:var(--hover); color:var(--t1)}
.mkt-cat.on{background:var(--tag-informative-bg,rgba(37,99,235,0.1)); color:var(--primary); font-weight:600}
.mkt-cat-ic{display:inline-flex; color:currentColor; flex-shrink:0}
.mkt-cat-n{flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.mkt-cat-c{font-size:11px; font-weight:700; color:var(--t3)}
.mkt-cat.on .mkt-cat-c{color:var(--primary)}
.mkt-rail-label{font-size:11px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; color:var(--t3); padding:14px 10px 6px}
.mkt-main{min-width:0}
.mkt-toolbar{display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:22px}
.mkt-sec-h{display:flex; align-items:baseline; gap:10px; margin:8px 0 14px}
.mkt-sec-t{font-size:15px; font-weight:700; color:var(--t1)}
.mkt-sec-sub{font-size:13px; color:var(--t3)}
.mkt-featured{display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:16px; margin-bottom:30px}
.mkt-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:16px}

.tpl-card{display:flex; flex-direction:column; border:1px solid var(--card-border,var(--line)); border-radius:14px; background:var(--card-bg,var(--bg2)); overflow:hidden; cursor:pointer; transition:border-color .12s, box-shadow .12s, transform .1s}
.tpl-card:hover{border-color:var(--field-border-hover,var(--line-strong)); box-shadow:0 8px 24px rgba(15,23,42,0.10); transform:translateY(-1px)}
.tpl-card-f{flex-direction:row}
.tpl-thumb-wrap{position:relative; background:var(--muted,#eef1f6); border-bottom:1px solid var(--line); flex-shrink:0}
.tpl-card-f .tpl-thumb-wrap{width:150px; border-bottom:none; border-right:1px solid var(--line)}
html:not(.theme-light) .tpl-thumb-wrap{background:rgba(255,255,255,0.03)}
.tpl-thumb{display:block; width:100%; height:120px; background-image:radial-gradient(rgba(120,132,156,0.20) 1px, transparent 1px); background-size:16px 16px}
.tpl-card-f .tpl-thumb{height:100%; min-height:150px}
.tt-edges line{stroke:var(--line-strong,#c3ccd8); stroke-width:1.2}
.tt-nodes rect{fill:var(--card-bg,#fff); stroke:var(--border-primary-lighter,#80afff); stroke-width:0.9}
html:not(.theme-light) .tt-nodes rect{fill:var(--surface-raised,#131C2E)}
.tt-nodes .tt-top{fill:var(--primary); stroke:none}
.tpl-featured-badge{position:absolute; top:10px; left:10px; z-index:1; display:inline-flex; align-items:center; gap:4px; font-size:10.5px; font-weight:700; color:#fff; background:var(--primary); border-radius:6px; padding:3px 7px}
.tpl-chip-abs{position:absolute; top:10px; left:10px; z-index:1}
.tpl-badge{position:absolute; top:10px; right:10px; z-index:1; font-size:10.5px; font-weight:700; color:var(--t2); background:var(--card-bg,#fff); border:1px solid var(--line); border-radius:6px; padding:3px 7px}
.tpl-badge.is-new{color:var(--tag-success-fg,#16a34a); border-color:var(--tag-success-bd,rgba(16,185,129,0.4)); background:var(--tag-success-bg,rgba(16,185,129,0.1))}
.tpl-body{display:flex; flex-direction:column; gap:8px; padding:16px; flex:1; min-width:0}
.tpl-cat-chip{display:inline-flex; align-items:center; font-size:11px; font-weight:600; color:var(--t2); background:var(--muted,var(--hover)); border-radius:6px; padding:2px 8px}
.tpl-name{font-size:15.5px; font-weight:700; color:var(--t1)}
.tpl-desc{font-size:12.5px; line-height:1.5; color:var(--t2); display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden}
.tpl-stats{display:flex; flex-wrap:wrap; gap:12px; margin-top:2px}
.tpl-stats span{display:inline-flex; align-items:center; gap:5px; font-size:12px; color:var(--t2)}
.tpl-foot{display:flex; align-items:center; gap:10px; margin-top:auto; padding-top:12px; border-top:1px solid var(--line)}
.cx-badge{font-size:10.5px; font-weight:700; border-radius:6px; padding:2px 8px}
.cx-int{color:var(--tag-informative-fg,#2563eb); background:var(--tag-informative-bg,rgba(37,99,235,0.1))}
.cx-adv{color:var(--tag-alert-fg,#d08700); background:var(--tag-alert-bg,rgba(208,135,0,0.12))}
.cx-sim{color:var(--tag-success-fg,#16a34a); background:var(--tag-success-bg,rgba(16,185,129,0.1))}
.tpl-tenants{display:inline-flex; align-items:center; gap:5px; font-size:12px; color:var(--t3)}
.tpl-view{margin-left:auto; display:inline-flex; align-items:center; gap:4px; font-size:12.5px; font-weight:600; color:var(--primary); white-space:nowrap}
.tpl-meta{margin-left:auto; font-size:11.5px; color:var(--t3); white-space:nowrap}

/* From scratch */
.fs-wrap{max-width:940px}
.fs-sec{border-top:1px solid var(--line); padding:22px 0}
.fs-sec:first-of-type{border-top:none}
.fs-sec-h{margin-bottom:16px}
.fs-sec-t{font-size:15px; font-weight:700; color:var(--t1)}
.fs-sec-d{font-size:13px; color:var(--t3); margin-top:2px}
.fs-grid{display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:16px}
.fs-field{display:flex; flex-direction:column; min-width:0}
.fs-l{font-size:13px; font-weight:600; color:var(--t1); margin-bottom:6px}
.fs-l-row{display:flex; align-items:center; justify-content:space-between; margin-bottom:6px}
.fs-l-row .fs-l{margin-bottom:0}
.fs-req{color:var(--field-text-error,#dc2626)}
.fs-in{height:42px; border:1px solid var(--field-border); border-radius:9px; background:var(--field-bg); color:var(--t1); font-family:inherit; font-size:14px; padding:0 12px; outline:none}
.fs-in:focus{border-color:var(--primary)}
.fs-sel{cursor:pointer; appearance:none; background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' fill='none' stroke='%2394a3b8' stroke-width='1.6' stroke-linecap='round' stroke-linejoin='round'><path d='M4 6l4 4 4-4'/></svg>"); background-repeat:no-repeat; background-position:right 12px center}
.fs-mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
.fs-name-in{display:flex; align-items:center; border:1px solid var(--field-border); border-radius:9px; background:var(--field-bg); overflow:hidden}
.fs-name-in:focus-within{border-color:var(--primary)}
.fs-name-pre{padding:0 2px 0 12px; font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:13px; color:var(--t3)}
.fs-name-in .fs-in{border:none; background:transparent; padding-left:0; flex:1}
.fs-help{font-size:12px; color:var(--t3); margin-top:6px}
.fs-ai-link{display:inline-flex; align-items:center; gap:5px; border:none; background:transparent; color:var(--primary); font-family:inherit; font-size:12.5px; font-weight:600; cursor:pointer}
.fs-ai-link:hover{text-decoration:underline}
.fs-ta{min-height:96px; border:1px solid var(--field-border); border-radius:9px; background:var(--field-bg); color:var(--t1); font-family:inherit; font-size:14px; line-height:1.55; padding:11px 12px; outline:none; resize:vertical}
.fs-ta:focus{border-color:var(--primary)}
.fs-ta-foot{display:flex; align-items:center; justify-content:space-between; margin-top:6px}
.fs-tagbox{display:flex; flex-wrap:wrap; align-items:center; gap:6px; min-height:42px; border:1px solid var(--field-border); border-radius:9px; background:var(--field-bg); padding:7px 10px}
.fs-owner{display:flex; align-items:center; gap:8px; height:42px; border:1px solid var(--field-border); border-radius:9px; background:var(--field-bg); padding:0 12px}
.fs-owner-n{font-size:14px; color:var(--t1)}
.fs-you{font-size:10.5px; font-weight:700; color:var(--primary); background:var(--tag-informative-bg,rgba(37,99,235,0.1)); border-radius:5px; padding:1px 6px}
.fs-foot{display:flex; align-items:center; gap:14px; border-top:1px solid var(--line); padding:16px 0 8px; margin-top:8px}
.fs-foot-hint{font-size:12.5px; color:var(--t3)}
.fs-foot-hint.ok{color:var(--tag-success-fg,#16a34a)}

/* AI assist */
.ai-head-row{display:flex; align-items:center; justify-content:space-between; gap:16px; margin-bottom:16px}
.ai-head-tag{display:inline-flex; align-items:center; gap:6px; font-size:12.5px; font-weight:600; color:var(--primary)}
.ai-layout{display:grid; grid-template-columns:1fr 1fr; gap:20px; align-items:stretch; min-height:calc(100vh - 230px)}
.ai-pane{border:1px solid var(--card-border,var(--line)); border-radius:14px; background:var(--card-bg,var(--bg2)); display:flex; flex-direction:column; overflow:hidden}
.ai-chat-pane{min-height:420px}
.ai-chat{flex:1; overflow-y:auto; padding:18px; display:flex; flex-direction:column; gap:14px}
.ai-row{display:flex; gap:9px; max-width:100%}
.ai-row-me{justify-content:flex-end}
