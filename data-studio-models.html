}
function setModelTab(t){ modelDetailState.tab=t; renderModelDetail(modelDetailState.id); }
function publishModel(id){ const m=_model(id); if(m) m.status='Published'; toast('“'+(m?m.name:'Model')+'” published','ok'); renderModelDetail(id); }
function openCreateModel(){
  $('modalScrim').innerHTML=`<div class="modal"><div class="modal-head"><div class="modal-ic" style="background:var(--tag-informative-bg);color:var(--tag-informative-fg);border-color:var(--tag-informative-bd)"><svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="2" y="2" width="5" height="5" rx="1"/><rect x="9" y="2" width="5" height="5" rx="1"/><rect x="2" y="9" width="5" height="5" rx="1"/><rect x="9" y="9" width="5" height="5" rx="1"/></svg></div><div class="modal-title">New model</div></div>
    <div class="modal-body"><div class="mform">
      <div class="mfield"><label class="mfield-l">Name <span style="color:var(--field-text-error)">*</span></label><input class="minput" id="nmName" placeholder="e.g. Marketing Ops" autocomplete="off"></div>
      <div class="mrow"><div class="mfield"><label class="mfield-l">Category</label><select class="mselect" id="nmCat"><option>CRM</option><option>Finance</option><option>Operations</option><option>Compliance</option><option>IoT</option><option>HR</option><option>Marketing</option></select></div>
        <div class="mfield"><label class="mfield-l">Origin</label><select class="mselect" id="nmOri"><option>Custom</option><option>Implemented</option><option>Cloned</option></select></div></div>
      <div class="mfield"><label class="mfield-l">Description <span style="color:var(--field-placeholder);font-weight:400">· required for the LLM</span></label><textarea class="mtextarea" id="nmDesc" placeholder="What this model groups and who uses it."></textarea></div>
      <div style="font-size:12px;color:var(--t2);display:flex;gap:8px;align-items:flex-start"><svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="var(--primary)" stroke-width="1.6" style="flex-shrink:0;margin-top:1px"><circle cx="8" cy="8" r="6"/><path d="M8 7.5v3.5M8 5h.01" stroke-linecap="round"/></svg><span>A model is a container — add entities, tables and reference data to it after creating.</span></div>
    </div></div>
    <div class="modal-foot"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveNewModel()">Create model</button></div></div>`;
  $('modalScrim').classList.add('open'); setTimeout(()=>{const el=$('nmName'); if(el)el.focus();},50);
}
function saveNewModel(){
  const name=($('nmName').value||'').trim(); if(!name){ toast('Enter a name'); return; }
  const id=_slug(name); if(_model(id)){ toast('A model with that name already exists'); return; }
  MODELS.unshift({id, name, origin:$('nmOri').value, category:$('nmCat').value, status:'Draft', entities:0, owner:'sc', collab:[], updated:'just now', tags:[], desc:($('nmDesc').value||'').trim()});
  closeModal(); toast('“'+name+'” created','ok'); renderModels();
}

/* ──────────────────────────────────────────────────────────────
   ALL-FILTERS SLIDEOUT (draft → Apply / Clear) — Entities / Tables / Reference
   ────────────────────────────────────────────────────────────── */
function _fltCfg(surface){
  const uniq=a=>[...new Set(a)];
  const cnt=(rows,key,val)=>rows.filter(r=>r[key]===val).length;
  const tagOpts=rows=>uniq(rows.flatMap(r=>r.tags||[])).sort().map(v=>({value:v,label:v,count:rows.filter(r=>(r.tags||[]).includes(v)).length}));
  if(surface==='entities'){ const rows=ENTITIES; return {label:'Entities', state:listState, render:renderEntities, groups:[
    {key:'model',label:'Model',options:uniq(rows.map(r=>r.model)).map(v=>({value:v,label:(_model(v)||{name:v}).name,count:cnt(rows,'model',v)}))},
    {key:'domain',label:'Domain',options:uniq(rows.map(r=>r.domain)).map(v=>({value:v,label:v,count:cnt(rows,'domain',v)}))},
    {key:'status',label:'Status',options:['Published','Draft','Pending changes','Deprecated'].map(v=>({value:v,label:v,count:cnt(rows,'status',v)}))},
    {key:'owner',label:'Owner',options:uniq(rows.map(r=>r.owner)).map(v=>({value:v,label:P(v).n,count:cnt(rows,'owner',v)}))},
    {key:'tags',label:'Tags',multi:true,options:tagOpts(rows)},
  ]}; }
  if(surface==='tables'){ const rows=TABLES; return {label:'Tables', state:tablesListState, render:renderTablesList, groups:[
    {key:'model',label:'Model',options:uniq(rows.map(r=>r.model)).map(v=>({value:v,label:(_model(v)||{name:v}).name,count:cnt(rows,'model',v)}))},
    {key:'entity',label:'Entity',options:uniq(rows.map(r=>r.entityId)).map(v=>({value:v,label:(ENTITIES.find(e=>e.id===v)||{}).name||v,count:cnt(rows,'entityId',v)}))},
    {key:'type',label:'Type',options:['Primary','Secondary'].map(v=>({value:v,label:v,count:cnt(rows,'role',v)}))},
    {key:'status',label:'Status',options:['Published','Draft','Archived'].map(v=>({value:v,label:v,count:cnt(rows,'status',v)}))},
    {key:'tags',label:'Tags',multi:true,options:tagOpts(rows)},
  ]}; }
  const rows=REFDATA; return {label:'Reference Data', state:refListState, render:renderReferenceList, groups:[
    {key:'category',label:'Category',options:uniq(rows.map(r=>r.category)).map(v=>({value:v,label:v,count:cnt(rows,'category',v)}))},
    {key:'origin',label:'Origin',options:['Custom','From catalog'].map(v=>({value:v,label:v,count:cnt(rows,'origin',v)}))},
    {key:'status',label:'Status',options:['Published','Draft','Archived'].map(v=>({value:v,label:v,count:cnt(rows,'status',v)}))},
    {key:'tags',label:'Tags',multi:true,options:tagOpts(rows)},
  ]};
}
function _fltCount(surface){ const cfg=_fltCfg(surface); const st=cfg.state; return cfg.groups.reduce((n,g)=>n+(g.multi?((st[g.key]||[]).length):(st[g.key]&&st[g.key]!=='all'?1:0)),0); }
let _fltDraft=null;
function openFilters(surface){
  const cfg=_fltCfg(surface); const st=cfg.state;
  _fltDraft={surface}; cfg.groups.forEach(g=>{ _fltDraft[g.key]= g.multi ? (st[g.key]||[]).slice() : (st[g.key]||'all'); });
  _renderFilters();
  $('slideout').classList.add('open'); $('slideout').setAttribute('aria-hidden','false'); $('scrim').classList.add('open');
}
function _renderFilters(){
  const cfg=_fltCfg(_fltDraft.surface), d=_fltDraft;
  const active=cfg.groups.reduce((n,g)=>n+(g.multi?d[g.key].length:(d[g.key]!=='all'?1:0)),0);
  $('slideout').innerHTML=`
    <div class="so-head"><div><div class="so-title">Filters</div><div class="so-internal">${escapeHtml(cfg.label)}${active?` · ${active} active`:''}</div></div><button class="so-close" onclick="closeSlideout()" aria-label="Close">✕</button></div>
    <div class="so-body">
      ${cfg.groups.map(g=>`<div class="so-sec"><div class="so-sec-h">${escapeHtml(g.label)}</div><div class="flt-opts">
        ${g.multi
          ? g.options.map(o=>`<button class="flt-opt ${d[g.key].includes(o.value)?'on':''}" onclick="_fltTag('${g.key}','${escapeHtml(o.value)}')">${escapeHtml(o.label)}${o.count!=null?`<span class="flt-c">${o.count}</span>`:''}</button>`).join('')
          : [{value:'all',label:'All'}].concat(g.options).map(o=>`<button class="flt-opt ${String(d[g.key])===String(o.value)?'on':''}" onclick="_fltPick('${g.key}','${escapeHtml(o.value)}')">${escapeHtml(o.label)}${o.count!=null?`<span class="flt-c">${o.count}</span>`:''}</button>`).join('')
        }</div></div>`).join('')}
    </div>
    <div class="so-foot"><button class="btn" onclick="_fltClear()">Clear all</button><button class="btn btn-primary" onclick="_fltApply()">Apply filters</button></div>`;
}
function _fltPick(key,val){ _fltDraft[key]=val; _renderFilters(); }
function _fltTag(key,val){ const a=_fltDraft[key]; const i=a.indexOf(val); i<0?a.push(val):a.splice(i,1); _renderFilters(); }
function _fltClear(){ const cfg=_fltCfg(_fltDraft.surface); cfg.groups.forEach(g=>{ _fltDraft[g.key]= g.multi?[]:'all'; }); _renderFilters(); }
function _fltApply(){ const cfg=_fltCfg(_fltDraft.surface), st=cfg.state; cfg.groups.forEach(g=>{ st[g.key]= g.multi? _fltDraft[g.key].slice() : _fltDraft[g.key]; }); st.page=1; closeSlideout(); cfg.render(); }

/* ──────────────────────────────────────────────────────────────
   ROW ⋯ ACTION MENU — Open / Duplicate / Export / Publish|Archive / Delete
   ────────────────────────────────────────────────────────────── */
function _surfCfg(surface){ return ({
  models:   {arr:MODELS,   render:renderModels,        nameKey:'name',  route:'models',    published:'Published', archived:'Deprecated'},
  entities: {arr:ENTITIES, render:renderEntities,      nameKey:'name',  route:'entities',  published:'Published', archived:'Deprecated'},
  tables:   {arr:TABLES,   render:renderTablesList,    nameKey:'alias', route:'tables',    published:'Published', archived:'Archived'},
  reference:{arr:REFDATA,  render:renderReferenceList, nameKey:'name',  route:'reference', published:'Published', archived:'Archived'},
})[surface]; }
const _RM_IC={
  open:'<svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h7v7M13 3L7 9"/><path d="M11 13H4a1 1 0 0 1-1-1V5"/></svg>',
  dup:'<svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"><rect x="5" y="5" width="9" height="9" rx="1.4"/><path d="M11 5V3a1 1 0 0 0-1-1H3a1 1 0 0 0-1 1v7a1 1 0 0 0 1 1h2"/></svg>',
  exp:'<svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v8M5 7l3 3 3-3M3 13h10"/></svg>',
  pub:'<svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 11V3M4.5 6.5L8 3l3.5 3.5M3 13h10"/></svg>',
  arch:'<svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"><rect x="2" y="3" width="12" height="3" rx="1"/><path d="M3 6v6a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1V6M6.5 9h3"/></svg>',
  del:'<svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 4.5h10M6 4.5V3h4v1.5M4.5 4.5l.5 8a1 1 0 0 0 1 1h4a1 1 0 0 0 1-1l.5-8"/></svg>',
};
function closeRowMenu(){ const m=$('rowmenu'); if(m) m.remove(); document.removeEventListener('click',_rowMenuOutside,true); document.removeEventListener('keydown',_rowMenuEsc,true); }
function _rowMenuOutside(e){ if(!e.target.closest('#rowmenu')) closeRowMenu(); }
function _rowMenuEsc(e){ if(e.key==='Escape') closeRowMenu(); }
function openRowMenu(surface,id,btn){
  closeRowMenu();
  const cfg=_surfCfg(surface); const row=cfg.arr.find(r=>r.id===id); if(!row) return;
  const isPub=row.status===cfg.published;
  const item=(ic,label,act,danger)=>`<button class="rowmenu-item ${danger?'danger':''}" onclick="${act}">${ic}${label}</button>`;
  const html=[
    item(_RM_IC.open,'Open',`_rowAct('${surface}','${id}','open')`),
    item(_RM_IC.dup,'Duplicate',`_rowAct('${surface}','${id}','duplicate')`),
    item(_RM_IC.exp,'Export JSON',`_rowAct('${surface}','${id}','export')`),
    '<div class="rowmenu-sep"></div>',
    isPub ? item(_RM_IC.arch,'Archive',`_rowAct('${surface}','${id}','archive')`) : item(_RM_IC.pub,'Publish',`_rowAct('${surface}','${id}','publish')`),
    '<div class="rowmenu-sep"></div>',
    item(_RM_IC.del,'Delete',`_rowAct('${surface}','${id}','delete')`,true),
  ].join('');
  const div=document.createElement('div'); div.id='rowmenu'; div.className='rowmenu'; div.innerHTML=html;
  document.body.appendChild(div);
  const r=btn.getBoundingClientRect(), w=div.offsetWidth||190;
  let left=Math.max(8, Math.min(r.right-w, window.innerWidth-w-8));
  let top=r.bottom+6; if(top+div.offsetHeight > window.innerHeight-8) top=Math.max(8, r.top-div.offsetHeight-6);
  div.style.left=left+'px'; div.style.top=top+'px';
  setTimeout(()=>{ document.addEventListener('click',_rowMenuOutside,true); document.addEventListener('keydown',_rowMenuEsc,true); },0);
}
function _rowAct(surface,id,action){
  closeRowMenu();
  const cfg=_surfCfg(surface), arr=cfg.arr, i=arr.findIndex(r=>r.id===id); if(i<0) return; const row=arr[i], nm=row[cfg.nameKey];
  if(action==='open'){ navigate(cfg.route+'/'+id); return; }
  if(action==='export'){ toast('Exported “'+nm+'”.json','ok'); return; }
  if(action==='duplicate'){ const clone=JSON.parse(JSON.stringify(row)); let base=id+'_copy',u=base,k=2; while(arr.find(r=>r.id===u)) u=base+'_'+(k++); clone.id=u; clone[cfg.nameKey]=nm+' (copy)'; clone.status='Draft'; clone.updated='just now'; arr.splice(i,0,clone); cfg.render(); toast('Duplicated “'+nm+'”','ok'); return; }
  if(action==='publish'){ row.status=cfg.published; cfg.render(); toast('“'+nm+'” published','ok'); return; }
  if(action==='archive'){ row.status=cfg.archived; cfg.render(); toast('“'+nm+'” '+cfg.archived.toLowerCase(),'ok'); return; }
  if(action==='delete'){ _rowConfirmDelete(surface,id); return; }
}
function _rowConfirmDelete(surface,id){
  const cfg=_surfCfg(surface), row=cfg.arr.find(r=>r.id===id); if(!row) return; const nm=row[cfg.nameKey];
  $('modalScrim').innerHTML=`<div class="modal"><div class="modal-head"><div class="modal-ic" style="background:var(--tag-error-bg,rgba(224,82,82,0.14));color:var(--tag-error-fg,#f87171);border-color:var(--tag-error-bd,rgba(224,82,82,0.3))"><svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 4.5h10M6 4.5V3h4v1.5M4.5 4.5l.5 8a1 1 0 0 0 1 1h4a1 1 0 0 0 1-1l.5-8"/></svg></div><div class="modal-title">Delete ${escapeHtml(nm)}?</div></div>
    <div class="modal-body">This removes <b>${escapeHtml(nm)}</b> from the prototype. This can't be undone.</div>
    <div class="modal-foot"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-danger" onclick="_rowDelete('${surface}','${id}')">Delete</button></div></div>`;
  $('modalScrim').classList.add('open');
}
function _rowDelete(surface,id){ const cfg=_surfCfg(surface), i=cfg.arr.findIndex(r=>r.id===id); if(i<0) return; const nm=cfg.arr[i][cfg.nameKey]; cfg.arr.splice(i,1); closeModal(); toast('“'+nm+'” deleted','ok'); cfg.render(); }

/* ── Routing ── */
function navigate(route){ location.hash = '#/'+route; }
function route(){
  _dsfOpen = null; closeSlideout(); closeModal();
  const parts = (location.hash.replace(/^#\/?/,'') || 'models').split('/');
  const r = parts[0];
  if(r==='models' && parts[1]){ if(modelDetailState.id!==parts[1]) modelDetailState.tab='overview'; modelDetailState.id=parts[1]; renderModelDetail(parts[1]); }
  else if(r==='models'){ renderModels(); }
  else if(r==='entities' && parts[1]){
    if(detailState.id !== parts[1]) detailState.tab = 'tables';
    detailState.id = parts[1];
    renderEntityDetail(parts[1]);
  }
  else if(r==='entities'){ renderEntities(); }
  else if(r==='tables' && parts[1]){ if(tableDetailState.id!==parts[1]){ tableDetailState.tab='columns'; dataState={search:'',page:1}; } tableDetailState.id=parts[1]; renderTableDetail(parts[1]); }
  else if(r==='tables'){ renderTablesList(); }
  else if(r==='reference' && parts[1]){ if(refDetailState.id!==parts[1]){ refDetailState.tab='data'; refDetailState.search=''; refDetailState.page=1; } refDetailState.id=parts[1]; renderReferenceDetail(parts[1]); }
  else if(r==='reference'){ renderReferenceList(); }
  else { location.hash='#/models'; }
}
function tabsHtml(active){ return pageShell(active); }
function toggleTheme(){ document.documentElement.classList.toggle('theme-light'); }
window.addEventListener('hashchange', route);
route();

/* Re-apply scope after every dynamic re-render of the content area */
(function(){
  const c=$('content'); if(!c) return;
  new MutationObserver(()=>applyScope()).observe(c, {childList:true, subtree:true});
  applyScope();
})();
</script>
