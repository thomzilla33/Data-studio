/* ── Table Indexes tab ── */
function _tblIndexes(t){
  if(t._idx) return t._idx;
  const cols=t.cols||[];
  const pk=cols.find(c=>c.pk)||cols[0]||{n:'id',d:'ID'};
  const code=t.code||_slug(t.alias||t.name||'table');
  const fks=cols.filter(c=>c.t==='Reference'||/(_id|_ref)$/.test(c.n||'')).slice(0,3);
  const enumCol=cols.find(c=>c.t==='Enum'||/status|state|type/i.test(c.n||''));
  const rel=(t.rels?t.rels.length:0); const owner=t.owner||'sb';
  const MOD=['2h ago','5d ago','May 18, 2026','Apr 30, 2026','just now'];
  const idx=[{name:code+'_pkey',type:'unique',cols:[pk],method:'BTree',where:null,desc:'Primary key index. Enforces uniqueness of the surrogate identifier.',status:'Published',by:owner,mod:'May 18, 2026',created:'May 12, 2026'}];
  fks.forEach((c,i)=>idx.push({name:'idx_'+code+'_'+(c.n||('fk'+i)),type:'regular',cols:[c],method:'BTree',where:null,desc:'Speeds up joins and lookups on '+(c.d||c.n)+'.',status:'Published',by:owner,mod:MOD[i%MOD.length],created:'May 12, 2026'}));
  if(enumCol && rel>=2) idx.push({name:'idx_'+code+'_active',type:'partial',cols:[enumCol],method:'BTree',where:(enumCol.n||'status')+" = 'active'",desc:'Partial index limited to active rows for hot-path reads.',status:'Published',by:owner,mod:'May 18, 2026',created:'May 14, 2026'});
  t._idx=idx; return idx;
}
function _idxCard(t,i){
  const typeLbl={unique:'Unique',regular:'Regular',partial:'Partial'}[i.type]||'Regular';
  const cols=i.cols.map((c,n)=>`<span class="idx-colchip"><span class="idx-colord">${n+1}</span>${escapeHtml(c.n||c.d||'col')}</span>`).join('<span class="idx-sep">›</span>');
  const isPk=/_pkey$/.test(i.name);
  return `<div class="idx-card">
    <div class="idx-top"><span class="idx-ic">${_HIC.hash}</span><span class="idx-name">${escapeHtml(i.name)}</span><span class="idx-type idx-type--${i.type}">${typeLbl}</span>${_stPill(i.status)}${isPk?'':`<button class="lrow-menu" style="margin-left:auto" onclick="_idxMenu('${t.id}','${escapeHtml(i.name)}',this)" aria-label="Index actions">${_MDIC.dots}</button>`}</div>
    <div class="idx-row"><span class="idx-row-l">Columns</span>${cols}</div>
    <div class="idx-row"><span class="idx-row-l">Config</span><span class="hsrc">${_HIC.db}${escapeHtml(i.method)}</span>${i.where?`<span class="idx-where">WHERE ${escapeHtml(i.where)}</span>`:''}</div>
    ${i.desc?`<div class="idx-desc">${escapeHtml(i.desc)}</div>`:''}
    <div class="idx-meta"><span>Modified ${escapeHtml(i.mod)} · ${escapeHtml(P(i.by).n)}</span><span>Created ${escapeHtml(i.created)}</span></div>
  </div>`;
}
function tableIndexesTab(t){
  const idx=_tblIndexes(t); const uniq=idx.filter(i=>i.type==='unique').length; const other=idx.length-uniq;
  return `<div class="cols-toolbar"><div class="dsec-t">Indexes<span class="dsec-sub">${idx.length} index${idx.length===1?'':'es'} · ${uniq} unique · ${other} other</span></div>
      <button class="btn btn-primary" style="height:36px" onclick="openCreateIndex('${t.id}')">${_PLUS} Add index</button></div>
    ${idx.length?`<div class="idx-list">${idx.map(i=>_idxCard(t,i)).join('')}</div>`:`<div class="placeholder" style="padding:28px">No indexes yet. Add your first index to speed up queries.</div>`}
    ${vcallout('v1.5','Index advisor — AIMS suggests missing indexes from slow-query telemetry and flags unused ones for removal.')}`;
}
function openCreateIndex(tableId){
  const t=_table(tableId); if(!t) return;
  const colOpts=(t.cols||[]).map(c=>`<option value="${escapeHtml(c.n)}">${escapeHtml(c.d||c.n)}</option>`).join('');
  $('modalScrim').innerHTML=`<div class="modal"><div class="modal-head"><div class="modal-ic" style="background:var(--tag-informative-bg);color:var(--tag-informative-fg);border-color:var(--tag-informative-bd)">${_HIC.hash}</div><div class="modal-title">New index</div></div>
    <div class="modal-body"><div class="mform">
      <div class="mfield"><label class="mfield-l">Index name</label><input class="minput" id="niName" placeholder="e.g. idx_${escapeHtml(t.code||'table')}_email" autocomplete="off"></div>
      <div class="mrow"><div class="mfield"><label class="mfield-l">Type</label><select class="mselect" id="niType"><option value="regular">Regular</option><option value="unique">Unique</option><option value="partial">Partial</option></select></div>
        <div class="mfield"><label class="mfield-l">Method</label><select class="mselect" id="niMethod"><option>BTree</option><option>Hash</option><option>GIN</option><option>GiST</option></select></div></div>
      <div class="mfield"><label class="mfield-l">Column</label><select class="mselect" id="niCol">${colOpts}</select></div>
      <div class="mfield"><label class="mfield-l">WHERE clause <span style="color:var(--field-placeholder);font-weight:400">· partial index only</span></label><input class="minput" id="niWhere" placeholder="status = 'active'" autocomplete="off"></div>
    </div></div>
    <div class="modal-foot"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveNewIndex('${tableId}')">Add index</button></div></div>`;
  $('modalScrim').classList.add('open'); setTimeout(()=>{const el=$('niName'); if(el)el.focus();},50);
}
function saveNewIndex(tableId){
  const t=_table(tableId); if(!t) return; _tblIndexes(t);
  const name=($('niName').value||'').trim(); if(!name){ toast('Enter an index name'); return; }
  if(t._idx.find(i=>i.name===name)){ toast('An index with that name already exists'); return; }
  const colN=$('niCol').value; const c=(t.cols||[]).find(x=>x.n===colN)||{n:colN,d:colN};
  const type=$('niType').value; const where=type==='partial'?($('niWhere').value||'').trim():'';
  t._idx.unshift({name,type,cols:[c],method:$('niMethod').value,where:where||null,desc:'',status:'Draft',by:t.owner||'sb',mod:'just now',created:'just now'});
  if(t.status==='Published') t.status='Draft'; closeModal(); toast('Index “'+name+'” added','ok'); renderTableDetail(tableId);

function _idxMenu(tid,name,btn){ _mdKebab(btn,[

function confirmRemoveIndex(tid,name){ const t=_table(tid); if(!t) return; _tblIndexes(t); const ix=(t._idx||[]).find(i=>i.name===name); if(!ix) return;

function _removeIndex(tid,name){ const t=_table(tid); if(!t) return; _tblIndexes(t); t._idx=(t._idx||[]).filter(i=>i.name!==name);

function _cvFieldCell(c){ return `<div class="cv-field"><span class="cv-field-ic"><svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="2.5" y="2.5" width="11" height="11" rx="2"/><path d="M2.5 6.5h11"/></svg></span><div class="cv-field-b"><span class="cv-field-d">${escapeHtml(c.d)}${c.pk?' <span class="cv-key">KEY</span>':''}</span><span class="cv-field-n">${escapeHtml(c.n)}</span></div></div>`; }
function _cvConstraints(c){ const f=[c.pk&&'PK',c.uq&&'UQ',c.req&&'REQ',c.idx&&'IDX'].filter(Boolean); return f.length?f.map(x=>`<span class="flag on">${x}</span>`).join(' '):'<span style="color:var(--field-placeholder)">—</span>'; }
function _cvDefault(c){ if(c.t==='Boolean') return 'false'; if(c.t==='Enum'&&c.ev&&c.ev[0]) return escapeHtml(c.ev[0][0]||c.ev[0]); return '<span style="color:var(--field-placeholder)">—</span>'; }

function _cvLen(c){ return ({Text:'≤ 255',Integer:'−2³¹ … 2³¹',Decimal:'18, 2'})[c.t]||'<span style="color:var(--field-placeholder)">—</span>'; }
function _cvFmt(c){ return c.fmt||({Date:'YYYY-MM-DD',Timestamp:'ISO 8601',UUID:'uuid v4',Decimal:'#,##0.00'})[c.t]||'<span style="color:var(--field-placeholder)">—</span>'; }

function _colsView(kind, obj, fields, editable){

  if(sub==='rules'){ heads=['Field','Required','Unique','Length / range','Format','Allowed']; gt='grid-template-columns:minmax(160px,1.3fr) 90px 90px 140px 140px 110px';

  else if(sub==='sensitivity'){ heads=['Field','Classification','Masking','Retention','Encryption']; gt='grid-template-columns:minmax(160px,1.3fr) 140px 150px 120px 130px';
    rowFn=c=>{const m=_cvSens(c); return `${_cvFieldCell(c)}<span class="cv-td">${c.sens?`<span class="sens ${_sensCls(c.sens)}">${c.sens}</span>`:'<span class="cv-cls-int">Internal</span>'}</span><span class="cv-td">${m.mask}</span><span class="cv-td">${m.ret}</span><span class="cv-td">${m.enc}</span>`; }; }

    rowFn=c=>`${_cvFieldCell(c)}<span class="cv-td">${escapeHtml(c.d)}</span><span class="cv-td mono">${_cvFmt(c)}</span><span class="cv-td">${_cvYN(true)}</span><span class="cv-td">${_cvYN(!c.sens||c.sens!=='PII')}</span>`; }
  else { heads=['Field','Type','Constraints','Default','Description']; gt='grid-template-columns:minmax(160px,1.3fr) 120px 170px 90px minmax(0,1.4fr)';

function saveColumn(tableId, colName){

      </div><div class="modal-foot"><button class="btn" onclick="openEditColumn('${tableId}','${colName}')">Back</button><button class="btn btn-primary" onclick="_applyColSave()">Change type &amp; save</button></div></div>`;

}

function _refId(ref){ return (ref||'').replace(/\s*\(dictionary\)\s*/,'').trim(); }
function _refTable(ref){ return _table(_refId(ref)); }
function _invKind(k){ return k==='many-to-one'?'one-to-many':k==='one-to-one'?'one-to-one':'many-to-many'; }

function relationshipsTab(t){

  const inc=TABLES.filter(x=>x.id!==t.id).flatMap(x=>(x.rels||[]).filter(r=>_refId(r.target)===t.id).map(r=>({ target:x.alias, cardShort:_cardShort(_invKind(r.kind)), strong:true, dir:'Incoming', del:'Restrict', via:r.via })));

}
function _relTargetName(x){ const tt=_table(x); return tt?tt.alias:x; }

function openAddRelationship(tid){

   <div class="modal-body"><div class="mform">
     <div class="mfield"><label class="mfield-l">Type</label><select class="mselect" id="arKind"><option value="many-to-one">Many-to-one — FK on ${escapeHtml(t.alias)}</option><option value="one-to-one">One-to-one</option><option value="one-to-many">One-to-many</option><option value="many-to-many">Many-to-many — junction table</option></select></div>

}
function saveRelationship(tid){
  const t=_table(tid); const kind=$('arKind').value, target=$('arTarget').value, via=($('arVia').value||target+'_id').trim(), del=$('arDel').value, upd=$('arUpd').value;
  if(kind==='many-to-many'){ closeModal(); toast('Junction table “'+tid+'_'+target+'” created','ok'); }
  else {
    t.rels.push({via, target, kind, onDelete:del, onUpdate:upd, req:false});
    if((kind==='many-to-one'||kind==='one-to-one') && !t.cols.find(c=>c.n===via)){
      t.cols.push({n:via, d:via.replace(/_/g,' ').replace(/^\w/,ch=>ch.toUpperCase()), t:'Reference', ref:target, uq:kind==='one-to-one'||undefined, desc:'Relationship to '+target+'.'});
      t._rows=null;
    }
    if(t.status==='Published') t.status='Draft'; closeModal(); toast('Relationship added','ok');
  }
  renderTableDetail(tid);
}

function confirmRemoveTblRel(id,i){ const t=_table(id); if(!t) return; const r=(t.rels||[])[i]; if(!r) return; const tgt=_table(_refId(r.target));
  $('modalScrim').innerHTML=`<div class="modal"><div class="modal-head"><div class="modal-ic" style="background:var(--tag-error-bg,rgba(224,82,82,0.14));color:var(--tag-error-fg,#f87171);border-color:var(--tag-error-bd,rgba(224,82,82,0.3))">${_RM_IC.del}</div><div class="modal-title">Remove relationship?</div></div>
    <div class="modal-body">This removes the link <b>${escapeHtml(t.alias)} → ${escapeHtml(tgt?tgt.alias:_refId(r.target))}</b> and its <code>${escapeHtml(r.via)}</code> foreign key column. This can't be undone.</div>

  const nm=c.n;
  if(nm==='email') return ['maria','james','ana','carlos','emily','diego'][i%6]+'.'+(1000+i)+'@example.com';
  if(nm==='vin'||nm==='sku'||nm==='code'||nm.includes('number')) return nm.slice(0,3).toUpperCase()+'-'+(10000+i*13);

function _md(m){
  if(_mdCache[m.id]) return _mdCache[m.id];

  const real=_modelEntities(m.id);

  if(real.length){

      pii:(e.tags||[]).some(t=>['customer-360','gdpr','core','pii'].includes(t))||e.domain==='Customer-facing',

      status:e.status, owner:e.owner, updated:e.updated, desc:e.desc }));
  } else {
    const pool=_ENT_POOL.slice(0, Math.max(3, Math.min(_ENT_POOL.length, m.entities)));
    ents=pool.map((p,i)=>({ id:_slug(p.name), name:p.name, real:false, pii:p.pii,
      tables:p.t, cols:p.cols, status:p.draft?'Draft':'Published', owner:pick(i), updated:_AGO[i%_AGO.length],
      desc: i===0
        ? `The ${p.name.toLowerCase()} entity is the backbone of this model. It captures the canonical record for every ${p.name.toLowerCase()} and the identity columns that everything else joins against.`
        : `The ${p.name.toLowerCase()} entity and its records.` }));
  }
  const tables=[]; const SF=[{s:'',code:'',role:'Primary'},{s:' Detail',code:'_detail',role:'Secondary'},{s:' Link',code:'_link',role:'Secondary'}];
  ents.forEach(e=>{ for(let k=0;k<e.tables;k++){ const sf=SF[Math.min(k,2)]; const isP=k===0;
    const code=_slug(e.name)+sf.code+(k>2?('_'+k):'');
    tables.push({ id:m.id+'__'+code, name:e.name+sf.s, code, entity:e.name, entityId:e.id, role:isP?'Primary':sf.role,
      pii:isP&&e.pii, cols:isP?Math.max(4,Math.round(e.cols*0.55)):Math.max(3,Math.round(e.cols*0.4)),
      rel:isP?2:1, status:e.status, owner:e.owner, updated:e.updated,
      desc:isP?`The primary table backing the ${e.name} entity. Stores the canonical record and identity columns that everything else joins against.`
              :`Holds the extended descriptive attributes for each ${e.name}, kept separate from the core record to keep the primary table lean.` }); } });
  const dg=_diagModel2(m,ents);
  const relations=dg.edges.length;
  const others=MODELS.filter(x=>x.id!==m.id);
  const crossN=Math.max(2, Math.min(5, Math.round(ents.length*0.55)));
  const crossTargets=others.slice(0,crossN).map(x=>x.name);
  const e=ents.length;

  const queries=Array.from({length:qN},(_,i)=>({name:['Active by owner','Monthly rollup','Unresolved > 30d','Top 100 by value'][i%4],entity:ents[(i+1)%e].name,owner:pick(i+1),rows:['1.2K','340','88','5.0K'][i%4]}));
  const metrics=Array.from({length:meN},(_,i)=>({name:['Total records','Weekly growth','Avg resolution','Data freshness','Coverage %'][i%5],entity:ents[(i+2)%e].name,owner:pick(i+2),val:['48.2K','+3.4%','4.1h','98%','92%'][i%5]}));
  const datasets=Array.from({length:dsN},(_,i)=>({name:m.name+' rollup',entity:ents[0].name,owner:m.owner,rows:'12.4K'}));
  const compTotal=wN+qN+meN+dsN;
  const draftEnts=ents.filter(x=>x.status!=='Published').length;
  const activity=[
    {t:'Published 3 changes', who:m.owner, when:'1d ago', major:true},
    {t:'Added 2 columns to '+ents[0].name, who:pick(1), when:'2d ago'},
    {t:'Created entity '+ents[Math.min(e-1,8)].name, who:m.owner, when:'4d ago'},
    {t:'Renamed '+ents[Math.min(1,e-1)].name+' fields', who:m.owner, when:'May 18, 2026'},
    {t:'Model created', who:m.owner, when:'May 2, 2026', major:true},
  ];
  const md={ ents, tables, relations, crossN, crossTargets, dg, widgets, queries, metrics, datasets, compTotal, activity, draftEnts,
    counts:{entities:ents.length, tables:tables.length, components:compTotal} };

}
function _diagModel2(m, ents){
  const names=ents.map(e=>e.name); const n=names.length, W=640, H=320, mx=84, my=66, seed=m.id.length;
  const nodes=names.map((label,i)=>{ const t=n>1?i/(n-1):0.5; return {label,i,
    x: mx + t*(W-2*mx),
    y: H/2 + Math.sin(t*Math.PI*2 + seed)*(H/2-my)*0.72 + (((i*29+seed*7)%22)-11) }; });
  const edges=[]; for(let i=0;i<n-1;i++) edges.push([i,i+1]); for(let i=0;i+2<n;i+=3) edges.push([i,i+2]);
  return {nodes, edges, W, H};
}
function _mdDiagram(m, md){

    return {label, ni, x: Math.max(60,Math.min(d.W-60, nd.x + (k-1)*46)), y: up?24:d.H-24}; });
  return `<div class="diag-wrap md-diag">
    <svg id="diagSvg" class="diag-svg" viewBox="0 0 ${d.W} ${d.H}" preserveAspectRatio="xMidYMid meet">
      <g id="diagG">
        ${cross.map(c=>`<line class="diag-edge diag-cross" x1="${d.nodes[c.ni].x.toFixed(1)}" y1="${d.nodes[c.ni].y.toFixed(1)}" x2="${c.x.toFixed(1)}" y2="${c.y.toFixed(1)}"/>`).join('')}
        ${d.edges.map(([a,b])=>`<line class="diag-edge" data-a="${a}" data-b="${b}" x1="${d.nodes[a].x.toFixed(1)}" y1="${d.nodes[a].y.toFixed(1)}" x2="${d.nodes[b].x.toFixed(1)}" y2="${d.nodes[b].y.toFixed(1)}"/>`).join('')}
        ${cross.map(c=>`<text class="diag-cross-lbl" x="${c.x.toFixed(1)}" y="${(c.y<40?c.y-8:c.y+16).toFixed(1)}">${escapeHtml(c.label)}</text>`).join('')}
        ${d.nodes.map(nd=>`<g class="diag-node" data-i="${nd.i}" transform="translate(${nd.x.toFixed(1)},${nd.y.toFixed(1)})" onmouseenter="_diagHover(${nd.i})" onmouseleave="_diagHover(-1)" onclick="event.stopPropagation();_diagClick('${escapeHtml(nd.label)}')">
          <rect class="diag-box" x="-34" y="-12" width="68" height="24" rx="5"/>
          <rect class="diag-top" x="-34" y="-12" width="68" height="3" rx="1.5"/>
          <text class="diag-label" x="0" y="1">${escapeHtml(nd.label)}</text>
        </g>`).join('')}
      </g>
    </svg>
    <div class="diag-ctrls">
      <button class="diag-btn" title="Zoom in" onclick="_diagZoom(1.2)"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><path d="M8 3v10M3 8h10"/></svg></button>
      <button class="diag-btn" title="Zoom out" onclick="_diagZoom(0.83)"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><path d="M3 8h10"/></svg></button>
      <button class="diag-btn" title="Reset layout" onclick="_diagReset()"><svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2.5" y="2.5" width="11" height="11" rx="1.5"/><path d="M8 2.5v11" opacity=".55"/></svg></button>
    </div>
    <div class="diag-hint md-diag-hint"><span class="diag-hint-txt">Hover an entity to trace its relations · click to inspect · drag to pan</span></div>
    <div class="diag-legend"><span><span class="lg-line"></span>Relation</span><span><span class="lg-line lg-dash"></span>Cross-model</span></div>
  </div>`;
}

  const subs=[['widgets','Widgets',md.widgets.length],['queries','Saved Queries',md.queries.length],['metrics','Metrics',md.metrics.length],['datasets','Derived Datasets',md.datasets.length]];
  const data={widgets:md.widgets,queries:md.queries,metrics:md.metrics,datasets:md.datasets}[st.sub];
  const title={widgets:'Widgets',queries:'Saved Queries',metrics:'Metrics',datasets:'Derived Datasets'}[st.sub];
  const desc={widgets:'Widgets that consume entities of '+m.name+'.',queries:'Saved queries built on '+m.name+' entities.',metrics:'Metrics computed from '+m.name+' entities.',datasets:'Datasets derived from '+m.name+' entities.'}[st.sub];
  const ents=[...new Set(md.ents.map(e=>e.name))];
  const q=st.search.toLowerCase();
  const rows=data.filter(x=>!q||x.name.toLowerCase().includes(q)||(x.entity||'').toLowerCase().includes(q));
  const cards = rows.length===0 ? `<div class="empty" style="margin-top:0"><div class="empty-t">${st.sub==='datasets'?'No derived datasets yet':'Nothing matches'}</div>${st.sub==='datasets'?'This model has no derived datasets.':'Try a different search.'}</div>`
    : st.view==='table' ? _mdMiniTable(['Name','Detail','Source entity','Owner'], rows.map(x=>[
        `<span class="mtbl-name">${escapeHtml(x.name)}</span>`, escapeHtml(_mdCompSub(st.sub,x)), escapeHtml(x.entity), `<span class="mtbl-inline">${av(P(x.owner),'sm')}${escapeHtml(P(x.owner).n)}</span>`]))
    : `<div class="mcard-grid md-comp-grid">${rows.map(x=>_mdCompCard(m.id,st.sub,x,data.indexOf(x))).join('')}</div>`;
  return `<div class="md-comp">
    <div class="md-comp-nav">${subs.map(([id,label,cnt])=>`<button class="md-comp-navbtn ${st.sub===id?'on':''}" onclick="mdComp('sub','${id}')"><span class="md-comp-navic">${_COMP_IC[id]}</span><span class="md-comp-navlbl">${label}</span><span class="md-comp-navcnt">${cnt}</span></button>`).join('')}</div>
    <div class="md-comp-main">
      <div class="md-comp-head"><h3>${title}</h3><p>${escapeHtml(desc)}</p></div>
      <div class="tbar md-tbar">
        <label class="dsf-search">${_MDIC.search}<input id="mdCompSearch" type="text" placeholder="Search ${title.toLowerCase()}…" value="${escapeHtml(st.search)}" oninput="mdComp('search',this.value)" autocomplete="off"></label>
        ${dsfDrop('mdCompEn','Source entity',null,[{label:'All entities',selected:true,onclick:"dsfPickSingle()"}].concat(ents.map(e=>({label:e,selected:false,onclick:"dsfPickSingle()"}))))}
        <span class="tbar-spring"></span>
        ${_mdViewToggle2(st.view,'mdCompView')}
        <button class="btn btn-primary" onclick="openMdAddComp('${m.id}')">${_MDIC.plus} Add ${_COMP_SING[st.sub]}</button>
      </div>
      ${cards}</div></div>`;
}
const _COMP_SING={widgets:'widget',queries:'query',metrics:'metric',datasets:'dataset'};
function _mdCompSub(sub,x){ return sub==='widgets'?`${x.type} · ${x.studio}` : sub==='queries'?`Query · ${x.rows} rows` : sub==='metrics'?`Metric · ${x.val}` : `Dataset · ${x.rows} rows`; }
function _mdCompCard(mid,sub,x,idx){
  return `<div class="md-ccard" onclick="openMdCompPreview('${mid}','${sub}',${idx})">
    <div class="md-ccard-h"><span class="md-ccard-ic">${_COMP_IC[sub]}</span><span class="md-ccard-name">${escapeHtml(x.name)}</span><button class="md-cardkb" onclick="event.stopPropagation();_mdCompMenu('${mid}','${sub}',${idx},this)" aria-label="Component actions">${_MDIC.dots}</button></div>
    <div class="md-ccard-sub">${escapeHtml(_mdCompSub(sub,x))}</div>
    <div class="md-ccard-foot"><span class="md-ccard-ent">${_MDIC.ent}${escapeHtml(x.entity)}</span>${av(P(x.owner),'sm')}</div></div>`;
}

/* ══════════════════════════════════════════════════════════════
   MODELS-INSIDE CRUD — entities · tables · components + previews
   Operates on the cached _md(m) object so adds/edits/removes persist
   across re-renders (until publish resets the cache).
   ══════════════════════════════════════════════════════════════ */
const _MD_EYE='<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1.5 8S4 3.5 8 3.5 14.5 8 14.5 8 12 12.5 8 12.5 1.5 8 1.5 8Z"/><circle cx="8" cy="8" r="1.9"/></svg>';
function _mdCtx(id){ const m=_model(id); return m?{m,md:_md(m)}:null; }
function _mdSync(m,md){
  md.counts.entities=md.ents.length; md.counts.tables=md.tables.length;
  md.compTotal=md.widgets.length+md.queries.length+md.metrics.length+md.datasets.length;
  md.counts.components=md.compTotal;
  md.dg=_diagModel2(m,md.ents); md.relations=md.dg.edges.length;
  md.draftEnts=md.ents.filter(x=>x.status!=='Published').length;
  m.entities=md.ents.length; _mdEdited(m);
}
function _mdColNames(n){ const base=['id','name','code','status','description','created_at','updated_at','owner_id','external_id','is_active','notes','type','source','region','amount','priority']; return base.slice(0,Math.max(1,Math.min(base.length,n||6))); }
function _soOpen(){ $('slideout').classList.add('open'); $('slideout').setAttribute('aria-hidden','false'); $('scrim').classList.add('open'); }
function _mdKebab(btn,items){
  closeRowMenu();
  const it=x=> x==='sep' ? '<div class="rowmenu-sep"></div>' : `<button class="rowmenu-item ${x.danger?'danger':''}" onclick="closeRowMenu();${x.act}">${x.ic}${x.label}</button>`;
  const div=document.createElement('div'); div.id='rowmenu'; div.className='rowmenu'; div.innerHTML=items.filter(Boolean).map(it).join('');
  document.body.appendChild(div);
  const r=btn.getBoundingClientRect(), w=div.offsetWidth||200;
  div.style.left=Math.max(8,Math.min(r.right-w,window.innerWidth-w-8))+'px';
  let top=r.bottom+6; if(top+div.offsetHeight>window.innerHeight-8) top=Math.max(8,r.top-div.offsetHeight-6);
  div.style.top=top+'px';
  setTimeout(()=>{ document.addEventListener('click',_rowMenuOutside,true); document.addEventListener('keydown',_rowMenuEsc,true); },0);
}
const _RIF=(disp,id,ctrl,req,type)=>`<div class="ri-field"><div class="ri-flabel"><span class="ri-fdisp">${disp}${req?' <span style="color:var(--field-text-error)">*</span>':''}</span>${type?`<span class="ri-ftype">${type}</span>`:''}</div>${ctrl}</div>`;

function openMdAddEntity(id){ openMdEntityForm(id,null); }

function openMdEntityForm(id,entId){
  const c=_mdCtx(id); if(!c) return; const {m}=c; const e=entId?_mdEnt(id,entId):null; const owners=_mdOwners();
  $('slideout').innerHTML=`
    <div class="so-head"><div><div class="so-title">${e?'Edit entity':'Add entity'}</div><div class="so-internal">${escapeHtml(m.name)}</div></div><button class="so-close" onclick="closeSlideout()" aria-label="Close">✕</button></div>
    <div class="so-body">
      ${_RIF('Name',null,`<input class="minput" id="mde_name" value="${e?escapeHtml(e.name):''}" placeholder="e.g. Contact" autocomplete="off">`,1,'string')}
      ${_RIF('Description',null,`<textarea class="mtextarea" id="mde_desc" placeholder="What this entity represents.">${e?escapeHtml(e.desc):''}</textarea>`)}
      ${_RIF('Owner',null,`<select class="minput" id="mde_owner">${owners.map(k=>`<option value="${k}" ${e&&e.owner===k?'selected':''}>${escapeHtml(P(k).n)}</option>`).join('')}</select>`)}
      ${_RIF('Status',null,`<select class="minput" id="mde_status">${['Draft','Published'].map(s=>`<option ${(e?e.status===s:s==='Draft')?'selected':''}>${s}</option>`).join('')}</select>`)}
      ${e?'':_RIF('Tables',null,`<select class="minput" id="mde_tables"><option value="1">1 — primary only</option><option value="2">2 — primary + detail</option><option value="3">3 — primary + detail + link</option></select>`,0,'1–3')}
      <label class="mde-check"><input type="checkbox" id="mde_pii" ${e&&e.pii?'checked':''}> Contains PII</label>
    </div>
    <div class="so-foot"><button class="btn" onclick="closeSlideout()">Cancel</button><button class="btn btn-primary" onclick="saveMdEntity('${id}','${entId||''}')">${_MDIC.plus}${e?'Save changes':'Add entity'}</button></div>`;
  _soOpen(); setTimeout(()=>{const el=$('mde_name'); if(el)el.focus();},60);
}
function saveMdEntity(id,entId){
  const c=_mdCtx(id); if(!c) return; const {m,md}=c;
  const name=($('mde_name').value||'').trim(); if(!name){ toast('Enter a name'); return; }
  const desc=($('mde_desc').value||'').trim(), owner=$('mde_owner').value, status=$('mde_status').value, pii=$('mde_pii').checked;
  if(entId){ const e=md.ents.find(x=>x.id===entId); if(e){ e.name=name; e.desc=desc; e.owner=owner; e.status=status; e.pii=pii; e.updated='just now';
      md.tables.filter(t=>t.entityId===entId).forEach(t=>{ t.entity=name; t.owner=owner; if(t.role==='Primary'){ t.pii=pii; t.status=status; } }); }
    _mdSync(m,md); closeSlideout(); toast('Entity “'+name+'” updated','ok'); renderModelDetail(id); return; }
  let base=_slug(name), uid=base, k=2; while(md.ents.find(e=>e.id===uid)) uid=base+'-'+(k++);
  const nT=parseInt(($('mde_tables')||{}).value||'1',10)||1; const cols=6*nT;
  md.ents.unshift({ id:uid, name, real:false, pii, tables:nT, cols, status, owner, updated:'just now', desc:desc||('The '+name.toLowerCase()+' entity and its records.') });
  const SF=[{s:'',code:'',role:'Primary'},{s:' Detail',code:'_detail',role:'Secondary'},{s:' Link',code:'_link',role:'Secondary'}];
  for(let i=0;i<nT;i++){ const sf=SF[Math.min(i,2)], isP=i===0, code=uid.replace(/-/g,'_')+sf.code;
    md.tables.push({ id:m.id+'__'+code, name:name+sf.s, code, entity:name, entityId:uid, role:isP?'Primary':sf.role, pii:isP&&pii,
      cols:isP?Math.max(4,Math.round(cols*0.55)):Math.max(3,Math.round(cols*0.4)), rel:isP?2:1, status, owner, updated:'just now',
      desc:isP?('The primary table backing the '+name+' entity.'):('Holds the extended attributes for each '+name+'.') }); }
  _mdSync(m,md); closeSlideout(); toast('Entity “'+name+'” added','ok'); modelDetailState.tab='entities'; renderModelDetail(id);
}
function openMdEntityPreview(id,entId){
  const c=_mdCtx(id); if(!c) return; const {m,md}=c; const e=md.ents.find(x=>x.id===entId); if(!e) return;
  if(e.real && _entById(entId)) return openEntityPreview(entId);   // real entity → full catalog preview
  const pseudo={name:e.name, tables:md.tables.filter(t=>t.entityId===entId).map(t=>({id:t.id,alias:t.name,role:t.role,cols:t.cols}))};
  const er=_erEntityNodes(pseudo);
  const drift=e.status==='Published'?'No drift detected against the catalog baseline.':e.status==='Draft'?'Draft — not yet published to the catalog.':e.status==='Pending changes'?'Pending changes awaiting publish.':'Deprecated — superseded.';
  const insights=[`${e.tables} table${e.tables===1?'':'s'} in ${escapeHtml(m.name)}, last touched ${escapeHtml(e.updated)}.`, drift, `${e.cols} column${e.cols===1?'':'s'} total${e.pii?' · contains PII':''}.`];
  const stats=[['Tables',e.tables],['Columns',e.cols],['PII',e.pii?'Yes':'No'],['Updated',escapeHtml(e.updated)]];
  const badges=`${_modelChip(m.id)}${e.pii?_piiBadge():''}`;
  $('slideout').innerHTML=`${_pvHead(_IC_ENTITY,e.name,_stPill(e.status),badges,'')}
    <div class="so-body">${_pvInsights(insights)}<div class="so-desc" style="margin-bottom:8px">${escapeHtml(e.desc)}</div>${_erDiagram(er.nodes,er.edges,er.note)}${_pvStats(stats)}</div>
    <div class="so-foot"><button class="btn btn-danger" style="margin-right:auto" onclick="confirmMdRemoveEnt('${id}','${entId}')">${_RM_IC.del} Remove</button><button class="btn btn-primary" onclick="openMdEditEntity('${id}','${entId}')">${_MDIC.edit} Edit entity</button></div>`;
  _soOpen(); setTimeout(_diagInit,0);
}
function mdEntMenu(id,entId,btn){ const e=_mdEnt(id,entId); if(!e) return;
  _mdKebab(btn,[
    {ic:_MD_EYE,label:'Preview',act:`openMdEntityPreview('${id}','${entId}')`},

}
function confirmMdRemoveEnt(id,entId){ const e=_mdEnt(id,entId); if(!e) return; const mn=(_model(id)||{}).name||'this model';
  $('modalScrim').innerHTML=`<div class="modal"><div class="modal-head"><div class="modal-ic" style="background:var(--tag-error-bg,rgba(224,82,82,0.14));color:var(--tag-error-fg,#f87171);border-color:var(--tag-error-bd,rgba(224,82,82,0.3))">${_RM_IC.del}</div><div class="modal-title">Remove “${escapeHtml(e.name)}”?</div></div>

    <div class="modal-foot"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-danger" onclick="_mdRemoveEnt('${id}','${entId}')">Remove entity</button></div></div>`;
  $('modalScrim').classList.add('open');
}
function _mdRemoveEnt(id,entId){ const c=_mdCtx(id); if(!c) return; const {m,md}=c; const e=md.ents.find(x=>x.id===entId); const nm=e?e.name:'Entity';
  md.ents=md.ents.filter(x=>x.id!==entId); md.tables=md.tables.filter(t=>t.entityId!==entId);

      ${_RIF('Status',null,`<select class="minput" id="mdt_status">${['Draft','Published'].map(s=>`<option ${(t?t.status===s:s==='Draft')?'selected':''}>${s}</option>`).join('')}</select>`)}
      ${_RIF('Columns',null,`<input class="minput" id="mdt_cols" type="number" min="1" max="60" value="${t?t.cols:6}">`,0,'int')}
      ${_RIF('Description',null,`<textarea class="mtextarea" id="mdt_desc" placeholder="What this table stores.">${t?escapeHtml(t.desc):''}</textarea>`)}

  _soOpen(); setTimeout(()=>{const el=$('mdt_name'); if(el)el.focus();},60);

function saveMdTable(id,tblId){
  const c=_mdCtx(id); if(!c) return; const {m,md}=c;
  const name=($('mdt_name').value||'').trim(); if(!name){ toast('Enter a name'); return; }
  let code=($('mdt_code').value||'').trim().toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,''); if(!code) code=_slug(name).replace(/-/g,'_');
  const entId=$('mdt_entity').value; const ent=md.ents.find(e=>e.id===entId)||{name:'—',owner:m.owner};
  const role=$('mdt_type').value, status=$('mdt_status').value, cols=Math.max(1,parseInt($('mdt_cols').value,10)||6), desc=($('mdt_desc').value||'').trim();
  if(tblId){ const t=md.tables.find(x=>x.id===tblId); if(t){ t.name=name; t.code=code; t.entity=ent.name; t.entityId=entId; t.role=role; t.status=status; t.cols=cols; t.desc=desc; t.updated='just now'; }
    _mdSync(m,md); closeSlideout(); toast('Table “'+name+'” updated','ok'); renderModelDetail(id); return; }
  let uid=m.id+'__'+code, k=2; while(md.tables.find(x=>x.id===uid)) uid=m.id+'__'+code+'_'+(k++);
  md.tables.push({ id:uid, name, code, entity:ent.name, entityId:entId, role, pii:false, cols, rel:role==='Primary'?2:1, status, owner:ent.owner||m.owner, updated:'just now', desc:desc||('Table backing the '+ent.name+' entity.') });
  _mdSync(m,md); closeSlideout(); toast('Table “'+name+'” added','ok'); modelDetailState.tab='tables'; renderModelDetail(id);
}
function openMdTablePreview(id,tblId){

/* ── COMPONENTS (widgets · queries · metrics · datasets) ──── */
function openMdAddComp(id){ openMdCompForm(id,modelDetailState.comp.sub,null); }
function openMdCompForm(id,sub,idx){
  const c=_mdCtx(id); if(!c) return; const {m,md}=c; const arr=md[sub]; const x=(idx!=null&&idx>=0)?arr[idx]:null;
  const singular={widgets:'widget',queries:'saved query',metrics:'metric',datasets:'derived dataset'}[sub];
  const ents=md.ents.map(e=>e.name); const owners=_mdOwners();
  let extra='';
  if(sub==='widgets'){ const TY=['Timeline','Table','Chart'], STUD=['Exec summary','Team board','Sales studio · Overview','Ops studio · Live','Finance · Monthly'];
    extra=_RIF('Type',null,`<select class="minput" id="mdk_type">${TY.map(o=>`<option ${x&&x.type===o?'selected':''}>${o}</option>`).join('')}</select>`)
        + _RIF('Studio',null,`<select class="minput" id="mdk_studio">${STUD.map(o=>`<option ${x&&x.studio===o?'selected':''}>${o}</option>`).join('')}</select>`); }
  else if(sub==='metrics'){ extra=_RIF('Value',null,`<input class="minput" id="mdk_val" value="${x?escapeHtml(x.val):''}" placeholder="e.g. 98%" autocomplete="off">`,0,'string'); }

/* ──────────────────────────────────────────────────────────────
   ALL-FILTERS SLIDEOUT (draft → Apply / Clear) — Entities / Tables / Reference
   ────────────────────────────────────────────────────────────── */
function _fltCfg(surface){
  const uniq=a=>[...new Set(a)];
  const cnt=(rows,key,val)=>rows.filter(r=>r[key]===val).length;
  const tagOpts=rows=>uniq(rows.flatMap(r=>r.tags||[])).sort().map(v=>({value:v,label:v,count:rows.filter(r=>(r.tags||[]).includes(v)).length}));
  if(surface==='entities'){ const rows=ENTITIES; return {label:'Entities', state:listState, render:renderEntities, groups:[
    {key:'model',label:'Model',options:uniq(rows.map(r=>r.model)).map(v=>({value:v,label:(_model(v)||{name:v}).name,count:cnt(rows,'model',v)}))},
    {key:'domain',label:'Domain',options:uniq(rows.map(r=>r.domain)).map(v=>({value:v,label:v,count:cnt(rows,'domain',v)}))},
    {key:'status',label:'Status',options:['Published','Draft','Pending changes','Deprecated'].map(v=>({value:v,label:v,count:cnt(rows,'status',v)}))},
    {key:'owner',label:'Owner',options:uniq(rows.map(r=>r.owner)).map(v=>({value:v,label:P(v).n,count:cnt(rows,'owner',v)}))},
    {key:'tags',label:'Tags',multi:true,options:tagOpts(rows)},
  ]}; }
  if(surface==='tables'){ const rows=TABLES; return {label:'Tables', state:tablesListState, render:renderTablesList, groups:[
    {key:'model',label:'Model',options:uniq(rows.map(r=>r.model)).map(v=>({value:v,label:(_model(v)||{name:v}).name,count:cnt(rows,'model',v)}))},
    {key:'entity',label:'Entity',options:uniq(rows.map(r=>r.entityId)).map(v=>({value:v,label:(ENTITIES.find(e=>e.id===v)||{}).name||v,count:cnt(rows,'entityId',v)}))},
    {key:'type',label:'Type',options:['Primary','Secondary'].map(v=>({value:v,label:v,count:cnt(rows,'role',v)}))},
    {key:'status',label:'Status',options:['Published','Draft','Archived'].map(v=>({value:v,label:v,count:cnt(rows,'status',v)}))},
    {key:'tags',label:'Tags',multi:true,options:tagOpts(rows)},
  ]}; }
  const rows=REFDATA; return {label:'Reference Data', state:refListState, render:renderReferenceList, groups:[
    {key:'category',label:'Category',options:uniq(rows.map(r=>r.category)).map(v=>({value:v,label:v,count:cnt(rows,'category',v)}))},
    {key:'origin',label:'Origin',options:['Custom','From catalog'].map(v=>({value:v,label:v,count:cnt(rows,'origin',v)}))},
    {key:'status',label:'Status',options:['Published','Draft','Archived'].map(v=>({value:v,label:v,count:cnt(rows,'status',v)}))},
    {key:'tags',label:'Tags',multi:true,options:tagOpts(rows)},
  ]};
}
function _fltCount(surface){ const cfg=_fltCfg(surface); const st=cfg.state; return cfg.groups.reduce((n,g)=>n+(g.multi?((st[g.key]||[]).length):(st[g.key]&&st[g.key]!=='all'?1:0)),0); }
let _fltDraft=null;
function openFilters(surface){
  const cfg=_fltCfg(surface); const st=cfg.state;
  _fltDraft={surface}; cfg.groups.forEach(g=>{ _fltDraft[g.key]= g.multi ? (st[g.key]||[]).slice() : (st[g.key]||'all'); });
  _renderFilters();
  $('slideout').classList.add('open'); $('slideout').setAttribute('aria-hidden','false'); $('scrim').classList.add('open');
}
function _renderFilters(){
  const cfg=_fltCfg(_fltDraft.surface), d=_fltDraft;
  const active=cfg.groups.reduce((n,g)=>n+(g.multi?d[g.key].length:(d[g.key]!=='all'?1:0)),0);
  $('slideout').innerHTML=`
    <div class="so-head"><div><div class="so-title">Filters</div><div class="so-internal">${escapeHtml(cfg.label)}${active?` · ${active} active`:''}</div></div><button class="so-close" onclick="closeSlideout()" aria-label="Close">✕</button></div>
    <div class="so-body">
      ${cfg.groups.map(g=>`<div class="so-sec"><div class="so-sec-h">${escapeHtml(g.label)}</div><div class="flt-opts">
        ${g.multi
          ? g.options.map(o=>`<button class="flt-opt ${d[g.key].includes(o.value)?'on':''}" onclick="_fltTag('${g.key}','${escapeHtml(o.value)}')">${escapeHtml(o.label)}${o.count!=null?`<span class="flt-c">${o.count}</span>`:''}</button>`).join('')
          : [{value:'all',label:'All'}].concat(g.options).map(o=>`<button class="flt-opt ${String(d[g.key])===String(o.value)?'on':''}" onclick="_fltPick('${g.key}','${escapeHtml(o.value)}')">${escapeHtml(o.label)}${o.count!=null?`<span class="flt-c">${o.count}</span>`:''}</button>`).join('')
        }</div></div>`).join('')}
    </div>
    <div class="so-foot"><button class="btn" onclick="_fltClear()">Clear all</button><button class="btn btn-primary" onclick="_fltApply()">Apply filters</button></div>`;
}
function _fltPick(key,val){ _fltDraft[key]=val; _renderFilters(); }
function _fltTag(key,val){ const a=_fltDraft[key]; const i=a.indexOf(val); i<0?a.push(val):a.splice(i,1); _renderFilters(); }
function _fltClear(){ const cfg=_fltCfg(_fltDraft.surface); cfg.groups.forEach(g=>{ _fltDraft[g.key]= g.multi?[]:'all'; }); _renderFilters(); }
function _fltApply(){ const cfg=_fltCfg(_fltDraft.surface), st=cfg.state; cfg.groups.forEach(g=>{ st[g.key]= g.multi? _fltDraft[g.key].slice() : _fltDraft[g.key]; }); st.page=1; closeSlideout(); cfg.render(); }

  reference:{arr:REFDATA,  render:renderReferenceList, nameKey:'name',  route:'reference', published:'Published', archived:'Archived'},
})[surface]; }
const _RM_IC={
  open:'<svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h7v7M13 3L7 9"/><path d="M11 13H4a1 1 0 0 1-1-1V5"/></svg>',

};
function closeRowMenu(){ const m=$('rowmenu'); if(m) m.remove(); document.removeEventListener('click',_rowMenuOutside,true); document.removeEventListener('keydown',_rowMenuEsc,true); }
function _rowMenuOutside(e){ if(!e.target.closest('#rowmenu')) closeRowMenu(); }
function _rowMenuEsc(e){ if(e.key==='Escape') closeRowMenu(); }
function openRowMenu(surface,id,btn){
  closeRowMenu();
  const cfg=_surfCfg(surface); const row=cfg.arr.find(r=>r.id===id); if(!row) return;
  const isPub=row.status===cfg.published;
  const item=(ic,label,act,danger)=>`<button class="rowmenu-item ${danger?'danger':''}" onclick="${act}">${ic}${label}</button>`;
  const html=[
    item(_RM_IC.open,'Open',`_rowAct('${surface}','${id}','open')`),
    item(_RM_IC.dup,'Duplicate',`_rowAct('${surface}','${id}','duplicate')`),
    item(_RM_IC.exp,'Export JSON',`_rowAct('${surface}','${id}','export')`),
    '<div class="rowmenu-sep"></div>',
    isPub ? item(_RM_IC.arch,'Archive',`_rowAct('${surface}','${id}','archive')`) : item(_RM_IC.pub,'Publish',`_rowAct('${surface}','${id}','publish')`),
    '<div class="rowmenu-sep"></div>',
    item(_RM_IC.del,'Delete',`_rowAct('${surface}','${id}','delete')`,true),
  ].join('');
  const div=document.createElement('div'); div.id='rowmenu'; div.className='rowmenu'; div.innerHTML=html;
  document.body.appendChild(div);
  const r=btn.getBoundingClientRect(), w=div.offsetWidth||190;
  let left=Math.max(8, Math.min(r.right-w, window.innerWidth-w-8));
  let top=r.bottom+6; if(top+div.offsetHeight > window.innerHeight-8) top=Math.max(8, r.top-div.offsetHeight-6);
  div.style.left=left+'px'; div.style.top=top+'px';

}
function _rowAct(surface,id,action){
  closeRowMenu();
  const cfg=_surfCfg(surface), arr=cfg.arr, i=arr.findIndex(r=>r.id===id); if(i<0) return; const row=arr[i], nm=row[cfg.nameKey];
  if(action==='open'){ navigate(cfg.route+'/'+id); return; }
  if(action==='export'){ toast('Exported “'+nm+'”.json','ok'); return; }
  if(action==='duplicate'){ const clone=JSON.parse(JSON.stringify(row)); let base=id+'_copy',u=base,k=2; while(arr.find(r=>r.id===u)) u=base+'_'+(k++); clone.id=u; clone[cfg.nameKey]=nm+' (copy)'; clone.status='Draft'; clone.updated='just now'; arr.splice(i,0,clone); cfg.render(); toast('Duplicated “'+nm+'”','ok'); return; }
  if(action==='publish'){ row.status=cfg.published; cfg.render(); toast('“'+nm+'” published','ok'); return; }
  if(action==='archive'){ row.status=cfg.archived; cfg.render(); toast('“'+nm+'” '+cfg.archived.toLowerCase(),'ok'); return; }
  if(action==='delete'){ _rowConfirmDelete(surface,id); return; }
}

function _rowDelete(surface,id){ const cfg=_surfCfg(surface), i=cfg.arr.findIndex(r=>r.id===id); if(i<0) return; const nm=cfg.arr[i][cfg.nameKey]; cfg.arr.splice(i,1); closeModal(); toast('“'+nm+'” deleted','ok'); cfg.render(); }

/* mini ER thumbnail — deterministic, static */
function _tplThumb(seed){
  const n=7, W=190, H=104, cx=W/2, cy=H/2, pts=[];
  for(let i=0;i<n;i++){ const a=(i/n)*Math.PI*2 + seed*0.7; pts.push([cx+Math.cos(a)*(W*0.30)+(((i*17+seed*5)%18)-9), cy+Math.sin(a)*(H*0.30)+(((i*11+seed*3)%12)-6)]); }
  let edges=''; for(let i=0;i<n;i++){ const j=(i+1)%n; edges+=`<line x1="${pts[i][0].toFixed(0)}" y1="${pts[i][1].toFixed(0)}" x2="${pts[j][0].toFixed(0)}" y2="${pts[j][1].toFixed(0)}"/>`; if(i%2===0){ const k=(i+2)%n; edges+=`<line x1="${pts[i][0].toFixed(0)}" y1="${pts[i][1].toFixed(0)}" x2="${pts[k][0].toFixed(0)}" y2="${pts[k][1].toFixed(0)}"/>`; } }
  const nodes=pts.map(p=>`<g transform="translate(${p[0].toFixed(0)},${p[1].toFixed(0)})"><rect x="-16" y="-6.5" width="32" height="13" rx="3"/><rect x="-16" y="-6.5" width="32" height="2.5" rx="1.2" class="tt-top"/></g>`).join('');
  return `<svg class="tpl-thumb" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" aria-hidden="true"><g class="tt-edges">${edges}</g><g class="tt-nodes">${nodes}</g></svg>`;
}

  const q=mktState.q.toLowerCase();
  let a=TEMPLATES.filter(t=>{
    if(mktState.cat!=='all' && mktState.cat!=='featured' && mktState.cat!=='recent' && t.cat!==mktState.cat) return false;
    if(mktState.cat==='featured' && !t.featured) return false;

    if(q && !(t.name.toLowerCase().includes(q)||t.desc.toLowerCase().includes(q)||_catName(t.cat).toLowerCase().includes(q))) return false;
    return true;
  });
  if(mktState.cat==='recent') a=a.slice().sort((x,y)=>Date.parse(y.updated)-Date.parse(x.updated)).slice(0,6);
  if(mktState.sort==='popular') a=a.slice().sort((x,y)=>(+String(y.tenants).replace(/,/g,''))-(+String(x.tenants).replace(/,/g,'')));

const AI_PROPOSAL={ name:'Custom Model', slug:'custom_model',
  desc:'A starting structure for your domain — a core record with its categories, owners, related activity and attachments. We’ll refine the entities together as you describe more.',
  ents:[{n:'Record',c:9},{n:'Category',c:4},{n:'Owner',c:6},{n:'Activity',c:6},{n:'Attachment',c:5}], rel:4, refs:2 };
const AI_QUESTIONS=[
  {q:'Hi! I’ll help you design a model. In a sentence or two — what domain do you want to capture?'},
  {q:'Got it. What’s the main thing you’ll be tracking, and who works with it day to day?'},
  {q:'Are there any key events or milestones in its lifecycle I should capture as their own records?', chips:['Yes, there are','Not really']},
  {q:'Last one — any notes, files or attachments the team adds that we should model?', chips:['Yes','No']},
];
const AI_BUILD_STEPS=['Analyzing your answers','Proposing entities','Wiring relationships','Adding reference data','Finalizing preview'];
const _AI_SPARK='<svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"><path d="M8 1.5l1.4 3.7 3.7 1.4-3.7 1.4L8 11.7 6.6 8 2.9 6.6l3.7-1.4L8 1.5Z"/></svg>';
const _AI_CHK='<svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8.5l3.5 3.5L13 4.5"/></svg>';
let aiState={ step:0, msgs:[], phase:'asking', build:0 };
function _aiReset(){ aiState={ step:0, phase:'asking', build:0, msgs:[{who:'ai', t:AI_QUESTIONS[0].q, chips:AI_QUESTIONS[0].chips}] }; }
function aiSend(v){
  v=(v||'').trim(); if(!v || aiState.phase!=='asking') return;
  aiState.msgs.push({who:'me', t:v});
  aiState.step++;
  if(aiState.step < AI_QUESTIONS.length){
    const nq=AI_QUESTIONS[aiState.step];
    aiState.msgs.push({who:'ai', t:nq.q, chips:nq.chips});
    renderAIAssist();
  } else {
    aiState.msgs.push({who:'ai', t:'Perfect — I have enough. Building your model now…'});
    aiState.phase='building'; aiState.build=0;
    renderAIAssist();
    setTimeout(_aiBuildTick, 500);
  }
}
function aiChip(v){ aiSend(v); }
function _aiBuildTick(){
  aiState.build++;
  const prev=$('aiPrev'); if(prev) prev.innerHTML=_aiPrevHTML();
  if(aiState.build < AI_BUILD_STEPS.length){ setTimeout(_aiBuildTick, 650); }
  else { setTimeout(()=>{ aiState.phase='ready'; aiState.msgs.push({who:'ai', t:'Done! Here’s your proposed model on the right — tell me what to adjust, or accept and create.'}); renderAIAssist(); }, 750); }
}
function aiStartOver(){ _aiReset(); renderAIAssist(); toast('Started over'); }
function aiCreate(){
  if(aiState.phase!=='ready'){ toast('Answer a few questions first — your model is still being designed'); return; }
  let base=AI_PROPOSAL.slug, u=base, k=2; while(_model(u)) u=base+'_'+(k++);
  MODELS.unshift({id:u, name:AI_PROPOSAL.name, origin:'Custom', category:'Custom', status:'Draft', entities:AI_PROPOSAL.ents.length, owner:'sb', collab:[], updated:'just now', tags:['ai-generated'], desc:AI_PROPOSAL.desc});
  _mdReset&&_mdReset(u);
  toast('“'+AI_PROPOSAL.name+'” created with AI','ok');
  navigate('models/'+u);
}
function renderAIAssist(){
  if(!aiState.msgs.length) _aiReset();
  const asking=aiState.phase==='asking', building=aiState.phase==='building', ready=aiState.phase==='ready';
  const last=aiState.msgs[aiState.msgs.length-1];
  const bubbles=aiState.msgs.map(m=> m.who==='ai'
    ? `<div class="ai-row ai-row-ai"><span class="ai-av">${_AI_SPARK}</span><div class="ai-bub ai-bub-ai">${escapeHtml(m.t)}${m.chips&&asking&&m===last?`<div class="ai-chips">${m.chips.map(c=>`<button class="ai-chip" onclick="aiChip('${escapeHtml(c)}')">${escapeHtml(c)}</button>`).join('')}</div>`:''}</div></div>`
    : `<div class="ai-row ai-row-me"><div class="ai-bub ai-bub-me">${escapeHtml(m.t)}</div></div>`
  ).join('');
  const typing = building?`<div class="ai-row ai-row-ai"><span class="ai-av">${_AI_SPARK}</span><div class="ai-bub ai-bub-ai ai-typing"><span></span><span></span><span></span></div></div>`:'';
  $('content').innerHTML=`
    <div class="ai-head-row">${_crumbs([{label:'Models',href:'#/models'},{label:'New model',href:'#/models/new'},{label:'AI Assist'}])}<span class="ai-head-tag">${_AI_SPARK}Designing your model with AI</span></div>
    <div class="ai-layout">
      <div class="ai-pane ai-chat-pane">
        <div class="ai-chat" id="aiChat">${bubbles}${typing}</div>
        <div class="ai-input"><input id="aiInput" type="text" placeholder="${ready?'Ask for changes, or accept the proposal…':building?'Building your model…':'Type your answer…'}" ${building?'disabled':''} onkeydown="if(event.key==='Enter'){aiSend(this.value);this.value='';}" autocomplete="off"><button class="ai-send" ${building?'disabled':''} onclick="var i=$('aiInput');aiSend(i.value);i.value='';" aria-label="Send"><svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M2 8h10M8 4l4 4-4 4"/></svg></button></div>
      </div>
      <div class="ai-pane ai-prev-pane" id="aiPrev">${_aiPrevHTML()}</div>
    </div>
    <div class="ai-foot">
      <button class="btn" onclick="navigate('models/new')">Cancel</button>
      <span class="tbar-spring"></span>
      <button class="ai-foot-link" onclick="aiStartOver()"><svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8a5 5 0 1 1 1.5 3.5M3 8V5M3 8h3"/></svg> Start over</button>
      <span class="ai-foot-or">${ready?'Or accept the current proposal':'Answer the questions to generate a model'}</span>
      <button class="btn btn-primary" ${ready?'':'disabled'} onclick="aiCreate()">Accept and create <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8.5l3.5 3.5L13 4.5"/></svg></button>
    </div>`;
  setTimeout(()=>{const c=$('aiChat'); if(c)c.scrollTop=c.scrollHeight;},0);
}
function _aiPrevHTML(){
  if(aiState.phase==='building') return _aiPrevBuilding();
  if(aiState.phase==='ready') return _aiPrevReady();
  return _aiPrevEmpty();
}
function _aiPrevEmpty(){
  return `<div class="ai-prev-empty">
    <div class="ai-prev-empty-ic"><svg width="26" height="26" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"><path d="M8 1.5l1.4 3.7 3.7 1.4-3.7 1.4L8 11.7 6.6 8 2.9 6.6l3.7-1.4L8 1.5Z"/><path d="M12.5 10.5l.5 1.4 1.4.5-1.4.5-.5 1.4-.5-1.4-1.4-.5 1.4-.5.5-1.4Z"/></svg></div>
    <div class="ai-prev-empty-t">Your model will take shape here</div>
    <div class="ai-prev-empty-d">Answer a few questions on the left and I’ll propose a structure — entities, relationships and reference data — that you can refine and create.</div>
  </div>`;
}
function _aiPrevBuilding(){
  const n=AI_BUILD_STEPS.length;
  const steps=AI_BUILD_STEPS.map((s,i)=>{ const done=i<aiState.build-1; const active=i===aiState.build-1;
    return `<div class="ai-build-step ${done?'done':''} ${active?'active':''}"><span class="ai-build-dot">${done?_AI_CHK:active?'<span class="ai-spin"></span>':''}</span><span class="ai-build-lbl">${escapeHtml(s)}</span></div>`; }).join('');
  const pct=Math.round(Math.min(aiState.build,n)/n*100);
  const skelNodes=Array.from({length:5},(_,i)=>`<div class="ai-skel-node" style="left:${8+i*19}%; top:${28+(i%2?34:0)}%"></div>`).join('');
  const skelRows=Array.from({length:4},()=>`<div class="ai-skel-row"></div>`).join('');
  return `<div class="ai-prev-head"><div><div class="ai-prev-title">Building your model</div><code class="md-code">model.custom_model</code></div><span class="ai-prev-tag ai-tag-building"><span class="ai-spin ai-spin-sm"></span> Generating…</span></div>
    <div class="ai-build-bar"><span style="width:${pct}%"></span></div>
    <div class="ai-build-steps">${steps}</div>
    <div class="ai-skel-diag">${skelNodes}</div>
    <div class="ai-skel-rows">${skelRows}</div>`;
}
function _aiPrevReady(){
  const p=AI_PROPOSAL;
  return `<div class="ai-prev-head"><div><div class="ai-prev-title">${escapeHtml(p.name)}</div><code class="md-code">model.${escapeHtml(p.slug)}</code></div><span class="ai-prev-tag">● Preview · not saved yet</span></div>
    <p class="ai-prev-desc">${escapeHtml(p.desc)}</p>
    ${_aiDiagram(p)}
    <div class="ai-prev-counts">${p.ents.length} entities · ${p.rel} relations · ${p.refs} reference lists</div>
    <div class="ai-prev-lbl">Entities</div>
    <div class="ai-ent-list">${p.ents.map(e=>`<div class="ai-ent"><span class="ai-ent-ic"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="2" y="3" width="12" height="10" rx="1.4"/><path d="M2 6.5h12M6 6.5v6.5"/></svg></span><span class="ai-ent-n">${escapeHtml(e.n)}</span><span class="ai-ent-c">${e.c} cols <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4l4 4-4 4"/></svg></span></div>`).join('')}</div>`;
}
function _aiDiagram(p){
  const n=p.ents.length, W=560, H=190, mx=70, my=44;
  const nodes=p.ents.map((e,i)=>{ const t=n>1?i/(n-1):0.5; return {label:e.n, x:mx+t*(W-2*mx), y:H/2+Math.sin(t*Math.PI*1.6)*(H/2-my)*0.7}; });
  let edges=''; for(let i=0;i<n-1;i++) edges+=`<line class="diag-edge" x1="${nodes[i].x.toFixed(0)}" y1="${nodes[i].y.toFixed(0)}" x2="${nodes[i+1].x.toFixed(0)}" y2="${nodes[i+1].y.toFixed(0)}"/>`;
  const g=nodes.map(nd=>`<g class="diag-node" transform="translate(${nd.x.toFixed(0)},${nd.y.toFixed(0)})"><rect class="diag-box" x="-34" y="-12" width="68" height="24" rx="5"/><rect class="diag-top" x="-34" y="-12" width="68" height="3" rx="1.5"/><text class="diag-label" x="0" y="1">${escapeHtml(nd.label)}</text></g>`).join('');
  return `<div class="diag-wrap ai-diag"><svg class="diag-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet"><g>${edges}${g}</g></svg><div class="diag-hint ai-diag-hint"><span class="diag-hint-txt">Hover an entity to trace its relations · click to inspect · drag to pan</span></div><div class="diag-legend"><span><span class="lg-line"></span>Relation</span><span><span class="lg-line lg-dash"></span>Cross-model</span></div></div>`;
}

const _TBL_TYPE={PK:'UUID',FK:'Reference',text:'Text',enum:'Enum',numeric:'Number',int:'Number',date:'Date',timestamptz:'Timestamp',bool:'Boolean'};
function _schemaToCols(schema){ return schema.map(c=>({ n:c.n, d:c.n.replace(/_/g,' ').replace(/\b\w/g,m=>m.toUpperCase()), t:_TBL_TYPE[c.t]||'Text', pk:c.t==='PK'?1:0, uq:0, req:(c.t==='PK'||c.t==='FK')?1:0, idx:(c.t==='PK'||c.t==='FK')?1:0, sens:'', desc:'' })); }
function _tblNewId(nm){ let base=_slug(nm),u=base,k=2; while(TABLES.find(t=>t.id===u)) u=base+'_'+(k++); return u; }
function _tblAnchorEntity(){ return ENTITIES[0]||{id:'',name:'—',model:(MODELS[0]||{}).id}; }
function _tblTplUse(id){
  const t=TBL_TEMPLATES.find(x=>x.id===id); if(!t) return;

/* ── Table — from scratch ── */
let tfsState={ display:'', name:'', nameEdited:false, desc:'', tags:[], owner:'sb' };

function tfsSet(k,v){ tfsState[k]=v; if(k==='display'&&!tfsState.nameEdited) tfsState.name=_slug(v); _tfsSync(); }
function tfsName(v){ tfsState.name=_slug(v); tfsState.nameEdited=true; _tfsSync(); }
function _tfsSync(){
  const nm=$('tfsName'); if(nm && document.activeElement!==nm) nm.value=tfsState.name;
  const ok=tfsState.display.trim()&&tfsState.desc.trim();
  const btn=$('tfsCreateBtn'); if(btn) btn.disabled=!ok;
  const hint=$('tfsHint'); if(hint){ hint.textContent=ok?'Ready to create':'Complete the required fields to continue'; hint.className='fs-foot-hint'+(ok?' ok':''); }
  const cc=$('tfsDescCount'); if(cc){ cc.textContent=tfsState.desc.length+' / 60'; cc.classList.toggle('over',tfsState.desc.length>60); }
}
function tfsTagAdd(v){ v=(v||'').trim(); if(v&&!tfsState.tags.includes(v)){ tfsState.tags.push(v); renderTblFromScratch(); } }
function tfsTagDel(v){ tfsState.tags=tfsState.tags.filter(t=>t!==v); renderTblFromScratch(); }
function tfsSuggestTags(){ ['core'].forEach(t=>{ if(!tfsState.tags.includes(t)) tfsState.tags.push(t); }); renderTblFromScratch(); toast('Suggested tags added','ok'); }
function tfsHelpDesc(){ const ta=$('tfsDesc'); const txt='Stores the canonical rows for this concept — key columns, types and the foreign keys it joins on.'; tfsState.desc=txt; if(ta) ta.value=txt; _tfsSync(); toast('Draft description generated','ok'); }
function tfsCreate(){
  const name=tfsState.display.trim(); if(!name){ toast('Enter a display name'); return; }
  if(!tfsState.desc.trim()){ toast('Add a description'); return; }
  const e=_tblAnchorEntity(); const u=_tblNewId(tfsState.name||name);
  TABLES.unshift({ id:u, alias:name, model:e.model||(MODELS[0]||{}).id, entity:e.name, entityId:e.id, role:'Primary', status:'Draft', updated:'just now', owner:tfsState.owner, collab:[], rows:'0', tags:tfsState.tags.slice(), desc:tfsState.desc.trim(), cols:[], rels:[] });
  toast('“'+name+'” created','ok');
  navigate('tables/'+u);
}

/* ── Table — AI assist ── */
const TBL_AI_PROPOSAL={ display:'Custom Table', slug:'custom_table',
  desc:'A starting table for your concept — primary key, the core columns with their types, and the foreign keys it joins on. We’ll refine columns as you describe more.',
  schema:[{n:'id',t:'PK'},{n:'name',t:'text'},{n:'status',t:'enum'},{n:'owner_id',t:'FK'},{n:'created_at',t:'timestamptz'}], rel:3, idx:2 };
const TBL_AI_QUESTIONS=[
  {q:'Hi! Let’s design a table. In a sentence — what does one row represent?'},
  {q:'What are the key columns you’ll store, and which one is the natural identifier?'},
  {q:'Does it reference other tables (foreign keys)?', chips:['Yes','Not sure yet']},
  {q:'Last one — any columns you’ll filter or look up often (for indexes)?', chips:['Yes','No']},
];
let tblAiState={ step:0, msgs:[], phase:'asking', build:0 };
function _tblAiReset(){ tblAiState={ step:0, phase:'asking', build:0, msgs:[{who:'ai', t:TBL_AI_QUESTIONS[0].q, chips:TBL_AI_QUESTIONS[0].chips}] }; }
function tblAiSend(v){
  v=(v||'').trim(); if(!v||tblAiState.phase!=='asking') return;
  tblAiState.msgs.push({who:'me',t:v}); tblAiState.step++;
  if(tblAiState.step<TBL_AI_QUESTIONS.length){ const nq=TBL_AI_QUESTIONS[tblAiState.step]; tblAiState.msgs.push({who:'ai',t:nq.q,chips:nq.chips}); renderTblAIAssist(); }
  else { tblAiState.msgs.push({who:'ai',t:'Perfect — I have enough. Building your table now…'}); tblAiState.phase='building'; tblAiState.build=0; renderTblAIAssist(); setTimeout(_tblAiBuildTick,500); }
}
function tblAiChip(v){ tblAiSend(v); }
function _tblAiBuildTick(){
  tblAiState.build++;
  const prev=$('tblAiPrev'); if(prev) prev.innerHTML=_tblAiPrevHTML();
  if(tblAiState.build<AI_BUILD_STEPS.length){ setTimeout(_tblAiBuildTick,650); }
  else { setTimeout(()=>{ tblAiState.phase='ready'; tblAiState.msgs.push({who:'ai',t:'Done! Here’s your proposed table on the right — tell me what to adjust, or accept and create.'}); renderTblAIAssist(); },750); }
}
function tblAiStartOver(){ _tblAiReset(); renderTblAIAssist(); toast('Started over'); }
function tblAiCreate(){
  if(tblAiState.phase!=='ready'){ toast('Answer a few questions first — your table is still being designed'); return; }

function _tblAiPrevBuilding(){

}

let rmktState={ cat:'all', q:'', origin:'all', sort:'popular', preview:null };
function rmktCat(id){ rmktState.cat=id; _renderRmktBody(); }

function rmktSearch(v){ rmktState.q=v; _renderRmktBody(); setTimeout(()=>{const el=$('rmktSearch'); if(el){el.focus(); el.setSelectionRange(v.length,v.length);}},0); }
function _rmktFiltered(){
  const q=rmktState.q.toLowerCase();
  let a=REF_TEMPLATES.filter(t=>{
    if(rmktState.cat!=='all'&&rmktState.cat!=='featured'&&rmktState.cat!=='recent'&&t.cat!==rmktState.cat) return false;
    if(rmktState.cat==='featured'&&!t.featured) return false;
    if(rmktState.origin!=='all'&&t.origin!==rmktState.origin) return false;
    if(q&&!(t.name.toLowerCase().includes(q)||t.desc.toLowerCase().includes(q)||_refCatName(t.cat).toLowerCase().includes(q))) return false;
    return true;
  });
  if(rmktState.cat==='recent') a=a.slice(0,6);
  if(rmktState.sort==='popular') a=a.slice().sort((x,y)=>(+String(y.tenants).replace(/,/g,''))-(+String(x.tenants).replace(/,/g,'')));
  else if(rmktState.sort==='az') a=a.slice().sort((x,y)=>x.name.localeCompare(y.name));
  return a;
}

const REF_AI_PROPOSAL={ name:'Custom List', slug:'custom_list',

}

function _refAiPrevBuilding(){

function route(){
  _dsfOpen = null; _pgnOpenId = null; closeSlideout(); closeModal();
  const parts = (location.hash.replace(/^#\/?/,'') || 'models').split('/');
  const r = parts[0];
  if(r==='models' && parts[1]==='new'){ if(parts[2]==='scratch') renderFromScratch(); else if(parts[2]==='ai'){ _aiReset(); renderAIAssist(); } else { renderModels(); openMarketplaceModal(); } }
  else if(r==='models' && parts[1]){ if(modelDetailState.id!==parts[1]) modelDetailState.tab='overview'; modelDetailState.id=parts[1]; renderModelDetail(parts[1]); }
  else if(r==='models'){ renderModels(); }
  else if(r==='entities' && parts[1]==='new'){ if(parts[2]==='scratch') renderEntFromScratch(); else if(parts[2]==='ai'){ _entAiReset(); renderEntAIAssist(); } else { renderEntities(); openEntityMarketplaceModal(); } }
  else if(r==='entities' && parts[1]){
    if(detailState.id !== parts[1]) detailState.tab = 'overview';
    detailState.id = parts[1];
    renderEntityDetail(parts[1]);
  }
  else if(r==='entities'){ renderEntities(); }
  else if(r==='tables' && parts[1]==='new'){ if(parts[2]==='scratch') renderTblFromScratch(); else if(parts[2]==='ai'){ _tblAiReset(); renderTblAIAssist(); } else { renderTablesList(); openTableMarketplaceModal(); } }
  else if(r==='tables' && parts[1]){ if(tableDetailState.id!==parts[1]){ tableDetailState.tab='overview'; dataState={search:'',page:1}; } tableDetailState.id=parts[1]; renderTableDetail(parts[1]); }
  else if(r==='tables'){ renderTablesList(); }
  else if(r==='reference' && parts[1]==='new'){ if(parts[2]==='scratch') renderRefFromScratch(); else if(parts[2]==='ai'){ _refAiReset(); renderRefAIAssist(); } else { renderReferenceList(); openRefMarketplaceModal(); } }
  else if(r==='reference' && parts[1]){ if(refDetailState.id!==parts[1]){ refDetailState.tab='overview'; refDetailState.search=''; refDetailState.page=1; } refDetailState.id=parts[1]; renderReferenceDetail(parts[1]); }
  else if(r==='reference'){ renderReferenceList(); }
  else { location.hash='#/models'; }
}

const _SUN='<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="8" cy="8" r="3.2"/><path d="M8 1v1.6M8 13.4V15M15 8h-1.6M2.6 8H1M12.7 3.3l-1.1 1.1M4.4 11.6l-1.1 1.1M12.7 12.7l-1.1-1.1M4.4 4.4L3.3 3.3"/></svg>';

function _themeIcon(){ const b=$('themeBtn'); if(b) b.innerHTML = document.documentElement.classList.contains('theme-light') ? _MOON : _SUN; }
function _themeMode(){ try{ return localStorage.getItem('dsm-theme')||'dark'; }catch(e){ return 'dark'; } }
function _prefersLight(){ return !!(window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches); }
function _applyThemeMode(mode){ const light = mode==='system' ? _prefersLight() : mode==='light'; document.documentElement.classList.toggle('theme-light', light); _themeIcon(); }
function setThemeMode(mode){ try{localStorage.setItem('dsm-theme',mode);}catch(e){} _applyThemeMode(mode); const seg=document.getElementById('acctThemeSeg'); if(seg) seg.querySelectorAll('button').forEach(b=>b.classList.toggle('on', b.dataset.mode===mode)); }
function setTheme(light){ setThemeMode(light?'light':'dark'); }

/* Mobile drawer (<768px) */
function openSidebarDrawer(){ document.body.classList.add('sb-open'); }
function closeSidebarDrawer(){ document.body.classList.remove('sb-open'); }
document.addEventListener('click', e=>{ if(e.target.closest('.sb-item') && window.innerWidth<=768) closeSidebarDrawer(); });
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeSidebarDrawer(); });

/* ── Generic topbar popover ── */
function _closePop(){ const p=$('tbpop'); if(p) p.remove(); document.removeEventListener('click',_popOut,true); document.removeEventListener('keydown',_popEsc,true); }
function _popOut(e){ if(!e.target.closest('#tbpop') && !e.target.closest('[data-pop]')) _closePop(); }
function _popEsc(e){ if(e.key==='Escape') _closePop(); }
function _openPop(btn, html){
  const existing=$('tbpop'); _closePop(); if(existing) return; // toggle off if same click cycle
  const d=document.createElement('div'); d.id='tbpop'; d.className='pop'; d.innerHTML=html; document.body.appendChild(d);
  const r=btn.getBoundingClientRect(), w=d.offsetWidth;
  let left=Math.max(8, Math.min(r.right-w, window.innerWidth-w-10));
  d.style.left=left+'px'; d.style.top=(r.bottom+8)+'px';
  setTimeout(()=>{ document.addEventListener('click',_popOut,true); document.addEventListener('keydown',_popEsc,true); },0);
}

/* ── Command palette (⌘K) ── */
let _cmdkSel=0, _cmdkItems=[];
function _cmdkData(){ return [
  {label:'Models', cat:'Go to', ic:'grid', act:"navigate('models')"},
  {label:'Entities', cat:'Go to', ic:'grid', act:"navigate('entities')"},
  {label:'Tables', cat:'Go to', ic:'grid', act:"navigate('tables')"},
  {label:'Reference Data', cat:'Go to', ic:'grid', act:"navigate('reference')"},
  {label:'New model', cat:'Create', ic:'plus', act:"navigate('models/new')"},
  {label:'New entity', cat:'Create', ic:'plus', act:"navigate('entities');setTimeout(openCreateEntity,60)"},
  {label:'New table', cat:'Create', ic:'plus', act:"navigate('tables');setTimeout(openCreateTable,60)"},
  {label:'New reference list', cat:'Create', ic:'plus', act:"navigate('reference/new')"},
  {label:'Toggle theme', cat:'Action', ic:'sun', act:"toggleTheme()"},
].concat(MODELS.map(m=>({label:m.name, cat:'Model', ic:'grid', act:"navigate('models/"+m.id+"')"}))); }
function openSearch(){
  let sc=$('cmdkScrim');
  if(!sc){ sc=document.createElement('div'); sc.id='cmdkScrim'; sc.className='cmdk-scrim'; sc.onclick=e=>{ if(e.target===sc) closeSearch(); };
    sc.innerHTML=`<div class="cmdk"><div class="cmdk-in"><svg width="17" height="17" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="7" cy="7" r="4.5"/><path d="M11 11l3 3"/></svg><input id="cmdkIn" type="text" placeholder="Search or jump to…" autocomplete="off"><kbd>ESC</kbd></div><div class="cmdk-list" id="cmdkList"></div></div>`;
    document.body.appendChild(sc);
    $('cmdkIn').addEventListener('input', _cmdkRender);
    $('cmdkIn').addEventListener('keydown', _cmdkKey);
  }
  sc.classList.add('open'); _cmdkSel=0; $('cmdkIn').value=''; _cmdkRender();
  setTimeout(()=>$('cmdkIn').focus(),20);
}
function closeSearch(){ const sc=$('cmdkScrim'); if(sc) sc.classList.remove('open'); }
function _cmdkRender(){
  const q=($('cmdkIn').value||'').toLowerCase();
  _cmdkItems=_cmdkData().filter(it=>!q||it.label.toLowerCase().includes(q)||it.cat.toLowerCase().includes(q));
  if(_cmdkSel>=_cmdkItems.length) _cmdkSel=Math.max(0,_cmdkItems.length-1);
  const gic={grid:'<svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="2" y="2" width="5" height="5" rx="1"/><rect x="9" y="2" width="5" height="5" rx="1"/><rect x="2" y="9" width="5" height="5" rx="1"/><rect x="9" y="9" width="5" height="5" rx="1"/></svg>',
    plus:'<svg width="15" height="15" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M6 2v8M2 6h8"/></svg>',
    sun:'<svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="3"/></svg>'};
  $('cmdkList').innerHTML = _cmdkItems.length
    ? _cmdkItems.map((it,i)=>`<div class="cmdk-item ${i===_cmdkSel?'sel':''}" onmouseenter="_cmdkSel=${i};_cmdkPaint()" onclick="_cmdkRun(${i})">${gic[it.ic]||gic.grid}<span>${escapeHtml(it.label)}</span><span class="cmdk-cat">${escapeHtml(it.cat)}</span></div>`).join('')
    : `<div class="cmdk-empty">No results.</div>`;
}
function _cmdkPaint(){ [...document.querySelectorAll('#cmdkList .cmdk-item')].forEach((el,i)=>el.classList.toggle('sel',i===_cmdkSel)); }
function _cmdkKey(e){
  if(e.key==='ArrowDown'){ e.preventDefault(); _cmdkSel=Math.min(_cmdkItems.length-1,_cmdkSel+1); _cmdkPaint(); const el=document.querySelectorAll('#cmdkList .cmdk-item')[_cmdkSel]; if(el)el.scrollIntoView({block:'nearest'}); }
  else if(e.key==='ArrowUp'){ e.preventDefault(); _cmdkSel=Math.max(0,_cmdkSel-1); _cmdkPaint(); const el=document.querySelectorAll('#cmdkList .cmdk-item')[_cmdkSel]; if(el)el.scrollIntoView({block:'nearest'}); }
  else if(e.key==='Enter'){ e.preventDefault(); _cmdkRun(_cmdkSel); }
}
function _cmdkRun(i){ const it=_cmdkItems[i]; if(!it) return; closeSearch(); try{ (new Function(it.act))(); }catch(e){} }
document.addEventListener('keydown', e=>{ if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==='k'){ e.preventDefault(); openSearch(); } });
window.addEventListener('hashchange', route);
/* Restore persisted preferences (view per surface, theme, sidebar collapse) */
try{
  const _vw={models:modelsState, entities:listState, tables:tablesListState, reference:refListState};
  Object.keys(_vw).forEach(s=>{ const v=localStorage.getItem('dsm-view-'+s); if(v) _vw[s].view=v; });
  _applyThemeMode(_themeMode());
  if(localStorage.getItem('dsm-collapsed')==='1'){ document.body.classList.add('sb-collapsed'); const b=$('sbToggle'); if(b){ b.title='Expand sidebar'; b.setAttribute('aria-label','Expand sidebar'); } }
}catch(e){}
_themeIcon();
route();

/* Re-apply scope after every dynamic re-render of the content area */
(function(){
  const c=$('content'); if(!c) return;
  new MutationObserver(()=>applyScope()).observe(c, {childList:true, subtree:true});
  applyScope();
})();
