.ai-av{width:24px; height:24px; border-radius:50%; flex-shrink:0; display:inline-flex; align-items:center; justify-content:center; color:var(--primary); background:var(--tag-informative-bg,rgba(37,99,235,0.12))}
.ai-bub{font-size:13.5px; line-height:1.5; border-radius:12px; padding:10px 13px; max-width:78%}
.ai-bub-ai{background:var(--muted,var(--hover)); color:var(--t1); border-top-left-radius:4px}
.ai-bub-me{background:var(--primary); color:#fff; border-top-right-radius:4px}
.ai-chips{display:flex; flex-wrap:wrap; gap:8px; margin-top:10px}
.ai-chip{font-size:12.5px; font-weight:600; color:var(--primary); background:var(--card-bg,#fff); border:1px solid var(--primary); border-radius:8px; padding:5px 11px; cursor:pointer}
.ai-chip:hover{background:var(--tag-informative-bg,rgba(37,99,235,0.08))}
.ai-input{display:flex; align-items:center; gap:8px; padding:12px; border-top:1px solid var(--line)}
.ai-input input{flex:1; height:40px; border:1px solid var(--primary); border-radius:10px; background:var(--field-bg); color:var(--t1); font-family:inherit; font-size:14px; padding:0 12px; outline:none}
.ai-send{width:36px; height:36px; flex-shrink:0; border:none; border-radius:9px; background:var(--muted,var(--hover)); color:var(--t2); cursor:pointer; display:inline-flex; align-items:center; justify-content:center}
.ai-send:hover{background:var(--primary); color:#fff}
.ai-prev-pane{padding:18px; overflow-y:auto}
.ai-prev-head{display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:10px}
.ai-prev-title{font-size:16px; font-weight:800; color:var(--t1)}
.ai-prev-head .md-code{margin-top:4px; display:inline-block}
.ai-prev-tag{display:inline-flex; align-items:center; gap:5px; font-size:11px; font-weight:600; color:var(--primary); background:var(--tag-informative-bg,rgba(37,99,235,0.1)); border-radius:7px; padding:3px 9px; white-space:nowrap}
.ai-prev-desc{font-size:13px; line-height:1.55; color:var(--t2); margin:0 0 14px}
.ai-diag{height:200px; margin:0 0 12px}
.ai-diag-hint{right:auto; width:auto; max-width:70%}
.ai-prev-counts{font-size:12.5px; color:var(--t3); margin-bottom:16px}
.ai-prev-lbl{font-size:11px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; color:var(--t3); margin-bottom:8px}
.ai-ent-list{display:flex; flex-direction:column; gap:8px}
.ai-ent{display:flex; align-items:center; gap:10px; border:1px solid var(--card-border,var(--line)); border-radius:10px; background:var(--card-bg,var(--bg2)); padding:11px 13px; cursor:pointer; transition:border-color .12s}
.ai-ent:hover{border-color:var(--field-border-hover,var(--line-strong))}
.ai-ent-ic{display:inline-flex; color:var(--t2)}
.ai-ent-n{flex:1; font-size:14px; font-weight:600; color:var(--t1)}
.ai-ent-c{display:inline-flex; align-items:center; gap:6px; font-size:12px; color:var(--t3)}
.ai-foot, .fs-foot{}
.ai-foot{display:flex; align-items:center; gap:16px; border-top:1px solid var(--line); padding:16px 0 8px; margin-top:18px}
.ai-foot-link{display:inline-flex; align-items:center; gap:6px; border:none; background:transparent; color:var(--t2); font-family:inherit; font-size:13px; cursor:pointer}
.ai-foot-link:hover{color:var(--t1)}
.ai-foot-or{font-size:13px; color:var(--t3)}

@media (max-width:1000px){
  .mkt-layout{grid-template-columns:1fr}
  .mkt-rail{position:static; flex-direction:row; flex-wrap:wrap; margin-bottom:8px}
  .mkt-rail-label{display:none}
  .ai-layout{grid-template-columns:1fr}
  .fs-grid{grid-template-columns:1fr}
}


/* ══ New-model marketplace MODAL ══ */
.modal.modal-lg{width:min(1080px,95vw); max-width:none; height:min(860px,90vh); display:flex; flex-direction:column; padding:0}
.mkt-modal-head{display:flex; align-items:flex-start; justify-content:space-between; gap:16px; padding:20px 22px 14px; border-bottom:1px solid var(--line); flex-shrink:0}
.mkt-modal-head .modal-title{font-size:18px}
.mkt-modal-sub{font-size:13px; color:var(--t2); margin-top:3px}
.mkt-modal-body{flex:1; overflow-y:auto; padding:20px 22px; min-height:0}
.mkt-modal-foot{display:flex; align-items:center; gap:12px; padding:14px 22px; border-top:1px solid var(--line); flex-shrink:0}

.mkt-modal .mkt-rail{position:static; top:auto}

.mktp{display:grid; grid-template-columns:320px 1fr; gap:26px; align-items:start}

.mktp-hero .tpl-thumb{height:100%}
.mktp-info{min-width:0}
.mktp-chips{display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:12px}
.mktp-chips .tpl-featured-badge{display:inline-flex; align-items:center; gap:4px; font-size:10.5px; font-weight:700; color:#fff; background:var(--primary); border-radius:6px; padding:3px 7px}
.mktp-name{font-size:22px; font-weight:800; color:var(--t1); letter-spacing:-.01em}
.mktp-desc{font-size:14px; line-height:1.6; color:var(--t2); margin:8px 0 18px}
.mktp-stats{display:flex; gap:12px; flex-wrap:wrap; margin-bottom:20px}
.mktp-stat{flex:1; min-width:104px; border:1px solid var(--card-border,var(--line)); border-radius:10px; background:var(--card-bg,var(--bg2)); padding:12px 14px}
.mktp-stat-v{display:block; font-size:20px; font-weight:800; color:var(--t1); line-height:1}
.mktp-stat-l{font-size:12px; color:var(--t3); margin-top:5px; display:block}
.mktp-lbl{font-size:11px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; color:var(--t3); margin-bottom:10px}
.mktp-ents{display:flex; flex-wrap:wrap; gap:8px; margin-bottom:18px}
.mktp-ent{display:inline-flex; align-items:center; gap:6px; font-size:12.5px; color:var(--t2); border:1px solid var(--line); border-radius:8px; padding:5px 10px; background:var(--card-bg,var(--bg2))}
.mktp-meta{font-size:12px; color:var(--t3)}
@media (max-width:820px){ .mktp{grid-template-columns:1fr} .mktp-hero{height:170px} }

/* AI assist — empty state · build progress · typing */
.ai-prev-empty{height:100%; min-height:340px; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:30px}
.ai-prev-empty-ic{width:56px; height:56px; border-radius:16px; display:flex; align-items:center; justify-content:center; color:var(--primary); background:var(--tag-informative-bg,rgba(37,99,235,0.1)); margin-bottom:16px}
.ai-prev-empty-t{font-size:16px; font-weight:700; color:var(--t1); margin-bottom:8px}
.ai-prev-empty-d{font-size:13px; line-height:1.6; color:var(--t2); max-width:320px}
.ai-tag-building{color:var(--primary)!important; background:var(--tag-informative-bg,rgba(37,99,235,0.1))!important; display:inline-flex; align-items:center; gap:6px}
.ai-build-bar{height:6px; border-radius:99px; background:var(--muted,var(--hover)); overflow:hidden; margin:6px 0 18px}
.ai-build-bar>span{display:block; height:100%; background:var(--primary); border-radius:99px; transition:width .5s ease}
.ai-build-steps{display:flex; flex-direction:column; gap:11px; margin-bottom:22px}
.ai-build-step{display:flex; align-items:center; gap:10px; font-size:13.5px; color:var(--t3)}
.ai-build-step.done{color:var(--t2)}
.ai-build-step.active{color:var(--t1); font-weight:600}
.ai-build-dot{width:20px; height:20px; border-radius:50%; flex-shrink:0; display:inline-flex; align-items:center; justify-content:center; border:1.5px solid var(--line-strong,var(--line)); color:var(--t3)}
.ai-build-step.done .ai-build-dot{background:var(--tag-success-bg,rgba(16,185,129,0.14)); border-color:transparent; color:var(--tag-success-fg,#16a34a)}
.ai-build-step.active .ai-build-dot{border-color:var(--primary)}
.ai-spin{width:12px; height:12px; border-radius:50%; border:2px solid var(--primary); border-top-color:transparent; display:inline-block; animation:aiSpin .7s linear infinite}
.ai-spin-sm{width:10px; height:10px; border-width:1.6px}
@keyframes aiSpin{to{transform:rotate(360deg)}}
.ai-skel-diag{position:relative; height:150px; border-radius:12px; background:var(--muted,#eef1f6); overflow:hidden; margin-bottom:12px}
html:not(.theme-light) .ai-skel-diag{background:rgba(255,255,255,0.03)}
.ai-skel-node{position:absolute; width:56px; height:20px; border-radius:5px; background:linear-gradient(90deg,var(--hover-strong) 25%,var(--muted,rgba(255,255,255,0.08)) 37%,var(--hover-strong) 63%); background-size:400% 100%; animation:aiShimmer 1.3s ease infinite}
.ai-skel-rows{display:flex; flex-direction:column; gap:8px}
.ai-skel-row{height:44px; border-radius:10px; background:linear-gradient(90deg,var(--hover-strong) 25%,var(--muted,rgba(255,255,255,0.08)) 37%,var(--hover-strong) 63%); background-size:400% 100%; animation:aiShimmer 1.3s ease infinite}
@keyframes aiShimmer{0%{background-position:100% 0}100%{background-position:-100% 0}}
.ai-typing{display:inline-flex; gap:4px; align-items:center; padding:12px 14px}
.ai-typing span{width:6px; height:6px; border-radius:50%; background:var(--t3); animation:aiBlink 1.2s infinite}
.ai-typing span:nth-child(2){animation-delay:.2s}
.ai-typing span:nth-child(3){animation-delay:.4s}
@keyframes aiBlink{0%,60%,100%{opacity:.3}30%{opacity:1}}

/* Table marketplace — column-schema thumbnails */
.tpl-thumb-wrap.has-schema{display:flex; align-items:center; justify-content:center; padding:10px}
.tbl-schema{width:100%; max-width:158px; border:1px solid var(--card-border,var(--line)); border-radius:9px; background:var(--card-bg,#fff); overflow:hidden; box-shadow:0 2px 8px rgba(15,23,42,0.06)}
html:not(.theme-light) .tbl-schema{background:var(--surface-raised,#131C2E)}
.tbl-schema-head{display:flex; align-items:center; gap:5px; padding:5px 8px; border-bottom:1px solid var(--line); color:var(--primary)}
.tbl-schema-head code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:10.5px; font-weight:600; color:var(--t1)}
.tsr{display:flex; align-items:center; justify-content:space-between; gap:8px; padding:2.5px 8px}
.tsr-n{font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:10px; color:var(--t2)}
.tsr-n.key{color:var(--t1); font-weight:600}
.tsr-t{font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:9px; color:var(--t3); letter-spacing:.02em}
.tsr-t.pk{color:var(--tag-alert-fg,#d08700); font-weight:700}
.tsr-t.fk{color:var(--primary); font-weight:700}
.mktp-hero.has-schema{display:flex; align-items:center; justify-content:center; padding:16px}
.mktp-hero.has-schema .tbl-schema{max-width:220px}
.mktp-ents .tsr-t{font-size:9px}
/* from-scratch icon field */
.fs-icon-sel{display:flex; align-items:center; gap:9px; height:42px; border:1px solid var(--field-border); border-radius:9px; background:var(--field-bg); padding:0 12px; cursor:pointer; max-width:280px}
.fs-icon-sel:hover{border-color:var(--field-border-hover,var(--line-strong))}
.fs-icon-tile{width:26px; height:26px; border-radius:7px; display:inline-flex; align-items:center; justify-content:center; background:var(--tag-informative-bg,rgba(37,99,235,0.1)); color:var(--primary)}
.fs-icon-name{font-size:13.5px; color:var(--t1)}
/* AI table preview schema */
.tblai-schema{border:1px solid var(--card-border,var(--line)); border-radius:12px; background:var(--card-bg,var(--bg2)); overflow:hidden; margin:0 0 14px}
.tblai-col{display:flex; align-items:center; justify-content:space-between; gap:10px; padding:10px 14px; border-bottom:1px solid var(--line)}
.tblai-col:last-child{border-bottom:none}
.tblai-col-n{font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:13px; color:var(--t2)}
.tblai-col-n.key{color:var(--t1); font-weight:600}

/* Reference-data marketplace — value-list thumbnails */
.ref-vals{width:100%; max-width:170px; border:1px solid var(--card-border,var(--line)); border-radius:9px; background:var(--card-bg,#fff); overflow:hidden; box-shadow:0 2px 8px rgba(15,23,42,0.06)}
html:not(.theme-light) .ref-vals{background:var(--surface-raised,#131C2E)}
.ref-vals-head{display:flex; align-items:center; gap:5px; padding:5px 8px; border-bottom:1px solid var(--line); color:var(--primary)}
.ref-vals-head code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:10.5px; font-weight:600; color:var(--t1)}
.rvr{display:flex; align-items:center; gap:7px; padding:3px 8px}
.rvr-code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:8.5px; font-weight:600; color:var(--primary); background:var(--tag-informative-bg,rgba(37,99,235,0.1)); border-radius:4px; padding:1px 5px; flex-shrink:0}
.rvr-label{font-size:10px; color:var(--t2); overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.ref-origin{font-size:10.5px; font-weight:700; border-radius:6px; padding:2px 8px; color:var(--t2); background:var(--muted,var(--hover))}
.ref-origin.catalog{color:var(--primary); background:var(--tag-informative-bg,rgba(37,99,235,0.1))}
.mktp-ents .rvr-code{margin-right:2px}
.refai-lbl{flex:1; font-size:13px; color:var(--t2); margin-left:10px}
.refai-def{font-size:10px; font-weight:700; color:var(--tag-success-fg,#16a34a); background:var(--tag-success-bg,rgba(16,185,129,0.1)); border-radius:5px; padding:1px 7px}

/* ── Detail Overview (stat tiles reuse md-tile) + shared sub-sections ── */
.ov-sub{margin-top:18px}
.ov-preview-foot{display:flex; justify-content:flex-end; margin-top:10px}
.ov-empty{padding:26px; text-align:center; color:var(--t3); font-size:12.5px}
.ref-preview{width:100%; border-collapse:collapse; font-size:12.5px}
.ref-preview th{text-align:left; font-weight:600; color:var(--t3); padding:7px 10px; border-bottom:1px solid var(--card-border); font-size:11px; text-transform:uppercase; letter-spacing:.03em}
.ref-preview td{padding:8px 10px; border-bottom:1px solid var(--card-border); color:var(--t1)}
.ref-preview .ref-preview-key{font-family:ui-monospace,Menlo,monospace; color:var(--t2)}
.ref-preview .ref-preview-num{text-align:right; font-variant-numeric:tabular-nums}
.ref-preview tr:last-child td{border-bottom:none}

/* ── History (compliance audit log) ── */
.hist-bar{display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:12px}
.hchips{display:inline-flex; gap:2px; background:var(--muted); border:1px solid var(--card-border); border-radius:8px; padding:2px}
.hchip{border:none; background:transparent; color:var(--t2); font-weight:600; font-size:11.5px; padding:5px 9px; border-radius:6px; cursor:pointer}
.hchip:hover{color:var(--t1)}
.hchip.on{background:var(--card-bg); color:var(--t1); box-shadow:0 1px 2px rgba(15,23,42,.10)}
.hist-compliance{display:inline-flex; align-items:center; gap:5px; font-size:11.5px; font-weight:600; color:var(--tag-success-fg,#16a34a)}
.hist-retain{font-size:11.5px; color:var(--t3)}
.hist-tbl .dtable-r{cursor:pointer; align-items:center}
.hist-tbl .dtable-r:hover{background:var(--hover)}
.hist-when{font-size:12px; color:var(--t2); white-space:nowrap}
.hist-user{display:flex; align-items:center; gap:8px; min-width:0}
.hist-user-b{display:flex; flex-direction:column; min-width:0}
.hist-user-n{font-size:12.5px; font-weight:600; color:var(--t1); white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.hist-user-r{font-size:10.5px; color:var(--t3)}
.hist-desc{font-size:12.5px; color:var(--t1); min-width:0; line-height:1.4}
.hist-err{display:block; margin-top:3px; font-size:11px; color:var(--field-text-error,#dc2626); border-left:2px solid var(--field-text-error,#dc2626); padding-left:7px}
.hist-r.is-fail{background:rgba(220,38,38,.05)}
.hbadge{display:inline-block; font-size:10.5px; font-weight:700; padding:2px 8px; border-radius:20px; letter-spacing:.02em; white-space:nowrap}
.ha-create{background:var(--tag-success-bg,rgba(16,185,129,.12)); color:var(--tag-success-fg,#16a34a)}
.ha-update{background:var(--tag-informative-bg,rgba(59,130,246,.12)); color:var(--tag-informative-fg,#2563eb)}
.ha-delete{background:rgba(220,38,38,.12); color:var(--field-text-error,#dc2626)}
.ha-publish{background:rgba(139,92,246,.15); color:#7c3aed}
.ha-perm{background:rgba(217,119,6,.15); color:#b45309}
.ha-export{background:var(--muted); color:var(--t2)}
.ha-sens{background:rgba(219,39,119,.14); color:#be185d}
.ha-neutral{background:var(--muted); color:var(--t2)}
.hres{display:inline-flex; align-items:center; gap:5px; font-size:11.5px; font-weight:600}
.hres-dot{width:6px; height:6px; border-radius:50%; background:currentColor}
.hr-ok{color:var(--tag-success-fg,#16a34a)}
.hr-fail{color:var(--field-text-error,#dc2626)}
.hr-warn{color:#b45309}
.hsrc{display:inline-flex; align-items:center; gap:4px; font-size:11.5px; color:var(--t2)}
.hist-so-err{background:rgba(220,38,38,.07); border:1px solid rgba(220,38,38,.24); border-radius:8px; padding:10px 12px; font-size:12px; color:var(--field-text-error,#dc2626); margin-bottom:16px; line-height:1.45}
.hist-so-err-h{font-weight:700; font-size:10.5px; text-transform:uppercase; letter-spacing:.04em; margin-bottom:4px}
.hist-immutable{display:flex; align-items:center; gap:6px; font-size:11.5px; color:var(--t3); margin-top:16px; padding-top:14px; border-top:1px solid var(--card-border)}
.mono{font-family:ui-monospace,Menlo,monospace}

/* ── Table Indexes tab ── */
.idx-list{display:flex; flex-direction:column; gap:10px}
.idx-card{border:1px solid var(--card-border); background:var(--card-bg); border-radius:12px; padding:14px 16px}
.idx-top{display:flex; align-items:center; gap:9px; flex-wrap:wrap}
.idx-ic{color:var(--t3); display:inline-flex}
.idx-name{font-family:ui-monospace,Menlo,monospace; font-size:13px; font-weight:600; color:var(--t1)}
.idx-type{font-size:10.5px; font-weight:700; padding:2px 8px; border-radius:20px; letter-spacing:.02em}
.idx-type--unique{background:rgba(139,92,246,.15); color:#7c3aed}
.idx-type--regular{background:var(--tag-informative-bg,rgba(59,130,246,.12)); color:var(--tag-informative-fg,#2563eb)}
.idx-type--partial{background:rgba(217,119,6,.15); color:#b45309}
.idx-flag{font-size:10px; font-weight:700; padding:1px 7px; border-radius:5px; background:var(--muted); color:var(--t2)}
.idx-row{display:flex; align-items:center; gap:8px; margin-top:10px; font-size:12px; color:var(--t2); flex-wrap:wrap}
.idx-row-l{color:var(--t3); font-size:11px; min-width:74px}
.idx-colchip{display:inline-flex; align-items:center; gap:5px; background:var(--muted); border:1px solid var(--card-border); border-radius:6px; padding:3px 8px; font-family:ui-monospace,Menlo,monospace; font-size:11.5px; color:var(--t1)}
.idx-colord{display:inline-flex; align-items:center; justify-content:center; width:15px; height:15px; border-radius:4px; background:var(--card-bg); font-family:inherit; font-size:9.5px; font-weight:700; color:var(--t3)}
.idx-sep{color:var(--t3)}
.idx-where{font-family:ui-monospace,Menlo,monospace; font-size:11.5px; background:var(--muted); border-radius:6px; padding:2px 7px; color:var(--t1)}
.idx-desc{font-size:12px; color:var(--t2); margin-top:8px; line-height:1.45}
.idx-meta{display:flex; gap:14px; margin-top:9px; font-size:11px; color:var(--t3)}

/* ── Reference "Referenced by" tab ── */
.rfb-list{display:flex; flex-direction:column; gap:10px}
.rfb-card{border:1px solid var(--card-border); background:var(--card-bg); border-radius:12px; padding:14px 16px; cursor:pointer; transition:border-color .12s,box-shadow .12s}
.rfb-card:hover{border-color:var(--primary); box-shadow:0 2px 10px rgba(15,23,42,.06)}
.rfb-top{display:flex; align-items:center; gap:8px; flex-wrap:wrap}
.rfb-col{font-family:ui-monospace,Menlo,monospace; font-size:12.5px; font-weight:600; color:var(--t1)}
.rfb-path{display:inline-flex; align-items:center; gap:4px; font-size:11.5px; color:var(--t3)}
.rfb-path b{color:var(--t2); font-weight:600}
.rfb-reqchip{font-size:10px; font-weight:700; padding:1px 7px; border-radius:5px}
.rfb-req{background:var(--tag-informative-bg,rgba(59,130,246,.12)); color:var(--tag-informative-fg,#2563eb)}
.rfb-opt{background:var(--muted); color:var(--t3)}
.rfb-desc{font-size:12px; color:var(--t2); margin-top:8px; line-height:1.45}
.rfb-foot{display:flex; align-items:center; gap:16px; margin-top:10px; font-size:11.5px; color:var(--t3); flex-wrap:wrap}
.rfb-stat{display:inline-flex; align-items:center; gap:5px}
.rfb-foot .lrow-owner{margin-left:auto; display:inline-flex; align-items:center; gap:6px; color:var(--t2)}
.rfb-usage{display:flex; flex-direction:column; gap:2px}
.rfb-usage-v{font-size:17px; font-weight:700; color:var(--t1)}
.rfb-usage-l{font-size:11px; color:var(--t3)}

/* ── DS Pagination component (port of design-system/pagination.tsx) ── */
.pgn2{display:flex; width:100%; padding:8px 0; margin-top:8px}
.pgn2-bar{display:flex; align-items:center; justify-content:space-between; width:100%; gap:24px; height:32px; padding:4px 10px;
  background:var(--surface-floating-default,var(--card-bg)); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
  border:1px solid var(--card-border,var(--line)); border-radius:6px}
.pgn2-rows{display:flex; align-items:center; gap:12px; position:relative; flex-shrink:0}
.pgn2-lbl{font-size:12px; color:var(--t3); white-space:nowrap}
.pgn2-sel{display:inline-flex; align-items:center; gap:4px; background:none; border:none; cursor:pointer; padding:0; outline:none}
.pgn2-sel svg{color:var(--t2); transition:transform .15s ease}
.pgn2-sel[data-open="1"] svg{transform:rotate(180deg)}
.pgn2-selv{font-size:12px; font-weight:500; color:var(--t1)}
.pgn2-menu{display:none; position:absolute; bottom:calc(100% + 6px); left:0; z-index:70; min-width:64px;
  background:var(--surface-floating-default,var(--card-bg)); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
  border:1px solid var(--card-border,var(--line)); border-radius:6px; overflow:hidden; box-shadow:0 4px 16px rgba(0,0,0,.18)}
.pgn2-menu[data-open="1"]{display:block}
.pgn2-opt{display:flex; align-items:center; width:100%; height:32px; padding:0 12px; font-size:12px; color:var(--t1); background:none; border:none; cursor:pointer; text-align:left}
.pgn2-opt:hover{background:var(--hover)}
.pgn2-opt.on{font-weight:600; color:var(--primary); background:var(--hover)}
.pgn2-right{display:flex; align-items:center; gap:12px; flex-shrink:0}
.pgn2-range{font-size:12px; font-weight:500; color:var(--t1); white-space:nowrap}
.pgn2-nav{display:flex; align-items:center; gap:12px}
.pgn2-btn{width:24px; height:24px; display:inline-flex; align-items:center; justify-content:center; border:none; background:none; border-radius:4px; color:var(--t2); cursor:pointer; padding:0; transition:background .12s ease}
.pgn2-btn:hover:not([disabled]){background:var(--hover)}
.pgn2-btn[disabled]{opacity:.35; cursor:not-allowed}

/* ── Topbar notification count + account menu (DS TopbarRightMenu) ── */
.tb-count{position:absolute; top:-3px; right:-4px; min-width:14px; height:14px; padding:0 3px; border-radius:8px; background:#d32f2f; color:#fff; font-size:9px; font-weight:700; line-height:1; display:inline-flex; align-items:center; justify-content:center; border:1.5px solid var(--topbar-bg)}
.acct-av{width:40px; height:40px; border-radius:50%; background:linear-gradient(135deg,#7c3aed,#155DFC); color:#fff; font-size:14px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0}
.acct-ws{display:flex; align-items:center; gap:11px; width:100%; padding:8px 10px; border:none; background:transparent; cursor:pointer; border-radius:8px; text-align:left; font-family:inherit}
.acct-ws:hover{background:var(--hover)}
.acct-ws-av{width:30px; height:30px; border-radius:8px; background:var(--grad-ds); color:#fff; font-size:13px; font-weight:800; display:flex; align-items:center; justify-content:center; flex-shrink:0}
.acct-ws-b{display:flex; flex-direction:column; min-width:0}
.acct-ws-lbl{font-size:10px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; color:var(--t3)}
.acct-ws-name{font-size:13.5px; font-weight:700; color:var(--t1)}
.acct-ws-chev{margin-left:auto; color:var(--t3); flex-shrink:0}
.acct-static{cursor:default}
.acct-static:hover{background:transparent}
.acct-seg{margin-left:auto; display:inline-flex; gap:2px; background:var(--muted); border:1px solid var(--card-border); border-radius:8px; padding:2px}
.acct-seg button{display:inline-flex; align-items:center; gap:5px; border:none; background:transparent; color:var(--t2); font-family:inherit; font-size:11.5px; font-weight:600; padding:4px 8px; border-radius:6px; cursor:pointer; transition:background .12s,color .12s}
.acct-seg button:hover:not(.on){color:var(--t1)}
.acct-seg button.on{background:var(--card-bg); color:var(--t1); box-shadow:0 1px 2px rgba(15,23,42,.12)}
.acct-seg button svg{width:13px; height:13px; flex-shrink:0}
.acct-seg-ic{padding:4px 6px !important}
.acct-val{margin-left:auto; display:inline-flex; align-items:center; gap:3px; font-size:12px; color:var(--t3); white-space:nowrap}
.acct-kbd{margin-left:auto; font-size:11px; font-weight:600; color:var(--t3); border:1px solid var(--card-border); border-radius:5px; height:18px; display:inline-flex; align-items:center; justify-content:center; padding:0 5px}

/* ── Topbar zone tooltips (DS TopbarTooltip) + profile avatar hover ring ── */
.tb-studio, .tb-search, .tb-company{position:relative}
.tb-tip{position:absolute; top:calc(100% + 6px); left:0; z-index:90; display:flex; flex-direction:column; gap:1px; white-space:nowrap; padding:7px 10px; border-radius:6px; background:var(--surface-floating-default,var(--bg2)); border:1px solid var(--line-strong,var(--line)); box-shadow:0 8px 24px rgba(0,0,0,0.28); opacity:0; transform:translateY(-2px); pointer-events:none; transition:opacity .12s ease, transform .12s ease}
html.theme-light .tb-tip{background:#fff}
.tb-tip-r{left:auto; right:0}
.tb-tip b{font-size:11px; font-weight:600; color:var(--t1)}
.tb-tip i{font-size:10px; font-style:normal; color:var(--t3)}
.tb-studio:hover .tb-tip, .tb-search:hover .tb-tip, .tb-company:hover .tb-tip{opacity:1; transform:translateY(0)}
.tb-company:hover .tb-user-av{box-shadow:0 0 0 2px var(--topbar-avatar-ring,rgba(33,115,255,0.55))}

/* ── Reference Data tab (TfdDataTab port): toolbar, 2-line headers, checkboxes, always-on footer ── */
.ttd-head{display:flex; align-items:center; gap:10px; margin-bottom:12px; flex-wrap:wrap}
.ttd-head-l{display:flex; align-items:center; gap:8px; flex-wrap:wrap}
.ttd-head-r{display:flex; align-items:center; gap:8px; margin-left:auto}
.ttd-fresh{font-size:12px; color:var(--t3); white-space:nowrap}
.ttd-iconbtn{width:34px; height:34px; border:1px solid var(--field-border); border-radius:8px; background:var(--field-bg); color:var(--t2)}
.ttd-iconbtn:hover{color:var(--t1); border-color:var(--field-border-hover,var(--line-strong))}
.ttd-tool{gap:6px}
.ttd-bulk{display:flex; align-items:center; gap:12px; margin-bottom:10px; padding:8px 12px; border:1px solid var(--primary); border-radius:9px; background:var(--tag-informative-bg,rgba(33,115,255,.08))}
.ttd-bulk-n{font-size:12.5px; font-weight:700; color:var(--t1)}
.ttd-bulk-x{border:none; background:none; color:var(--primary); font-size:12px; font-weight:600; cursor:pointer}
.ttd-bulk-sep{width:1px; height:16px; background:var(--card-border)}
.ttd-bulk-a{border:none; background:none; color:var(--t2); font-size:12px; font-weight:600; cursor:pointer}
.ttd-bulk-a:hover{color:var(--t1)}
.ttd-bulk-a.danger{color:var(--field-text-error,#dc2626)}
.ttd-table{border:1px solid var(--card-border); border-radius:12px; overflow:hidden; background:var(--card-bg)}
.ttd-thead{display:grid; align-items:center; gap:12px; padding:0 14px; height:52px; border-bottom:1px solid var(--card-border); background:var(--muted)}
.ttd-th{display:flex; align-items:center; gap:6px; border:none; background:none; cursor:pointer; padding:0; font-family:inherit; text-align:left; color:var(--t2)}
.ttd-th:hover{color:var(--t1)}
.ttd-th-labels{display:flex; flex-direction:column; min-width:0; line-height:1.15}
.ttd-th-disp{font-size:12.5px; font-weight:700; color:var(--t1)}
.ttd-th-name{font-size:10.5px; font-family:ui-monospace,Menlo,monospace; color:var(--t3)}
.ttd-sort{color:var(--t3); flex-shrink:0}
.ttd-sort.on{color:var(--primary)}
.ttd-tr{display:grid; align-items:center; gap:12px; padding:0 14px; min-height:52px; border-bottom:1px solid var(--card-border); cursor:pointer; transition:background .1s}
.ttd-tr:last-child{border-bottom:none}
.ttd-tr:hover{background:var(--hover)}
.ttd-tr.is-sel{background:var(--tag-informative-bg,rgba(33,115,255,.06))}
.ttd-td{font-size:13px; color:var(--t1); min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.ttd-td.mono{font-family:ui-monospace,Menlo,monospace; font-size:12px; color:var(--t2)}
.ttd-desc{color:var(--t2); font-size:12.5px}
.mv-check{width:18px; height:18px; flex-shrink:0; border:1.5px solid var(--field-border-hover,var(--line-strong)); border-radius:5px; background:var(--field-bg); display:inline-flex; align-items:center; justify-content:center; cursor:pointer; padding:0}
.mv-check.on{background:var(--primary); border-color:var(--primary)}
.sm-status{display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:600; padding:2px 9px; border-radius:20px}
.sm-status .sm-dot{width:6px; height:6px; border-radius:50%; background:currentColor}
.sm-status--active{background:var(--tag-success-bg,rgba(16,185,129,.12)); color:var(--tag-success-fg,#16a34a)}
.sm-status--deprecated{background:rgba(217,119,6,.14); color:#b45309}
.sm-status--archived{background:var(--muted); color:var(--t3)}
.ttd-foot{display:flex; align-items:center; justify-content:space-between; gap:16px; margin-top:14px; flex-wrap:wrap}
.ttd-foot-l{display:flex; align-items:center; gap:10px; font-size:12.5px; color:var(--t2)}
.ttd-foot-lbl{color:var(--t3)}
.ttd-per{height:30px; border-radius:8px; border:1px solid var(--field-border); background:var(--field-bg); color:var(--t1); font-size:12.5px; padding:0 6px; cursor:pointer}
.ttd-foot-count{color:var(--t3)}
.ttd-pager{display:flex; align-items:center; gap:10px}
.ttd-pg-btn{display:inline-flex; align-items:center; gap:5px; height:30px; padding:0 10px; border:1px solid var(--field-border); border-radius:8px; background:var(--field-bg); color:var(--t2); font-family:inherit; font-size:12.5px; font-weight:600; cursor:pointer}
.ttd-pg-btn:hover:not([disabled]){color:var(--t1); border-color:var(--field-border-hover,var(--line-strong))}
.ttd-pg-btn[disabled]{opacity:.4; cursor:not-allowed}
.ttd-pg-ind{font-size:12.5px; color:var(--t2); font-weight:600}

/* ── Reference header extras (internal name + sensitivity) + Settings/Relationships ── */
.rfd-internal{display:inline-flex; align-items:center; gap:6px; margin-top:6px; font-family:ui-monospace,Menlo,monospace; font-size:12.5px; color:var(--t3)}
.rfd-internal .rfd-lock{color:var(--t3)}
.rfd-sens{display:inline-flex; align-items:center; gap:5px; font-size:11.5px; font-weight:600; padding:2px 9px; border-radius:20px; background:var(--muted); color:var(--t2); border:1px solid var(--card-border)}
.rset{max-width:640px}
.rset-row{display:flex; align-items:center; justify-content:space-between; gap:16px; padding:14px 0; border-bottom:1px solid var(--card-border)}
.rset-row-l{display:flex; flex-direction:column; gap:2px}
.rset-row-t{font-size:13.5px; font-weight:600; color:var(--t1)}
.rset-row-d{font-size:12px; color:var(--t3)}
.rset-danger{margin-top:22px; border:1px solid rgba(220,38,38,.3); border-radius:12px; padding:16px}
.rset-danger-h{font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:var(--field-text-error,#dc2626); margin-bottom:10px}

/* ── Floating Ask-AI FAB (DS me-fab) ── */
.me-fab{position:fixed; right:18px; bottom:72px; width:48px; height:48px; border-radius:50%; border:none; cursor:pointer; z-index:55; color:#fff; display:flex; align-items:center; justify-content:center; background:radial-gradient(circle at 61% 68%, rgba(33,115,255,1) 29%, rgba(9,226,171,1) 61%); box-shadow:0 8px 24px rgba(9,226,171,0.28), 0 2px 8px rgba(0,0,0,.18); transition:transform .12s, filter .12s}
.me-fab:hover{transform:translateY(-1px); filter:brightness(1.06)}

/* ── Reference item add/edit slideout fields (schema-driven) ── */
.ri-field{margin-bottom:18px}
.ri-flabel{display:flex; align-items:center; gap:8px; margin-bottom:7px; flex-wrap:wrap}
.ri-fdisp{font-size:13px; font-weight:600; color:var(--t1)}
.ri-fname{font-size:11px; font-family:ui-monospace,Menlo,monospace; color:var(--t3)}
.ri-ftype{font-size:10px; font-weight:600; color:var(--t2); background:var(--muted); border:1px solid var(--card-border); border-radius:5px; padding:1px 6px}
.ri-pk{font-size:10px; font-weight:700; color:var(--tag-informative-fg,#2563eb); background:var(--tag-informative-bg,rgba(59,130,246,.12)); border-radius:5px; padding:1px 6px}
.ri-lock{display:inline-flex; color:var(--t3)}

/* ── Columns tab subtabs (Schema/Rules/Sensitivity/Display) ── */
.cv-subs{display:inline-flex; gap:2px; background:var(--muted); border:1px solid var(--card-border); border-radius:9px; padding:3px; margin-bottom:14px}
.cv-sub{border:none; background:transparent; color:var(--t2); font-family:inherit; font-size:12.5px; font-weight:600; padding:6px 14px; border-radius:7px; cursor:pointer}
.cv-sub:hover{color:var(--t1)}
.cv-sub.on{background:var(--card-bg); color:var(--t1); box-shadow:0 1px 2px rgba(15,23,42,.1)}
.cv-thead{height:44px; background:var(--muted)}
.cv-th{font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.03em; color:var(--t3); display:flex; align-items:center}
.cv-td{font-size:12.5px; color:var(--t1); min-width:0; overflow:hidden; text-overflow:ellipsis; display:flex; align-items:center; gap:4px; flex-wrap:wrap}
.cv-td.mono{font-family:ui-monospace,Menlo,monospace; font-size:11.5px; color:var(--t2)}
.cv-desc{color:var(--t2); font-size:12px}
.cv-field{display:flex; align-items:center; gap:9px; min-width:0}
.cv-field-ic{color:var(--t3); flex-shrink:0; display:inline-flex}
.cv-field-b{display:flex; flex-direction:column; min-width:0}
.cv-field-d{font-size:13px; font-weight:600; color:var(--t1); white-space:nowrap}
.cv-field-n{font-size:11px; font-family:ui-monospace,Menlo,monospace; color:var(--t3)}
.cv-key{font-size:9px; font-weight:700; color:var(--tag-informative-fg,#2563eb); background:var(--tag-informative-bg,rgba(59,130,246,.12)); border-radius:4px; padding:0 4px}
.cv-yes{font-size:12px; font-weight:600; color:var(--tag-success-fg,#16a34a)}
.cv-no{font-size:12px; color:var(--t3)}
.cv-cls-int{font-size:11.5px; color:var(--t2)}
.ttd-tr.cv-static{cursor:default}
.ttd-tr.cv-static:hover{background:transparent}

/* ── Relationships tab: view toggle + diagram hub ── */
.rel-vw{display:inline-flex; gap:2px; background:var(--muted); border:1px solid var(--card-border); border-radius:8px; padding:2px}
.rel-vw-btn{display:inline-flex; align-items:center; gap:5px; border:none; background:transparent; color:var(--t2); font-family:inherit; font-size:11.5px; font-weight:600; padding:5px 9px; border-radius:6px; cursor:pointer}
.rel-vw-btn:hover{color:var(--t1)}
.rel-vw-btn.on{background:var(--card-bg); color:var(--t1); box-shadow:0 1px 2px rgba(15,23,42,.1)}
.rel-vw-btn svg{flex-shrink:0}
.rel-diag{margin-top:4px}
.rel-cardb{fill:var(--surface-floating-default,var(--bg2)); stroke:var(--card-border,var(--line)); stroke-width:1}
html.theme-light .rel-cardb{fill:#fff}
.rel-cardt{fill:var(--t2); font-size:10px; font-weight:700; text-anchor:middle; dominant-baseline:middle}
.diag-top-hub{fill:var(--primary)!important}
.diag-hub .diag-box{stroke:var(--primary); stroke-width:1.5}
/* ER table-node diagram (preview mini-schema) */
.er-node{cursor:pointer}
.er-card{fill:#fff; stroke:var(--line-strong,#c3ccd8); stroke-width:1}
html:not(.theme-light) .er-card{fill:var(--surface-raised,#131C2E); stroke:var(--card-border,#2A3550)}
.er-node:hover .er-card{stroke:var(--primary)}
.er-headbar{fill:var(--primary)}
.er-title{font-size:10px; font-weight:700; fill:var(--t1)}
.er-role{font-size:7px; font-weight:700; fill:var(--t3); letter-spacing:.05em}
.er-divider{stroke:var(--line); stroke-width:1}
.er-col-n{font-size:9px; fill:var(--t2); font-family:'SF Mono',Menlo,monospace}
.er-col-t{font-size:8px; fill:var(--t3); font-family:'SF Mono',Menlo,monospace}
.er-t-pk{fill:var(--primary); font-weight:700}
.er-t-fk{fill:#7db1ff; font-weight:700}
.er-lg{display:inline-flex; align-items:center; justify-content:center; min-width:20px; height:14px; padding:0 4px; border-radius:4px; font-size:9px; font-weight:700}
.er-lg-pk{color:var(--primary); background:rgba(43,127,255,0.14)}
.er-lg-fk{color:#7db1ff; background:rgba(125,177,255,0.14)}
/* Reference preview: schema + items */
.pv-sec-h{display:flex; align-items:center; justify-content:space-between; margin:18px 0 9px}
.pv-sec-t{font-size:11.5px; font-weight:700; letter-spacing:.07em; text-transform:uppercase; color:var(--t2)}
.pv-sec-c{font-size:12px; color:var(--t3)}
.pv-sch{border:1px solid var(--card-border,var(--line)); border-radius:10px; overflow:hidden}
.pv-sch-row{display:flex; align-items:center; gap:10px; padding:11px 14px; border-bottom:1px solid var(--card-border,var(--line))}
.pv-sch-row:last-child{border-bottom:none}
.pv-sch-row:nth-child(even){background:var(--muted)}
.pv-fld-n{flex:1; font-family:'SF Mono',Menlo,monospace; font-size:13px; color:var(--t1); min-width:0}
.pv-fld-badges{display:flex; align-items:center; gap:8px; flex-shrink:0}
.pv-fld-t{font-family:'SF Mono',Menlo,monospace; font-size:11.5px; padding:2px 9px; border-radius:6px; background:var(--muted); border:1px solid var(--card-border,var(--line)); color:var(--t2)}
.pv-fld-t.enum{color:var(--tag-success-fg,#3ba55c); background:rgba(52,199,89,0.12); border-color:transparent}
.pv-fld-key{font-size:11px; font-weight:600; padding:2px 9px; border-radius:6px; color:var(--primary); background:rgba(43,127,255,0.12)}
.pv-fld-req{font-size:11px; font-weight:600; padding:2px 9px; border-radius:6px; color:var(--t2); background:var(--muted); border:1px solid var(--card-border,var(--line))}
.pv-fld-req.opt{color:var(--t3); font-weight:500}
.pv-items{border:1px solid var(--card-border,var(--line)); border-radius:10px; overflow:hidden}
.pv-it-tbl{width:100%; border-collapse:collapse; font-size:12.5px}
.pv-it-tbl th{text-align:left; font-family:'SF Mono',Menlo,monospace; font-weight:500; font-size:11px; color:var(--t3); padding:9px 12px; background:var(--muted); border-bottom:1px solid var(--card-border,var(--line))}
.pv-it-tbl td{padding:9px 12px; color:var(--t2); border-bottom:1px solid var(--card-border,var(--line)); vertical-align:top}
.pv-it-tbl tr:last-child td{border-bottom:none}
.pv-it-code{font-family:'SF Mono',Menlo,monospace; font-weight:600; color:var(--t1)}
.pv-viewall{display:inline-block; margin:13px 0 4px; font-size:13px; font-weight:600; color:var(--primary); cursor:pointer}
.pv-hsep{color:var(--t3); margin:0 3px}
/* Entity workspace (master-detail inside a model) */
.mdw{display:flex; gap:16px; align-items:flex-start}
.mdw-rail{width:232px; flex-shrink:0; border:1px solid var(--card-border,var(--line)); border-radius:12px; background:var(--card-bg,var(--bg2)); overflow:hidden}
.mdw-rail-h{padding:9px 11px; border-bottom:1px solid var(--card-border,var(--line))}
.mdw-browse{display:inline-flex; align-items:center; gap:5px; border:none; background:transparent; color:var(--t2); font-size:12.5px; font-weight:600; cursor:pointer; padding:2px 0}
.mdw-browse:hover{color:var(--t1)}
.mdw-rail-list{padding:6px; display:flex; flex-direction:column; gap:2px; max-height:560px; overflow-y:auto}
.mdw-rail-item{display:flex; align-items:center; gap:9px; padding:8px 10px; border:none; background:transparent; border-radius:8px; cursor:pointer; text-align:left; width:100%; color:var(--t2)}
.mdw-rail-item:hover{background:var(--hover)}
.mdw-rail-item.on{background:var(--accent,rgba(43,127,255,0.1)); color:var(--t1)}
.mdw-rail-ic{color:var(--t3); display:inline-flex; flex-shrink:0}
.mdw-rail-item.on .mdw-rail-ic{color:var(--primary)}
.mdw-rail-name{flex:1; font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.mdw-rail-r{display:flex; align-items:center; gap:7px; flex-shrink:0}
.mdw-lock{color:var(--tag-alert-fg,#d99815); display:inline-flex}
.mdw-dot{width:7px; height:7px; border-radius:50%; flex-shrink:0}
.mdw-dot.pub{background:var(--tag-success-fg,#3ba55c)} .mdw-dot.draft{background:var(--field-placeholder)} .mdw-dot.pend{background:var(--tag-alert-fg,#d99815)}
.mdw-main{flex:1; min-width:0}
.mdw-head{display:flex; align-items:center; justify-content:space-between; gap:12px}
.mdw-head-l{display:flex; align-items:center; gap:10px; flex-wrap:wrap}
.mdw-title{font-size:18px; font-weight:700; color:var(--t1)}
.mdw-tabs{display:flex; gap:2px; border-bottom:1px solid var(--card-border,var(--line)); margin:12px 0 16px}
.mdw-tab{border:none; background:transparent; padding:9px 13px; font-size:13px; font-weight:600; color:var(--t3); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px}
.mdw-tab:hover{color:var(--t1)}
.mdw-tab.on{color:var(--primary); border-bottom-color:var(--primary)}
.mdw-sec-t{font-size:11.5px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--t2); margin:22px 0 10px}
.mdw-metrics{margin-bottom:4px}
.mdw-badges{display:inline-flex; gap:8px; align-items:center; flex-wrap:wrap}
.mdw-diag-bar{display:flex; align-items:center; justify-content:space-between; margin-bottom:8px}
.mdw-segs{display:inline-flex; gap:4px; background:var(--muted); border:1px solid var(--card-border,var(--line)); border-radius:8px; padding:3px}
.mdw-seg{border:none; background:transparent; padding:5px 12px; border-radius:6px; font-size:12.5px; font-weight:600; color:var(--t2); cursor:pointer}
.mdw-seg.on{background:var(--card-bg,#fff); color:var(--primary); box-shadow:0 1px 3px rgba(0,0,0,.1)}
html:not(.theme-light) .mdw-seg.on{background:var(--surface-raised,#131C2E)}
@media(max-width:900px){.mdw{flex-direction:column}.mdw-rail{width:100%}.mdw-rail-list{max-height:200px}}
/* Workspace relationships */
.mdw-rel-head{display:flex; align-items:center; gap:10px; margin:0 0 12px}
.mdw-rel-h-t{display:inline-flex; align-items:center; gap:7px; font-size:14px; font-weight:700; color:var(--t1)}
.mdw-rel-h-c{font-size:12.5px; color:var(--t3)}
.mdw-rel-toolbar{display:flex; align-items:center; gap:8px; margin:14px 0 12px}
.mdw-rel-list{display:flex; flex-direction:column; gap:10px}
.mdw-rel-card{border:1px solid var(--card-border,var(--line)); border-radius:11px; background:var(--card-bg,var(--bg2)); padding:14px 15px}
.mdw-rel-inc{background:var(--muted)}
.mdw-rel-top{display:flex; align-items:center; gap:9px; flex-wrap:wrap}
.mdw-rel-ent{display:inline-flex; align-items:center; gap:5px; font-size:13.5px; font-weight:700; color:var(--t1)}
.mdw-rel-ent svg{color:var(--t3)}
.mdw-rel-cross{display:inline-flex; align-items:center; gap:5px; font-size:11.5px; font-weight:600; color:var(--primary); background:rgba(43,127,255,0.1); border-radius:6px; padding:3px 8px}
.mdw-rel-intra{font-size:11.5px; font-weight:600; color:var(--t2); background:var(--muted); border:1px solid var(--card-border,var(--line)); border-radius:6px; padding:3px 8px}
.mdw-rel-open{font-size:12px; font-weight:600; color:var(--primary); cursor:pointer}
.mdw-rel-desc{font-size:12.5px; color:var(--t2); margin:9px 0}
.mdw-rel-meta{display:flex; align-items:center; gap:7px; flex-wrap:wrap; font-size:12px; color:var(--t2)}
.mdw-rel-k{font-size:10px; font-weight:700; letter-spacing:.05em; color:var(--t3)}
.mdw-rel-sep{color:var(--field-placeholder)}
.mdw-rel-inc-h{display:flex; align-items:center; gap:8px; margin:20px 0 10px; font-size:13px; font-weight:700; color:var(--t1)}
/* Workspace privileges */
.mdw-priv-sub{font-size:12.5px; color:var(--t3); margin:-4px 0 12px}
.mdw-priv-list{display:flex; flex-direction:column; border:1px solid var(--card-border,var(--line)); border-radius:11px; overflow:hidden; margin-bottom:8px}
.mdw-priv-row{display:flex; align-items:center; gap:12px; padding:13px 15px; border-bottom:1px solid var(--card-border,var(--line))}
.mdw-priv-row:last-child{border-bottom:none}
.mdw-priv-lock{width:30px; height:30px; flex-shrink:0; display:flex; align-items:center; justify-content:center; border-radius:8px; background:var(--muted); color:var(--t3)}
.mdw-priv-b{flex:1; min-width:0}
.mdw-priv-n{font-size:13.5px; font-weight:700; color:var(--t1); display:flex; align-items:center; gap:8px}
.mdw-priv-sym{font-family:'SF Mono',Menlo,monospace; font-size:11px; font-weight:500; color:var(--t3); background:transparent}
.mdw-priv-d{font-size:12.5px; color:var(--t2); margin-top:3px}
.mdw-priv-std{font-size:11.5px; font-weight:600; color:var(--t3); background:var(--muted); border:1px solid var(--card-border,var(--line)); border-radius:6px; padding:3px 10px; flex-shrink:0}
.mdw-cpriv-head{display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin:22px 0 10px}
.mdw-cpriv-list{display:flex; flex-direction:column; gap:10px}
.mdw-cpriv{border:1px solid var(--card-border,var(--line)); border-radius:11px; background:var(--card-bg,var(--bg2)); padding:14px 15px}
.mdw-cpriv-top{display:flex; align-items:center; gap:9px}

.mdw-cpriv-desc2{color:var(--primary); cursor:pointer}
.mdw-priv-note{display:flex; align-items:center; gap:9px; margin-top:16px; padding:12px 15px; border-radius:10px; background:rgba(43,127,255,0.06); border:1px solid rgba(43,127,255,0.16); font-size:12.5px; color:var(--t2)}

.pb-head{display:flex; align-items:flex-start; justify-content:space-between; gap:12px; padding:18px 20px 14px}
.pb-crumbs{padding:0 20px 12px; font-size:12.5px; color:var(--t2); border-bottom:1px solid var(--card-border,var(--line))}
.pb-crumb-sep{color:var(--field-placeholder); margin:0 4px}
.pb-body{display:flex; min-height:340px; max-height:52vh}

.pb-left-h{font-size:10.5px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--t3); margin:0 4px 8px}

.pb-sib{display:flex; align-items:center; gap:8px; width:100%; text-align:left; border:none; background:transparent; border-radius:8px; padding:8px 10px; cursor:pointer; color:var(--t2)}

.pb-sib-n{flex:1; display:flex; flex-direction:column; gap:1px; font-size:13px; font-weight:600; color:var(--t1); min-width:0}

.pb-select{display:inline-flex; align-items:center; gap:7px; font-size:12.5px; font-weight:600; color:var(--t2); cursor:pointer; border:1px solid var(--card-border,var(--line)); border-radius:8px; padding:6px 11px}
.pb-select input,.pb-sub input{width:15px; height:15px; accent-color:var(--primary); cursor:pointer}
.pb-badges{display:flex; flex-wrap:wrap; gap:6px; margin-bottom:16px}
.pb-sub-h{font-size:10.5px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--t3); margin:0 0 8px}
.pb-sub{display:flex; align-items:flex-start; gap:10px; border:1px solid var(--card-border,var(--line)); border-radius:9px; padding:11px 13px; margin-bottom:8px; cursor:pointer}

.pb-sub-n{font-size:13px; font-weight:600; color:var(--t1); display:flex; align-items:center; gap:8px; flex-wrap:wrap}
.pb-sub-d{font-size:12px; color:var(--t2); margin-top:3px}
.pb-nosubs{font-size:12.5px; color:var(--t3); padding:8px 0}

.pb-foot-n{font-size:12.5px; color:var(--t2)}

.mk-fcount{margin-left:6px; font-size:10px; font-weight:700; background:var(--primary); color:#fff; border-radius:8px; padding:0 5px; line-height:16px; display:inline-block}

.imp-step-l{font-size:11.5px; font-weight:600; color:var(--t2)}
.imp-step.on .imp-step-l{color:var(--t1)}
.imp-body{min-height:210px}

.imp-strat-d{display:block; font-size:12px; color:var(--t3); margin-top:2px}
.imp-dry{display:flex; gap:10px; flex-wrap:wrap}
.imp-dry-c{flex:1; min-width:110px; border:1px solid var(--card-border); border-radius:10px; padding:14px; font-size:12.5px; color:var(--t2); text-align:center}

.imp-add b{color:var(--tag-success-fg,#16a34a)}
.imp-upd b{color:var(--tag-informative-fg,#2563eb)}
.imp-rem b{color:var(--field-text-error,#dc2626)}
.imp-done{text-align:center; padding:24px 0}

.mdp-row-r{margin-left:auto; font-size:11.5px; color:var(--t3); flex-shrink:0}
.mdp-cols{display:flex; flex-wrap:wrap; gap:6px}
.mdp-col{font-family:var(--mono,ui-monospace,monospace); font-size:11.5px; color:var(--t2); background:var(--muted); border:1px solid var(--card-border,var(--line)); border-radius:6px; padding:3px 8px}
.priv-pick{display:flex; flex-direction:column; gap:6px; margin-top:4px}
.priv-pick-opt{display:flex; align-items:center; gap:9px; cursor:pointer; padding:2px 0}
.priv-pick-opt input{width:15px; height:15px; accent-color:var(--primary); cursor:pointer; flex-shrink:0}

const _CHECK = '<svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8.5l3.5 3.5L13 4.5"/></svg>';

let _pgnOpenId=null;
function _pgnCloseMenus(){ document.querySelectorAll('.pgn2-menu[data-open="1"]').forEach(m=>m.setAttribute('data-open','0')); document.querySelectorAll('.pgn2-sel[data-open="1"]').forEach(b=>b.setAttribute('data-open','0')); _pgnOpenId=null; }
function _pgnToggle(id){ const menu=document.getElementById(id+'-menu'); if(!menu) return; const willOpen=menu.getAttribute('data-open')!=='1'; _pgnCloseMenus(); if(willOpen){ menu.setAttribute('data-open','1'); const b=document.getElementById(id+'-sel'); if(b) b.setAttribute('data-open','1'); _pgnOpenId=id; } }
function _pagination(o){
  const per=+o.per, total=+o.total||0, page=Math.max(1,+o.page||1);
  const pages=Math.max(1,Math.ceil(total/per));
  if(pages<=1) return '';                                   // DS: hidden on a single page
  const start=(page-1)*per+1, end=Math.min(page*per,total);
  const opts=o.opts||[9,25,50], id=o.id, canPer=!!o.perCall;
  const chevUp='<svg width="10" height="10" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M4 10l4-4 4 4"/></svg>';
  const chevL='<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 4L6 8l4 4"/></svg>';
  const chevR='<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4l4 4-4 4"/></svg>';
  const rows=canPer
    ? `<span class="pgn2-lbl">Rows per page:</span><button id="${id}-sel" class="pgn2-sel" type="button" onclick="event.stopPropagation();_pgnToggle('${id}')" aria-haspopup="listbox"><span class="pgn2-selv">${per}</span>${chevUp}</button>
       <div id="${id}-menu" class="pgn2-menu" data-open="0" role="listbox" aria-label="Rows per page">${opts.map(n=>`<button type="button" role="option" aria-selected="${n===per}" class="pgn2-opt ${n===per?'on':''}" onclick="${o.perCall(n)}">${n}</button>`).join('')}</div>`
    : `<span class="pgn2-lbl">Rows per page:</span><span class="pgn2-selv">${per}</span>`;
  return `<div class="pgn2"><div class="pgn2-bar">
     <div class="pgn2-rows">${rows}</div>
     <div class="pgn2-right">
       <span class="pgn2-range">${start}–${end} of ${total} items</span>
       <div class="pgn2-nav">
         <button class="pgn2-btn" ${page<=1?'disabled':''} onclick="${o.pageCall(page-1)}" aria-label="Previous page">${chevL}</button>
         <button class="pgn2-btn" ${page>=pages?'disabled':''} onclick="${o.pageCall(page+1)}" aria-label="Next page">${chevR}</button>
       </div>
     </div>
   </div></div>`;
}

function _filtered(){
  const q = listState.search.toLowerCase();
  return ENTITIES.filter(e=>{
    if(listState.model!=='all' && e.model!==listState.model) return false;
    if(listState.domain!=='all' && e.domain!==listState.domain) return false;
    if(listState.status!=='all' && e.status!==listState.status) return false;
    if(listState.owner!=='all' && e.owner!==listState.owner) return false;
    if(listState.tags&&listState.tags.length && !listState.tags.some(t=>(e.tags||[]).includes(t))) return false;
    if(q && !(e.name.toLowerCase().includes(q) || e.desc.toLowerCase().includes(q) || (_model(e.model)||{name:''}).name.toLowerCase().includes(q))) return false;
    return true;
  });
}

function _defaultEndpoints(e){
  const s = '/' + e.id.replace(/_/g,'-') + 's';
  return [
    {method:'GET',   label:'List '+e.name,   path:s},
    {method:'GET',   label:'Get '+e.name,    path:s+'/{id}'},
    {method:'POST',  label:'Create '+e.name, path:s},
    {method:'PATCH', label:'Update '+e.name, path:s+'/{id}'},
    {method:'DELETE',label:'Delete '+e.name, path:s+'/{id}'},
  ];
}

let detailState = { id:null, tab:'overview' };
const _ARROW = '<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="var(--t3)" stroke-width="1.5"><path d="M6 4l4 4-4 4" stroke-linecap="round" stroke-linejoin="round"/></svg>';
const _CHK = '<svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8.5l3.5 3.5L13 4.5"/></svg>';

function renderEntityDetail(id){
  const e = ENTITIES.find(x=>x.id===id);
  if(!e){ location.hash='#/entities'; return; }
  const endpoints = _defaultEndpoints(e).concat(e.ceps||[]);
  const tab = detailState.tab;
  const pending = e.status==='Draft'||e.status==='Pending changes';
  const cnt = { overview:null, tables:e.tables.length, relationships:(e.rels||[]).length, privileges:5+(e.cprivs||[]).length, api:endpoints.length, history:null };
  const tabs = [['overview','Overview'],['tables','Tables'],['relationships','Relationships'],['privileges','Privileges'],['api','API contracts'],['history','History']];
  $('content').innerHTML = `
    ${_crumbs([{label:'Models',href:'#/models'},{label:'Entities',href:'#/entities'},{label:e.name}])}
    <div class="detail-head">
      <div class="dh-l">
        <div class="dh-title-row"><span class="lrow-ic" style="width:30px;height:30px">${_IC_ENTITY}</span><span class="dh-title">${escapeHtml(e.name)}</span>${_modelChip(e.model)}<span class="chip">${escapeHtml(e.domain)}</span>${_stPill(e.status)}</div>
        <div class="rfd-internal"><code>${escapeHtml((e.id||_slug(e.name)))}</code><span class="rfd-lock" title="Internal name — cannot be changed after creation"><svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="7" width="10" height="6" rx="1.3"/><path d="M5 7V5a3 3 0 0 1 6 0v2"/></svg></span></div>
        <div class="dh-desc" style="margin-top:8px">${escapeHtml(e.desc)}</div>
        <div class="lrow-foot" style="margin-left:0;margin-top:12px"><span class="lrow-owner">${av(P(e.owner),'sm')}${escapeHtml(P(e.owner).n)}</span><span class="lrow-sep">·</span><span class="lrow-metric">${e.tables.length} tables</span><span class="lrow-sep">·</span><span class="lrow-metric">${e.external} external</span><span class="lrow-sep">·</span><span class="lrow-metric">${escapeHtml(e.records)} records</span><span class="lrow-sep">·</span><span>Updated ${escapeHtml(e.updated)}</span></div>
      </div>
      <div class="dh-actions">
        ${pending
          ? `<span class="publish-hint"><svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="8" cy="8" r="6"/><path d="M8 5v3.5M8 11h.01" stroke-linecap="round"/></svg>Unpublished changes</span><button class="btn btn-primary" onclick="openPublish('${id}')"><svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M8 11V3M4.5 6.5L8 3l3.5 3.5M3 13h10"/></svg>Publish</button>`
          : `<button class="btn" onclick="toast('No pending changes')"><svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8.5l3.5 3.5L13 4.5"/></svg>Published</button>`}<button class="btn" style="width:40px;padding:0" aria-label="More actions" onclick="_detailKebab(this,'entities','${id}')"><svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><circle cx="3" cy="8" r="1.3"/><circle cx="8" cy="8" r="1.3"/><circle cx="13" cy="8" r="1.3"/></svg></button>
      </div>
    </div>
    <div class="mtabs">${tabs.map(([tid,label])=>`<button class="mtab ${tab===tid?'active':''}" onclick="setDetailTab('${tid}')">${label}${cnt[tid]!=null?` <span style="font-size:11px;font-weight:700;color:var(--t3);background:var(--hover);padding:1px 6px;border-radius:6px;margin-left:2px">${cnt[tid]}</span>`:''}</button>`).join('')}</div>
    <div id="dpanel">${renderDetailTab(e,tab,endpoints)}</div>`;
  if(tab==='relationships'&&_relViewMode==='diagram') setTimeout(_diagInit,0);
}
function setDetailTab(t){ detailState.tab=t; renderEntityDetail(detailState.id); }

function renderDetailTab(e,tab,endpoints){
  if(tab==='overview') return entityOverviewTab(e);
  if(tab==='relationships') return relsTab(e);
  if(tab==='privileges') return privTab(e);
  if(tab==='api') return apiTab(e,endpoints);
  if(tab==='history') return _historyTab('entity',e);
  return tablesTab(e);
}
function entityOverviewTab(e){
  const tbls=e.tables||[]; const prim=tbls.filter(t=>t.role==='Primary').length; const sec=tbls.length-prim;
  const rels=e.rels||[]; const out=rels.filter(r=>!/many-to-one/.test(r.k||'')).length; const inc=rels.length-out;
  const custPriv=(e.cprivs||[]).length; const priv=5+custPriv;
  const KEY='<svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6" cy="6" r="3"/><path d="M8 8l5 5M11 11l1.5-1.5M12.5 12.5L14 11" stroke-linecap="round"/></svg>';
  const tiles=[
    _ovTile(tbls.length,'Tables', prim?`${prim} primary · ${sec} secondary`:'none yet', _ICO_COLS),
    _ovTile(rels.length,'External relationships', rels.length?`${out} outgoing · ${inc} incoming`:'none yet', _HIC.link),
    _ovTile(priv,'Privileges', `5 standard · ${custPriv} custom`, KEY),
    _ovTile(escapeHtml(e.records||'—'),'Records', 'Updated '+(e.updated||'—'), _HIC.db),
  ];
  const tblPrev=tbls.length?_mdMiniTable(['Table','Role','Columns','Rows'], tbls.map(t=>[
     `<span class="mtbl-name">${escapeHtml(t.alias)}</span>`, `<span class="mini-badge ${t.role==='Primary'?'mb-primary':'mb-secondary'}">${escapeHtml(t.role)}</span>`, t.cols, escapeHtml(t.rows)
  ])):`<div class="ov-empty">No tables yet.</div>`;
  const def=`The ${escapeHtml(e.name)} entity represents the canonical business concept used across the ${escapeHtml(e.model||'model')} model. It groups the tables, relationships and privileges that downstream teams rely on when they reason about ${escapeHtml((e.name||'').toLowerCase())} records, and acts as the contract between the data platform and the products that consume it.`;
  return `<div class="md-tiles">${tiles.join('')}</div>
    <div class="dsec ov-sub"><div class="dsec-h"><div class="dsec-t">Business definition</div></div><div style="font-size:13px;color:var(--t2);line-height:1.6">${def}</div></div>
    <div class="dsec ov-sub"><div class="dsec-h"><div class="dsec-t">Tables<span class="dsec-sub">${tbls.length} table${tbls.length===1?'':'s'} · exactly one primary</span></div><a class="md-sec-link" onclick="setDetailTab('tables')">Manage tables →</a></div>${tblPrev}</div>
    ${_ovActivity('entity',e)}`;
}
function tablesTab(e){
  return `<div class="dsec"><div class="dsec-h"><div class="dsec-t">Tables<span class="dsec-sub">${e.tables.length} tables · exactly one primary required</span></div><button class="btn" style="height:34px" onclick="openEntTableForm('${e.id}')"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 2v8M2 6h8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg> Add table</button></div>
    <div class="dcard">${e.tables.map((t,i)=>`<div class="drow"><span class="drow-ic"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="2" y="3" width="12" height="10" rx="1.2"/><path d="M2 6.5h12M6 6.5v6.5"/></svg></span><span class="drow-name">${escapeHtml(t.alias)}</span><span class="mini-badge ${t.role==='Primary'?'mb-primary':'mb-secondary'}">${escapeHtml(t.role)}</span><span class="drow-meta"><span>${t.cols} cols</span><span>${escapeHtml(t.rows)} rows</span>${_tableExists(t.id)?`<span class="drow-link" onclick="navigate('tables/${t.id}')">Open →</span>`:''}<button class="lrow-menu" onclick="_entTblMenu('${e.id}',${i},this)" aria-label="Table actions">${_MDIC.dots}</button></span></div>`).join('')}</div></div>`;
}
function _tableExists(id){ return !!(typeof _table==='function'?_table(id):TABLES.find(t=>t.id===id)); }
/* ── Relationships tab: Diagram / Cards / Table (port of TfdRelationshipsTab) ── */
let _relViewMode='diagram';
function setRelView(kind,id,v){ _relViewMode=v; if(kind==='table') renderTableDetail(id); else if(kind==='entity') renderEntityDetail(id); else renderReferenceDetail(id); }
function _cardShort(k){ k=(k||'').toLowerCase(); if(k.indexOf('many-to-many')>=0) return 'N:M'; if(k.indexOf('one-to-many')>=0) return '1:N'; if(k.indexOf('many-to-one')>=0) return 'N:1'; if(k.indexOf('one-to-one')>=0) return '1:1'; return (k||'—').toUpperCase(); }
const _ICO_DIAG='<svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="4" cy="4" r="2"/><circle cx="4" cy="12" r="2"/><circle cx="12" cy="8" r="2"/><path d="M6 4h2a2 2 0 0 1 2 2M6 12h2a2 2 0 0 0 2-2"/></svg>';
const _ICO_CARDS='<svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2.5" width="12" height="4.5" rx="1"/><rect x="2" y="9" width="12" height="4.5" rx="1"/></svg>';
const _ICO_TBL2='<svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2.5" width="12" height="11" rx="1.2"/><path d="M2 6h12M6 6v7.5"/></svg>';
function _relDiagram(centerLabel, rels){
  const n=rels.length, W=680, H=Math.max(240, n*76+30), cx=132, cy=H/2, tx=W-152;
  const nodeW=(s)=>Math.max(84,Math.min(168,(s||'').length*7.2+30)), cW=nodeW(centerLabel);
  const nodes=rels.map((r,i)=>({label:r.target, y:cy+(i-(n-1)/2)*76, w:nodeW(r.target), card:r.cardShort, strong:r.strong}));
  const edges=nodes.map(nd=>{ const x1=cx+cW/2, x2=tx-nd.w/2, y1=cy, y2=nd.y; return {x1,y1,x2,y2,mx:(x1+x2)/2,my:(y1+y2)/2,card:nd.card,strong:nd.strong}; });
  return `<div class="diag-wrap md-diag rel-diag">
    <svg id="diagSvg" class="diag-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet"><g id="diagG">
      ${edges.map(e=>`<line class="diag-edge ${e.strong?'':'diag-cross'}" x1="${e.x1.toFixed(1)}" y1="${e.y1.toFixed(1)}" x2="${e.x2.toFixed(1)}" y2="${e.y2.toFixed(1)}"/>`).join('')}
      ${edges.map(e=>`<g transform="translate(${e.mx.toFixed(1)},${e.my.toFixed(1)})"><rect class="rel-cardb" x="-17" y="-9" width="34" height="18" rx="9"/><text class="rel-cardt" x="0" y="1">${e.card}</text></g>`).join('')}
      <g class="diag-node diag-hub" transform="translate(${cx},${cy})" onclick="event.stopPropagation()"><rect class="diag-box" x="${(-cW/2).toFixed(1)}" y="-14" width="${cW.toFixed(1)}" height="28" rx="6"/><rect class="diag-top diag-top-hub" x="${(-cW/2).toFixed(1)}" y="-14" width="${cW.toFixed(1)}" height="3.5" rx="1.75"/><text class="diag-label" x="0" y="1">${escapeHtml(centerLabel)}</text></g>
      ${nodes.map(nd=>`<g class="diag-node" transform="translate(${tx},${nd.y.toFixed(1)})" onclick="event.stopPropagation();_diagClick('${escapeHtml(nd.label)}')"><rect class="diag-box" x="${(-nd.w/2).toFixed(1)}" y="-14" width="${nd.w.toFixed(1)}" height="28" rx="6"/><rect class="diag-top" x="${(-nd.w/2).toFixed(1)}" y="-14" width="${nd.w.toFixed(1)}" height="3.5" rx="1.75"/><text class="diag-label" x="0" y="1">${escapeHtml(nd.label)}</text></g>`).join('')}
    </g></svg>
    <div class="diag-ctrls"><button class="diag-btn" title="Zoom in" onclick="_diagZoom(1.2)"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><path d="M8 3v10M3 8h10"/></svg></button><button class="diag-btn" title="Zoom out" onclick="_diagZoom(0.83)"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><path d="M3 8h10"/></svg></button><button class="diag-btn" title="Reset" onclick="_diagReset()"><svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2.5" y="2.5" width="11" height="11" rx="1.5"/></svg></button></div>
    <div class="diag-legend"><span><span class="lg-line"></span>Strong</span><span><span class="lg-line lg-dash"></span>Weak</span></div>
  </div>`;
}
function _relView(kind, obj, centerLabel, rels){
  const id=obj.id, v=_relViewMode;
  const seg=(mode,label,ic)=>`<button class="rel-vw-btn ${v===mode?'on':''}" onclick="setRelView('${kind}','${id}','${mode}')">${ic}<span>${label}</span></button>`;
  const toolbar=`<div class="ttd-head"><div class="ttd-head-l"><label class="dsf-search" style="max-width:220px;height:34px">${_HIC.search}<input type="text" placeholder="Search relationships…" oninput="toast('Search — prototype')" autocomplete="off"></label></div><div class="ttd-head-r"><div class="rel-vw">${seg('diagram','Diagram',_ICO_DIAG)}${seg('cards','Cards',_ICO_CARDS)}${seg('table','Table',_ICO_TBL2)}</div><button class="btn btn-primary" style="height:34px" onclick="_relAdd('${kind}','${id}')"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 2v8M2 6h8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg> Add relationship</button></div></div>`;
  let body;
  if(!rels.length){ body=`<div class="placeholder" style="padding:38px">No relationships yet. Connect <b>${escapeHtml(centerLabel)}</b> to another ${kind==='reference'?'list':kind} via a foreign key.</div>`; }
  else if(v==='diagram'){ body=_relDiagram(centerLabel, rels); }
  else if(v==='table'){ const gt='grid-template-columns:minmax(0,1fr) 96px 100px 120px 120px'; body=`<div class="ttd-table"><div class="ttd-thead cv-thead" style="${gt}"><span class="cv-th">Related</span><span class="cv-th">Cardinality</span><span class="cv-th">Strength</span><span class="cv-th">Direction</span><span class="cv-th">On delete</span></div>${rels.map((r,i)=>`<div class="ttd-tr cv-static" style="${gt};cursor:pointer" onclick="_relOpen('${kind}','${id}',${i})"><span class="cv-td"><span class="cv-field-d">${escapeHtml(r.target)}</span>${r.via?`<span class="cv-field-n" style="margin-left:6px">.${escapeHtml(r.via)}</span>`:''}</span><span class="cv-td"><span class="card-badge">${r.cardShort}</span></span><span class="cv-td">${r.strong?'<span class="cv-yes">Strong</span>':'<span class="cv-no">Weak</span>'}</span><span class="cv-td">${escapeHtml(r.dir||'Uni')}</span><span class="cv-td">${escapeHtml(r.del)}</span></div>`).join('')}</div>`; }
  else { body=`<div class="rfb-list">${rels.map((r,i)=>`<div class="rfb-card" onclick="_relOpen('${kind}','${id}',${i})"><div class="rfb-top"><span class="idx-ic">${_HIC.link}</span><span class="rfb-col">${escapeHtml(centerLabel)}</span>${r.via?`<span class="cv-field-n">.${escapeHtml(r.via)}</span>`:''}${_ARROW}<span class="rfb-col">${escapeHtml(r.target)}</span><span class="card-badge">${r.cardShort}</span><span class="rfb-reqchip ${r.strong?'rfb-req':'rfb-opt'}">${r.strong?'Strong':'Weak'}</span><span style="flex:1"></span><span style="font-size:11px;color:var(--t3)">${escapeHtml(r.dir||'Uni')} · on delete ${escapeHtml(r.del)}</span></div>${r.desc?`<div class="rfb-desc">${escapeHtml(r.desc)}</div>`:''}</div>`).join('')}</div>`; }
  return toolbar+body;
}
function relsTab(e){
  const rels=(e.rels||[]).map(r=>({target:r.t, via:r.via, desc:r.desc, cardShort:_cardShort(r.k), strong:!!r.s, dir:r.dir||'Outgoing', del:r.del||(r.s?'Restrict':'Set null')}));
  return _relView('entity', e, e.name, rels);
}
function privTab(e){
  const cperms=e.cperms||[], cprivs=e.cprivs||[];
  return `
    <div class="dsec"><div class="dsec-h"><div class="dsec-t">Default permissions<span class="dsec-sub">created automatically with every entity</span></div></div>
      <div class="priv-grid">${['Read','Create','Update','Delete','List'].map(p=>`<div class="priv-cell">${_CHK} ${p}</div>`).join('')}</div></div>
    <div class="dsec"><div class="dsec-h"><div class="dsec-t">Custom permissions<span class="dsec-sub">granular controls you define (data · screen · API)</span></div><button class="btn" style="height:34px" onclick="openPermForm('${e.id}')"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 2v8M2 6h8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg> Add permission</button></div>
      ${cperms.length?`<div class="dcard">${cperms.map((p,i)=>`<div class="drow"><span class="drow-name">${escapeHtml(p.n)}</span><span class="drow-meta"><span class="perm-chip ${p.c==='Data'?'data':(p.c==='Screen'?'':'api')}">Controls: ${escapeHtml(p.c)}</span><button class="lrow-menu" onclick="_entPermMenu('${e.id}',${i},this)" aria-label="Permission actions">${_MDIC.dots}</button></span></div>`).join('')}</div>`:`<div class="placeholder" style="padding:24px">No custom permissions.</div>`}</div>
    <div class="dsec"><div class="dsec-h"><div class="dsec-t">Custom privileges<span class="dsec-sub">named groups of permissions granted to users, roles or agents</span></div><button class="btn" style="height:34px" onclick="openPrivForm('${e.id}')"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 2v8M2 6h8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg> Add privilege</button></div>
      ${cprivs.length?cprivs.map((pv,i)=>`<div class="cpriv"><div class="cpriv-name"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="#7db1ff" stroke-width="1.5"><rect x="3" y="7" width="10" height="6" rx="1.3"/><path d="M5 7V5a3 3 0 0 1 6 0v2"/></svg>${escapeHtml(pv.n)}<span style="flex:1"></span><button class="lrow-menu" onclick="_entPrivMenu('${e.id}',${i},this)" aria-label="Privilege actions">${_MDIC.dots}</button></div><div class="cpriv-perms">${pv.p.map(([lbl,kind])=>`<span class="perm-chip ${kind}">${escapeHtml(lbl)}</span>`).join('')}</div></div>`).join(''):`<div class="placeholder" style="padding:24px">No custom privileges.</div>`}</div>`;
}
function apiTab(e,endpoints){
  return `<div class="dsec"><div class="dsec-h"><div class="dsec-t">API contracts<span class="dsec-sub">${endpoints.length} endpoints exposing this entity</span></div></div>
    <div class="dcard">${endpoints.map(ep=>`<div class="ep-row"><span class="method m-${ep.method.toLowerCase()}">${ep.method}</span><span class="drow-name">${escapeHtml(ep.label)}</span><span class="ep-path">${escapeHtml(ep.path)}</span>${ep.custom?'<span class="ep-custom">Custom</span>':'<span class="ep-default">Default</span>'}</div>`).join('')}</div>
    ${vcallout('v1.5','Custom endpoints — choose exposed / filterable / sortable fields and embed vs reference child entities.')}</div>`;
}

/* ── Publish flow + modal + toast ── */
function openPublish(id){
  const e = ENTITIES.find(x=>x.id===id); if(!e) return;
  const impacts = [
    ['add', `Add column <code>${e.id}.status</code> (nullable)`],
    ['add', `New relationship <b>${escapeHtml(e.name)} → ${escapeHtml(((e.rels||[])[0]||{}).t||'related entity')}</b>`],
    ['warn', 'Rebuilds 2 indexes on physical tenant tables — may take ~30s'],
  ];
  $('modalScrim').innerHTML = `<div class="modal">
    <div class="modal-head"><div class="modal-ic"><svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M8 1.5 1 13.5h14L8 1.5Z"/><path d="M8 6.5v3M8 11.5h.01" stroke-linecap="round"/></svg></div><div class="modal-title">Publish ${escapeHtml(e.name)}?</div></div>
    <div class="modal-body">Publishing applies your pending structural changes to the live schema. These run against <b>physical tenant tables</b> — some changes can't be undone.
      <div class="impact">${impacts.map(([k,txt])=>`<div class="impact-row">${k==='warn'?'<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="#facc15" stroke-width="1.6"><circle cx="8" cy="8" r="6"/><path d="M8 5v3.5M8 11h.01" stroke-linecap="round"/></svg>':'<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="#4ade80" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8.5l3.5 3.5L13 4.5"/></svg>'}<span>${txt}</span></div>`).join('')}</div>
    </div>
    <div class="modal-foot"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="confirmPublish('${id}')">Publish changes</button></div>
  </div>`;
  $('modalScrim').classList.add('open');
}
function closeModal(){ $('modalScrim').classList.remove('open'); $('modalScrim').innerHTML=''; }
function confirmPublish(id){ const e=ENTITIES.find(x=>x.id===id); if(e) e.status='Published'; closeModal(); toast('“'+(e?e.name:'Entity')+'” published','ok'); renderEntityDetail(id); }

/* ══════════════════════════════════════════════════════════════
   ENTITY DETAIL — deep CRUD: relationships · privileges · tables
   ══════════════════════════════════════════════════════════════ */
function _entById(id){ return ENTITIES.find(x=>x.id===id); }
function _entEdited(e){ if(e.status==='Published') e.status='Pending changes'; e.updated='just now'; }
const _CARD_OPTS=[['one-to-one','1:1 · One to one'],['one-to-many','1:N · One to many'],['many-to-one','N:1 · Many to one'],['many-to-many','N:M · Many to many']];
const _REL_DIRS=['Outgoing','Incoming','Bidirectional'];

function saveRel(id,idx){

  if(idx!=null&&idx>=0&&e.rels[idx]) e.rels[idx]=rel; else e.rels.unshift(rel);

  _soOpen(); setTimeout(()=>{const el=$('etb_name'); if(el)el.focus();},60);

function saveEntTable(id,idx){
  const e=_entById(id); if(!e) return; e.tables=e.tables||[];
  const alias=($('etb_name').value||'').trim(); if(!alias){ toast('Enter a name'); return; }
  const roleRaw=$('etb_role').value; const role=/Primary/.test(roleRaw)?'Primary':'Secondary';
  const cols=Math.max(1,parseInt($('etb_cols').value,10)||8); const rows=($('etb_rows').value||'').trim()||'0';
  if(idx!=null&&idx>=0&&e.tables[idx]){ const t=e.tables[idx]; t.alias=alias; t.role=role; t.cols=cols; t.rows=rows; }
  else { let base=e.id+'_'+_slug(alias).replace(/-/g,'_'), uid=base, k=2; while(e.tables.find(t=>t.id===uid)) uid=base+'_'+(k++); e.tables.push({id:uid, alias, role, cols, rows}); }
  _entEdited(e); closeSlideout(); toast('Table “'+alias+'” '+(idx!=null?'updated':'added'),'ok'); renderEntityDetail(id);
}

let _toastTimer;
function toast(msg, kind){
  let t=$('toast'); if(!t){ t=document.createElement('div'); t.id='toast'; document.body.appendChild(t); }
  t.className='toast '+(kind||'')+' show';
  t.innerHTML=(kind==='ok'?'<svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8.5l3.5 3.5L13 4.5"/></svg>':'')+'<span>'+escapeHtml(msg)+'</span>';
  clearTimeout(_toastTimer); _toastTimer=setTimeout(()=>t.classList.remove('show'),2600);
}

const tablesListState = { search:'', model:'all', entity:'all', type:'all', status:'all', view:'list' };
function tlSearch(v){ tablesListState.search=v; renderTablesList(); setTimeout(()=>{const el=$('tblSearch'); if(el){el.focus(); el.setSelectionRange(v.length,v.length);}},0); }
function tlEntity(v){ tablesListState.entity=v; renderTablesList(); }
function tlModel(v){ tablesListState.model=v; renderTablesList(); }
function tlType(v){ tablesListState.type=v; renderTablesList(); }
function tlStatus(v){ tablesListState.status=v; renderTablesList(); }
function tlView(v){ tablesListState.view=v; _saveView('tables',v); renderTablesList(); }
function tlClear(){ tablesListState.model='all'; tablesListState.entity='all'; tablesListState.type='all'; tablesListState.status='all'; tablesListState.tags=[]; renderTablesList(); }
function _tablesFiltered(){
  const q=tablesListState.search.toLowerCase();
  return TABLES.filter(t=>{
    if(tablesListState.model!=='all' && t.model!==tablesListState.model) return false;
    if(tablesListState.entity!=='all' && t.entityId!==tablesListState.entity) return false;
    if(tablesListState.type!=='all' && t.role!==tablesListState.type) return false;
    if(tablesListState.status!=='all' && t.status!==tablesListState.status) return false;
    if(tablesListState.tags&&tablesListState.tags.length && !tablesListState.tags.some(x=>(t.tags||[]).includes(x))) return false;
    if(q && !(t.id.toLowerCase().includes(q)||t.alias.toLowerCase().includes(q)||t.entity.toLowerCase().includes(q)||t.desc.toLowerCase().includes(q))) return false;
    return true;
  });
}
